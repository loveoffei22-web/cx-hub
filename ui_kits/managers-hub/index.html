.si-btn{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.si-err{color:#DC2626;font-size:13px;font-weight:600;margin:6px 0;}
.si-foot{margin-top:12px;text-align:center;font-size:13px;color:#64748B;}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.4);pointer-events:none;transition:all .3s;}

::-webkit-scrollbar{width:4px;height:4px;}

.pct-pill{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;}

function hashPw(pw){let h=5381;for(let i=0;i<pw.length;i++)h=((h<<5)+h+pw.charCodeAt(i))|0;return'h'+(h>>>0).toString(36);}
function openPDF(html){try{const b=new Blob([html],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.target='_blank';a.rel='noopener';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),3000);}catch(e){const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}}}
function parseTimeMins(s){if(!s)return 0;const m=String(s).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);if(!m)return 0;let h=+m[1],mm=+m[2];const ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+mm;}

function excelRowsToSnap(rows){
  const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const WEEK=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const days={};
  const valids=rows.map(r=>+r['Date/Time Received']).filter(s=>s>0);
  if(!valids.length)return null;
  const base=Math.floor(Math.min(...valids));
  function statusMap(s){const u=String(s||'').toUpperCase().trim();if(u.startsWith('RESOLVED'))return'resolved';if(u.startsWith('IN PROGRESS'))return'progress';return'unresolved';}
  rows.forEach(r=>{
    const issue=String(r['Issue']||'');const parts=issue.split('/').map(s=>s.trim());
    const cat=(parts[0]||r['Category']||'GENERAL').toUpperCase();const sub=(parts.slice(1).join('/')||'').toUpperCase();
    const tk={id:'tk_'+Math.random().toString(36).slice(2,10),num:String(r['Ticket']||''),time:String(r['Time']||''),name:String(r['Customer']||''),phone:String(r['Phone']||''),meter:String(r['METER_NUMBER']||'').replace(/^'\s*/,'').trim(),address:String(r['Address']||''),email:'',bu:String(r['Business District']||''),channel:String(r['CHANNEL OF COMPLAINT']||'Mobile App'),category:cat,subcategory:sub,note:issue,assignee:String(r['Assignee']||''),resolutionNote:String(r['Action Taken']||''),status:statusMap(r['Status']),locked:false};
    const serial=+r['Date/Time Received'];
    if(serial>0){const d=new Date((Math.floor(serial)-25569)*86400*1000);const dom=d.getUTCDate(),mon=d.getUTCMonth(),yr=d.getUTCFullYear(),dayNum=Math.floor(serial)-base+1;const key=yr+'-'+(mon+1)+'-'+dom;if(!days[key])days[key]={dayNum,dateBig:dom+' '+MONTHS[mon],year:yr+' · '+WEEK[d.getUTCDay()],tag:'📅 DAY '+dayNum,headerSub:'Customer Experience · Marina HQ · Mobile App Channel',tickets:[]};days[key].tickets.push(tk);}
  });
  return{days:Object.values(days).sort((a,b)=>a.dayNum-b.dayNum)};
}

// ── CUMULATIVE ─────────────────────────────────────────────────────
function Cumulative({ cum, onCumUpdate }) {
  const [rows, setRows] = useState(() => cum.map((r) => ({ ...r })));
  const [editing, setEditing] = useState(false);
  const [newRow, setNewRow] = useState({ name: '', cat: '' });
  useEffect(() => {setRows(cum.map((r) => ({ ...r })));}, [cum]);

  const [localToast, setLocalToast] = React.useState('');
  function lt(msg) {setLocalToast(msg);setTimeout(() => setLocalToast(''), 2800);}
  function upd(i, field, val) {
    const nr = [...rows];
    nr[i] = { ...nr[i], [field]: isNaN(val) ? val : Number(val) };
    const g = (nr[i].res || 0) + (nr[i].prog || 0) + (nr[i].unres || 0);
    nr[i].grand = g;
    nr[i].pct = g ? Math.round((nr[i].res || 0) / g * 100) : 0;
    setRows(nr);
  }
  function save() {onCumUpdate(rows);setEditing(false);}
  function discard() {setRows(cum.map((r) => ({ ...r })));setEditing(false);}
  function addParty() {
    if (!newRow.name.trim()) return;
    const nr = [...rows, { sn: rows.length + 1, name: newRow.name.trim(), cat: newRow.cat.trim() || 'General', today: 0, res: 0, prog: 0, unres: 0, grand: 0, pct: 0 }];
    setRows(nr);setNewRow({ name: '', cat: '' });
  }
  function removeRow(i) {setRows(rows.filter((_, idx) => idx !== i).map((r, idx) => ({ ...r, sn: idx + 1 })));}

  // ── Export Excel ────────────────────────────────────────────────
  function doExportExcel() {
    if (typeof XLSX === 'undefined') return;
    const hdr = ['S/N', 'Responsible Party', 'Category', 'Received Today', 'Cumulative Resolved', 'Cumulative In Progress', 'Cumulative Unresolved', 'Grand Total', '% Resolution'];
    const gR = rows.reduce((a, r) => a + (r.res || 0), 0),gP = rows.reduce((a, r) => a + (r.prog || 0), 0),gU = rows.reduce((a, r) => a + (r.unres || 0), 0),gG = rows.reduce((a, r) => a + (r.grand || 0), 0),gPct = gG ? Math.round(gR / gG * 100) : 0;
    const data = rows.map((r) => [r.sn, r.name, r.cat, r.today || 0, r.res || 0, r.prog || 0, r.unres || 0, r.grand || 0, (r.pct || 0) + '%']);
    data.push(['', 'GRAND TOTAL', '', rows.reduce((a, r) => a + (r.today || 0), 0), gR, gP, gU, gG, gPct + '%']);
    const ws = XLSX.utils.aoa_to_sheet([['EKEDP POWER APP — CUMULATIVE COMPLAINT TRACKER'], ['Mobile App Channel · Marina HQ · Generated ' + new Date().toLocaleString('en-GB', { timeZone: 'Africa/Lagos' })], [''], hdr, ...data]);
    ws['!cols'] = [{ wch: 5 }, { wch: 28 }, { wch: 26 }, { wch: 14 }, { wch: 18 }, { wch: 20 }, { wch: 20 }, { wch: 12 }, { wch: 13 }];
    const wb = XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb, ws, 'Cumulative');
    XLSX.writeFile(wb, 'EKEDP_Cumulative_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  }

  // ── Copy to Outlook (rich HTML) ──────────────────────────────────
  async function doCopyOutlook() {

// ── GREETING HELPERS ───────────────────────────────────────────────
function getGreeting(name) {
  const h = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' })).getHours();
  const first = name?.split(' ')[0] || 'Boss';
  if (h >= 5 && h < 12) return { text: `Good morning, My Madam 👑`, icon: '🌅', sub: 'morning' };
  if (h >= 12 && h < 17) return { text: `Good afternoon, Boss 👑`, icon: '☀️', sub: 'afternoon' };
  if (h >= 17 && h < 22) return { text: `Good evening, Boss 👑`, icon: '🌆', sub: 'evening' };
  return { text: `Good night, My Madam 👑`, icon: '🌙', sub: 'night' };
}

// Small greeting bar shown on every non-dashboard screen
function GreetingBar({ user, dayNum, onSettings }) {
  const [g, setG] = React.useState(() => getGreeting(user?.name));
  const [clock, setClock] = React.useState('');
  useEffect(() => {
    const f = () => {
      const w = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
      setG(getGreeting(user?.name));
      setClock(w.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' WAT');
    };
    f();const id = setInterval(f, 1000);return () => clearInterval(id);
  }, [user]);
  return (
    <div className="greeting-bar" style={{ background: 'linear-gradient(135deg,#001040,#001F5C 60%,#0a0020)', padding: '10px 28px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>

        <span style={{ fontSize: 14 }}>{g.icon}</span>
        <span style={{ fontSize: 13, fontWeight: 700, fontStyle: 'italic', color: 'rgba(255,255,255,.9)' }}>{g.text}</span>
        {dayNum && <span style={{ fontSize: 13, color: 'rgba(255,255,255,.35)', marginLeft: 8 }}>· Day {dayNum}</span>}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 12, fontWeight: 700, color: 'var(--muted)', background: 'rgba(255,255,255,.07)', border: '1px solid rgba(255,255,255,.1)', borderRadius: 7, padding: '5px 10px' }}>{clock}</div>
        <button onClick={onSettings} style={{ padding: '5px 11px', background: 'rgba(99,102,241,.18)', border: '1px solid rgba(99,102,241,.35)', borderRadius: 7, color: 'var(--muted)', fontFamily: "'Sora',sans-serif", fontSize: 12, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}>⚙ Settings</button>

// ── ANALYTICS ────────────────────────────────────────────────────
function Analytics({ days }) {
  const all = useMemo(() => days.flatMap((d) => d.tickets), [days]);
  const res = all.filter((t) => t.status === 'resolved').length;
  const prg = all.filter((t) => t.status === 'progress').length;
  const unr = all.filter((t) => t.status === 'unresolved').length;
  const tot = all.length || 1;
  const rate = Math.round(res / tot * 100);

  // Category breakdown
  const cats = useMemo(() => {const m = {};all.forEach((t) => {const c = (t.category || 'General').split('/')[0].trim();m[c] = (m[c] || 0) + 1;});return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 7);}, [all]);
  // BU breakdown
  const bus = useMemo(() => {const m = {};all.forEach((t) => {if (t.bu) m[t.bu] = (m[t.bu] || 0) + 1;});return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 7);}, [all]);
  // Responsible party resolution rates
  const parties = useMemo(() => {const m = {};all.forEach((t) => {const r = t.assignee || t.responsible || t.resp || 'Unknown';if (!m[r]) m[r] = { total: 0, res: 0 };m[r].total++;if (t.status === 'resolved') m[r].res++;});return Object.entries(m).map(([n, v]) => ({ name: n.split(' ')[0], total: v.total, res: v.res, pct: Math.round(v.res / v.total * 100) })).sort((a, b) => b.total - a.total).slice(0, 6);}, [all]);

  const COLS = ['#6366F1', '#3B82F6', '#06B6D4', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'];

  // Card wrapper with print button
  const printChart=(title,pid)=>{
    const el=document.getElementById(pid);if(!el)return;
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Sora',sans-serif;padding:32px;background:#fff;color:#0F172A;}
    h2{font-size:18px;font-weight:800;margin-bottom:16px;}@media print{button{display:none!important;}}</style></head><body>
    <h2>EKEDP Power App · ${title}</h2>${el.innerHTML}
    <br><button onclick="window.print()" style="padding:10px 22px;background:#6366F1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px">🖨️ Print / Save PDF</button>
    <button onclick="window.close()" style="padding:10px 18px;background:#F1F5F9;color:#475569;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-left:8px">✕ Close</button>
    </body></html>`);w.document.close();
  };
  const Card = ({ title, sub, children, pid, style = {} }) =>
  <div id={pid} style={{ background: 'var(--card)', borderRadius: 14, border: '1px solid var(--border)', padding: '16px 18px', ...style }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--text)' }}>{title}</div>
          {sub && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>{sub}</div>}
        </div>
        {pid && <button onClick={()=>printChart(title,pid)} style={{padding:'4px 10px',background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.2)',borderRadius:6,color:'#6366F1',fontFamily:'inherit',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>🖨️ Print</button>}
      </div>
      {children}
    </div>;


  // ── BIG DONUT (resolution rate) ──────────────────────────────
  const BigDonut = () => {
    const size = 160,stroke = 22,r = (size - stroke) / 2,circ = 2 * Math.PI * r;
    const segs = [
    { v: res, c: '#10B981' }, { v: prg, c: '#F59E0B' }, { v: unr, c: '#EF4444' }];

    let offset = 0;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
        <svg width={size} height={size} style={{ flexShrink: 0, transform: 'rotate(-90deg)' }}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke} />
          {segs.map((s, i) => {
            const dash = s.v / tot * circ;
            const el = <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none"
            stroke={s.c} strokeWidth={stroke}
            strokeDasharray={dash + ' ' + (circ - dash)}
            strokeDashoffset={-offset}
            strokeLinecap="butt" />;
            offset += dash;
            return el;
          })}
          <text x={size / 2} y={size / 2 - 6} textAnchor="middle" dominantBaseline="middle"
          style={{ transform: `rotate(90deg) translate(0,0)`, transformOrigin: `${size / 2}px ${size / 2}px` }}
          fill="#fff" fontFamily="JetBrains Mono,monospace" fontSize="28" fontWeight="800">{rate}%</text>
          <text x={size / 2} y={size / 2 + 16} textAnchor="middle" dominantBaseline="middle"
          style={{ transform: `rotate(90deg)`, transformOrigin: `${size / 2}px ${size / 2}px` }}
          fill="rgba(255,255,255,.45)" fontFamily="Sora,sans-serif" fontSize="9" fontWeight="700" letterSpacing="1">RESOLVED</text>
        </svg>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 9 }}>
          {[{ l: 'Resolved', v: res, c: '#10B981' }, { l: 'In Progress', v: prg, c: '#F59E0B' }, { l: 'Unresolved', v: unr, c: '#EF4444' }].map((s) =>
          <div key={s.l}>

                <span style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--text)' }}>{s.l}</span>

          )}
          <div style={{ marginTop: 2, fontSize: 11, color: 'var(--muted)', borderTop: '1px solid var(--border)', paddingTop: 6 }}>{tot} total · {days.length} days</div>
        </div>
      </div>);

  };

  // ── MULTI-LINE AREA CHART (daily volume + resolved) ──────────
  const AreaChart = () => {
    if (days.length < 2) return <div style={{ textAlign: 'center', color: 'var(--muted)', padding: 20, fontSize: 12 }}>Need 2+ days of data</div>;
    const W = 460,H = 120,PAD = { t: 10, r: 10, b: 24, l: 32 };
    const iW = W - PAD.l - PAD.r,iH = H - PAD.t - PAD.b;
    const maxV = Math.max(...days.map((d) => d.tickets.length), 1);
    const xS = days.length > 1 ? iW / (days.length - 1) : 0;
    const yP = (v) => PAD.t + iH - v / maxV * iH;
    const pts = days.map((d, i) => ({ x: PAD.l + i * xS, total: d.tickets.length, res: d.tickets.filter((t) => t.status === 'resolved').length }));
    const totalPath = pts.map((p, i) => i === 0 ? `M${p.x},${yP(p.total)}` : `L${p.x},${yP(p.total)}`).join(' ');

    // Y axis labels

            <linearGradient id="ag2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10B981" stopOpacity=".3" /><stop offset="100%" stopColor="#10B981" stopOpacity="0" /></linearGradient>
          </defs>
          {/* grid lines */}
          {yLabels.map((v, i) => {
            const y = yP(v);
            return <React.Fragment key={i}>
              <line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke="rgba(255,255,255,.06)" strokeWidth="1" />
              <text x={PAD.l - 4} y={y} textAnchor="end" dominantBaseline="middle" fill="rgba(255,255,255,.35)" fontSize="8" fontFamily="JetBrains Mono,monospace">{v}</text>
            </React.Fragment>;
          })}
          {/* areas */}
          <path d={totalArea} fill="url(#ag1)" />
          <path d={resArea} fill="url(#ag2)" />
          {/* lines */}
          <path d={totalPath} fill="none" stroke="#6366F1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          <path d={resPath} fill="none" stroke="#10B981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4 2" />
          {/* dots for total */}
          {pts.map((p, i) => <circle key={i} cx={p.x} cy={yP(p.total)} r="3" fill="#fff" stroke="#6366F1" strokeWidth="1.5" />)}
          {/* x labels — every other day */}
          {pts.filter((_, i) => i % 2 === 0 || i === pts.length - 1).map((p, i) =>
          <text key={i} x={p.x} y={H - 4} textAnchor="middle" fill="rgba(255,255,255,.4)" fontSize="8" fontFamily="JetBrains Mono,monospace">{days[pts.indexOf(p)]?.dayNum}</text>
          )}
        </svg>
        <div style={{ display: 'flex', gap: 16, marginTop: 6, fontSize: 11 }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 5, color: '#6366F1', fontWeight: 700 }}><span style={{ width: 16, height: 2, background: '#6366F1', borderRadius: 2, display: 'inline-block' }} /> Total</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 5, color: '#10B981', fontWeight: 700 }}><span style={{ width: 16, height: 2, background: '#10B981', borderRadius: 2, display: 'inline-block', borderTop: '2px dashed #10B981' }} /> Resolved</span>
        </div>
      </div>);

  };

  // ── HORIZONTAL BAR ───────────────────────────────────────────
  const HBar = ({ data, max, colors }) =>
  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {data.map(([k, v], i) => {
      const pct = Math.round(v / max * 100);
      const col = colors ? colors[i % colors.length] : COLS[i % COLS.length];
      return (
        <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 96, fontSize: 11, fontWeight: 600, color: 'var(--muted)', textAlign: 'right', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flexShrink: 0 }} title={k}>{k}</div>
            <div style={{ flex: 1, background: 'rgba(255,255,255,.06)', borderRadius: 5, height: 20, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: pct + '%', background: col, borderRadius: 5, transition: 'width .5s ease' }} />
              <div style={{ position: 'absolute', left: 8, top: 0, bottom: 0, display: 'flex', alignItems: 'center', fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,.9)', mixBlendMode: 'difference' }}>{v}</div>
            </div>
            <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono',monospace", color: 'var(--muted)', width: 28, textAlign: 'right', flexShrink: 0 }}>{Math.round(v / tot * 100)}%</div>
          </div>);

    })}
    </div>;


  // ── COLUMN CHART (daily volume) ──────────────────────────────
  const ColChart = () => {
    const maxV = Math.max(...days.map((d) => d.tickets.length), 1);
    return (
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 110, paddingTop: 4 }}>
        {days.map((d, i) => {
          const h = Math.max(Math.round(d.tickets.length / maxV * 100), 4);
          const resH = Math.round(d.tickets.filter((t) => t.status === 'resolved').length / maxV * 100);
          return (
            <div key={d.dayNum} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, height: '100%', justifyContent: 'flex-end' }}
            title={`Day ${d.dayNum}: ${d.tickets.length} tickets`}>
              <div style={{ fontSize: 8, color: 'var(--muted)', fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, lineHeight: 1 }}>{d.tickets.length || ''}</div>
              <div style={{ width: '100%', borderRadius: '3px 3px 0 0', position: 'relative', overflow: 'hidden', height: h + '%', minHeight: 4 }}>
                <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: resH + '%', background: '#10B981', opacity: .9 }} />
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: resH + '%', background: COLS[i % COLS.length], opacity: .75 }} />
              </div>
              <div style={{ fontSize: 7, color: 'var(--muted)', fontFamily: "'JetBrains Mono',monospace", lineHeight: 1 }}>{d.dayNum}</div>
            </div>);

        })}
      </div>);

  };

  // ── RESPONSIBLE PARTY GROUPED BARS ──────────────────────────
  const PartyBars = () =>
  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {parties.map((p, i) =>
    <div key={p.name}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>{p.name}</span>
            <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono',monospace", color: 'var(--muted)' }}>{p.res}/{p.total} · <span style={{ color: p.pct >= 80 ? '#10B981' : p.pct >= 50 ? '#F59E0B' : '#EF4444', fontWeight: 700 }}>{p.pct}%</span></span>
          </div>
          <div style={{ height: 8, background: 'rgba(255,255,255,.06)', borderRadius: 4, position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: p.pct + '%', background: p.pct >= 80 ? '#10B981' : p.pct >= 50 ? '#F59E0B' : '#EF4444', borderRadius: 4, transition: 'width .5s' }} />
          </div>
        </div>
    )}
    </div>;


  return (
    <div style={{ padding: '22px 28px', background: 'var(--bg)', minHeight: '100vh' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18, flexWrap: 'wrap', gap: 10 }}>
        <div>
          <h2 style={{ fontSize: 17, fontWeight: 800, color: 'var(--text)' }}>📈 Analytics & Insights</h2>
          <p style={{ fontSize: 12, color: 'var(--muted)', marginTop: 3 }}>{days.length} days of ops · {all.length} total complaints · Mobile App Channel</p>
        </div>
      </div>

      {/* Row 1: Area chart + Donut */}
      <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr', gap: 14, marginBottom: 14 }}>
        <Card title="📈 Daily Volume Trend" sub="Total complaints (purple) vs Resolved (green) per day" pid="ch-trend">
          <AreaChart />
        </Card>
        <Card title="🎯 Resolution Rate" sub="Overall status breakdown" pid="ch-donut">
          <BigDonut />
        </Card>
      </div>

      {/* Row 2: Category + BU */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
        <Card title="📊 Complaints by Category" sub="Top 7 complaint types" pid="ch-cat">
          <HBar data={cats} max={Math.max(...cats.map(([, v]) => v), 1)} />
        </Card>
        <Card title="🏢 Complaints by Business Unit" sub="Volume per BU" pid="ch-bu">
          <HBar data={bus} max={Math.max(...bus.map(([, v]) => v), 1)} colors={['#3B82F6', '#06B6D4', '#8B5CF6', '#EC4899', '#F59E0B', '#10B981', '#EF4444']} />
        </Card>
      </div>

      {/* Row 3: Column chart + Party bars */}
      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 14 }}>
        <Card title="📅 Daily Volume — Column Chart" sub="Stacked: resolved (green) + other" pid="ch-col">
          <ColChart />
          <div style={{ display: 'flex', gap: 14, marginTop: 8, fontSize: 11 }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 5, color: '#10B981', fontWeight: 700 }}><span style={{ width: 10, height: 10, background: '#10B981', borderRadius: 2, display: 'inline-block' }} /> Resolved</span>
            <span style={{ display: 'flex', alignItems: 'center', gap: 5, color: '#6366F1', fontWeight: 700 }}><span style={{ width: 10, height: 10, background: '#6366F1', borderRadius: 2, display: 'inline-block' }} /> Other</span>
          </div>
        </Card>
        <Card title="👥 Resolution by Party" sub="% resolved per responsible party" pid="ch-party">
          <PartyBars />
        </Card>
      </div>
    </div>);

}

  const stBtns = [{ s: 'resolved', l: '✅ Resolved', c: '#16A34A', bg: 'rgba(22,163,74,.15)' }, { s: 'progress', l: '⏳ In Progress', c: '#D97706', bg: 'rgba(217,119,6,.15)' }, { s: 'unresolved', l: '🔴 Unresolved', c: '#DC2626', bg: 'rgba(220,38,38,.15)' }];

            <button onClick={() => onSave(ticket.id, { status: st, resolutionNote: note, assignee })} style={{ padding: '9px 16px', background: '#1D4ED8', color: '#fff', border: 'none', borderRadius: 8, fontFamily: 'inherit', fontSize: 13, fontWeight: 800, cursor: 'pointer' }}>💾 Save update</button>
          </div>
        </div>
      </div>
    </div>);

}

// ── SLOT REPORT PDF ────────────────────────────────────────────────
const SLOT_DEFS = {
  '9am': { label: '9AM Handover', subtitle: 'Previous day · overnight tickets', icon: '☀️', cap: 24 * 60 },
  '12pm': { label: '12PM Update', subtitle: 'Today · up to 12:30 PM', icon: '🕛', cap: 12 * 60 + 30 },
  'midday': { label: '1–2PM Midday', subtitle: 'Today · up to 2:30 PM', icon: '🌤️', cap: 14 * 60 + 30 },
  'cob': { label: '4–5PM COB', subtitle: 'Today · close of business', icon: '🌆', cap: 24 * 60 }
};
function buildSlotPDF(slotId, day, tickets, user) {
  const s = SLOT_DEFS[slotId] || SLOT_DEFS['cob'];
  const filtered = slotId === '9am' ? tickets : tickets.filter((t) => parseTimeMins(t.time) <= s.cap);
  const res = filtered.filter((t) => t.status === 'resolved'),prg = filtered.filter((t) => t.status === 'progress'),unr = filtered.filter((t) => t.status === 'unresolved');
  const now = new Date().toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  const esc = e_;
  const tRow = (t, i) => `<tr><td>${i + 1}</td><td style="font-weight:800;color:#1D4ED8;font-family:monospace">#${esc(t.num)}</td><td>${esc(t.time)}</td><td style="font-weight:600">${esc(t.name || '—')}</td><td>${esc(t.phone || '—')}</td><td><span style="background:#DBEAFE;color:#1E3A8A;padding:2px 7px;border-radius:5px;font-size:13px;font-weight:700">${esc(t.bu || '—')}</span></td><td>${esc((t.category || '').split('/')[0].trim())}</td><td style="font-weight:700;color:#475569">${esc(getResp(t.category))}</td><td>${esc(t.resolutionNote || t.note || '—')}</td></tr>`;
  const sect = (title, list, color) => list.length ? `<h3 style="margin:18px 0 8px;color:${color};font-size:13px;font-weight:800;text-transform:uppercase">${title} — ${list.length} tickets</h3><table style="width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:13px"><thead><tr style="background:#0F172A;color:#fff"><th>#</th><th>Ticket</th><th>Time</th><th>Customer</th><th>Phone</th><th>BU</th><th>Category</th><th>Responsible</th><th>Note / Action</th></tr></thead><tbody>${list.map(tRow).join('')}</tbody></table>` : '';
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>EKEDP ${s.label}</title>
<link rel="icon" type="image/png" href="${APP_LOGO}">
<style>@page{size:A4 landscape;margin:12mm;}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,Segoe UI,Arial,sans-serif;padding:24px;background:#F1F5F9;color:#0F172A;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.header{background:linear-gradient(135deg,#001F5C,#1D4ED8);color:#fff;padding:20px 24px;border-radius:12px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.h-icon{width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.h-text h1{font-size:20px;font-weight:900;margin:0 0 3px;}.h-text .sub{font-size:13px;opacity:.8;}.h-text .meta{font-size:13px;opacity:.6;margin-top:3px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:#fff;border-radius:8px;padding:12px;text-align:center;border-top:3px solid var(--c);}
.kpi .n{font-size:28px;font-weight:900;color:var(--c);font-family:monospace;}.kpi .l{font-size:13px;color:#64748B;text-transform:uppercase;letter-spacing:.04em;margin-top:3px;}
thead th{padding:8px 9px;text-align:left;font-size:13px;text-transform:uppercase;letter-spacing:.04em;}
tbody td{padding:7px 9px;border-bottom:1px solid #F1F5F9;}
tbody tr:nth-child(even) td{background:#FAFBFE;}
.footer{margin-top:20px;padding-top:12px;border-top:1px solid #CBD5E1;font-size:13px;color:#64748B;display:flex;justify-content:space-between;}
.no-print{display:flex;gap:8px;margin-bottom:14px;}
.no-print button{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}
@media print{.no-print{display:none;}body{background:#fff;padding:0;}}</style></head>
<body><div class="no-print"><button style="background:#001F5C;color:#fff;" onclick="window.print()">🖨 Print / Save as PDF (Landscape A4)</button><button style="background:#E2E8F0;" onclick="window.close()">✕ Close</button></div>
<div class="header"><div class="h-icon" style="padding:0;overflow:hidden"><img src="${APP_LOGO}" style="width:100%;height:100%;object-fit:cover;border-radius:8px"></div><div class="h-text"><h1>EKEDP Power App — ${s.label}</h1><div class="sub">${s.subtitle}</div><div class="meta">Day ${day?.dayNum || '—'} · ${day?.dateBig || ''} · Generated ${now}${user ? ' · By ' + esc(user.name) : ''}</div></div></div>
<div class="kpis"><div class="kpi" style="--c:#1D4ED8"><div class="n">${filtered.length}</div><div class="l">Total</div></div><div class="kpi" style="--c:#16A34A"><div class="n">${res.length}</div><div class="l">Resolved</div></div><div class="kpi" style="--c:#D97706"><div class="n">${prg.length}</div><div class="l">In Progress</div></div><div class="kpi" style="--c:#DC2626"><div class="n">${unr.length}</div><div class="l">Unresolved</div></div></div>
${sect('✅ Resolved', res, '#16A34A')}${sect('⏳ In Progress', prg, '#D97706')}${sect('🔴 Unresolved — Action Needed', unr, '#DC2626')}
<div class="footer"><span>EKEDP Power App · Managers Hub · Marina HQ · Mobile App Channel</span><span>${s.label} · Day ${day?.dayNum || '—'} · ${day?.dateBig || ''}</span></div>
<script>window.matchMedia&&window.matchMedia('print').matches&&window.print();<\/script></body></html>`;
}

// ── TOAST ──────────────────────────────────────────────────────────
function Toast({ msg, type }) {
  const bg = type === 'error' ? 'rgba(220,38,38,.95)' : type === 'warn' ? 'rgba(217,119,6,.95)' : 'rgba(22,163,74,.95)';

// ── IMPORT SCREEN ──────────────────────────────────────────────────

  // ── JSON import (snapshot.json OR agent export) ──────────────────
  function handleJSON(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => {
      try {
        const j = JSON.parse(e.target.result);
        // FORMAT A: master snapshot {days:[...]}
        if (j.days && Array.isArray(j.days)) {
          const total = j.days.reduce((a, d) => a + d.tickets.length, 0);
          onImport(j.days, null);
          setLastLoaded({ file: file.name, days: j.days.length, tickets: total, type: 'Snapshot' });
          return;
        }
        // FORMAT B: agent export {tickets:[...], exportedBy:{...}}
        if (j.tickets && Array.isArray(j.tickets)) {
          const wat = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
          const dayN = wat.getDate();
          const dayBig = dayN + ' ' + wat.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase().replace(/\s/g, ' ');
          const converted = j.tickets.map((t) => ({
            id: t.id || 'tk_' + Math.random().toString(36).slice(2, 10),
            num: t.num || '', time: t.time || '', name: t.name || '', phone: t.phone || '',
            meter: t.meter || '', address: t.addr || t.address || '', email: '',
            bu: t.bu || '', channel: 'Mobile App',
            category: (t.category || '').split('—')[0].split('/')[0].trim() || t.category || '',
            subcategory: (t.category || '').includes('—') ? (t.category || '').split('—')[1].trim() : (t.category || '').includes('/') ? (t.category || '').split('/').slice(1).join('/').trim() : '',
            note: t.issue || t.note || '', assignee: t.resp || t.assignee || '',
            resolutionNote: t.resolutionNote || '', status: t.status || 'unresolved', locked: false
          }));
          const agentDay = { dayNum: dayN, dateBig: dayBig, year: wat.getFullYear() + ' · ' + wat.toLocaleDateString('en-GB', { weekday: 'long' }),
            tag: '📅 DAY ' + dayN, headerSub: 'Customer Experience · Marina HQ · Mobile App Channel',
            execSummary: '', tickets: converted,
            updatedBy: j.exportedBy?.name || 'Agent Import',
            updatedDate: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }) };
          onImport([agentDay], null);
          setLastLoaded({ file: file.name, days: 1, tickets: converted.length, type: 'Agent export — ' + (j.exportedBy?.name || 'unknown') });
          return;
        }
        showToast('Unrecognised JSON format — needs {days:[]} or {tickets:[]}', 'error');
      } catch (err) {showToast('Invalid JSON: ' + err.message, 'error');}
    };
    r.readAsText(file);
  }

  // ── Excel import (same logic as existing xlsxImp) ────────────────
  function handleExcel(file) {
    if (!file || typeof XLSX === 'undefined') return showToast('SheetJS not ready', 'error');
    const r = new FileReader();

      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });

        const snap = excelRowsToSnap(rows);
        if (!snap || !snap.days.length) return showToast('No tickets parsed from Excel', 'error');
        let nc = null;
        const cs = wb.Sheets['Dashboard'];
        if (cs) {const dr = XLSX.utils.sheet_to_json(cs, { defval: '' });let inC = false;const res = [];for (const row of dr) {const v = Object.values(row);const cat = v[1],nm = v[2];if (cat === 'Complaint Category') {inC = true;continue;}if (!inC) continue;if (!cat || cat === 'Total') break;res.push({ sn: res.length + 1, name: String(nm || ''), cat: String(cat), today: 0, res: +v[3] || 0, prog: +v[4] || 0, unres: +v[5] || 0, grand: +v[6] || 0, pct: Math.round((+v[7] || 0) * 100) });}if (res.length) nc = res;}
        const total = snap.days.reduce((a, d) => a + d.tickets.length, 0);
        onImport(snap.days, nc);
        setLastLoaded({ file: file.name, days: snap.days.length, tickets: total, type: 'Excel' });
      } catch (err) {showToast('Excel import error: ' + err.message, 'error');}
    };
    r.readAsArrayBuffer(file);
  }

  // ── OneDrive / SharePoint sync ───────────────────────────────────

    try {
      const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now());

    e.preventDefault();setDragging(false);

    if (f.name.endsWith('.json')) handleJSON(f);else
    if (f.name.match(/\.xlsx?$/i)) handleExcel(f);else
    showToast('Drop a .json or .xlsx file', 'error');
  }

  return (

          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#4ADE80' }}>{lastLoaded.file}</div>
            <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 2 }}>{lastLoaded.type} · {lastLoaded.days} day{lastLoaded.days !== 1 ? 's' : ''} · {lastLoaded.tickets} tickets loaded → go to Dashboard</div>
          </div>
        </div>

      {/* Drop zone */}
      <div
        onDragOver={(e) => {e.preventDefault();setDragging(true);}}

        style={{

        <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--text)', marginBottom: 6 }}>

        <div style={{ fontSize: 13, color: 'var(--muted)' }}>
          <code style={{ color: '#93C5FD', background: 'rgba(147,197,253,.1)', padding: '2px 6px', borderRadius: 4 }}>snapshot.json</code>
          {'  ·  '}
          <code style={{ color: '#93C5FD', background: 'rgba(147,197,253,.1)', padding: '2px 6px', borderRadius: 4 }}>ekedp_agent_*.json</code>
          {'  ·  '}
          <code style={{ color: '#4ADE80', background: 'rgba(74,222,128,.1)', padding: '2px 6px', borderRadius: 4 }}>.xlsx</code>
        </div>
        <input ref={fileRef} type="file" accept=".json" style={{ display: 'none' }} onChange={(e) => {if (e.target.files[0]) handleJSON(e.target.files[0]);e.target.value = '';}} />
      </div>

      {/* Explicit buttons */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 24 }}>

          <span style={{ fontSize: 24 }}>📋</span>

// ── SYNC SCREEN ────────────────────────────────────────────────────
function SyncScreen({ onImport, showToast, days }) {
  const [syncUrl, setSyncUrl] = useState(() => localStorage.getItem('po_syncUrl') || '');
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(() => localStorage.getItem('po_lastSync') || null);

        {[{ l: 'Days Loaded', v: days.length, c: '#3B82F6' }, { l: 'Total Tickets', v: totalTickets, c: '#8B5CF6' }, { l: 'Last Sync', v: lastSync || 'Never', c: lastSync ? '#4ADE80' : '#F87171', sm: true }].map((k) =>
        <div key={k.l} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 16px' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 4 }}>{k.l}</div>
            <div style={{ fontSize: k.sm ? 13 : 22, fontWeight: 800, color: k.c, fontFamily: k.sm ? 'inherit' : "'JetBrains Mono',monospace" }}>{k.v}</div>
          </div>
        )}
      </div>

      {/* Drag & drop zone */}
      <div onDragOver={(e) => {e.preventDefault();setDragging(true);}} onDragLeave={() => setDragging(false)} onDrop={onDrop}
      style={{ border: `2px dashed ${dragging ? '#FFC72C' : 'var(--border)'}`, borderRadius: 12, padding: '28px', textAlign: 'center', marginBottom: 16, background: dragging ? 'rgba(255,199,44,.06)' : 'rgba(255,255,255,.02)', transition: 'all .2s', cursor: 'pointer' }}
      onClick={() => jsonRef.current?.click()}>
        <div style={{ fontSize: 36, marginBottom: 8 }}>📁</div>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)', marginBottom: 6 }}>Click or drag & drop your file here</div>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
          {['snapshot.json', 'ekedp_agent_*.json', '.xlsx'].map((t) => <span key={t} style={{ fontSize: 13, padding: '3px 10px', borderRadius: 6, background: 'rgba(255,255,255,.07)', color: 'var(--muted)', fontFamily: "'JetBrains Mono',monospace" }}>{t}</span>)}
        </div>
        <input ref={jsonRef} type="file" accept=".json" style={{ display: 'none' }} onChange={(e) => {if (e.target.files[0]) handleJSON(e.target.files[0]);e.target.value = '';}} />
      </div>

      {/* 3 action buttons */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 20 }}>
        <button onClick={() => jsonRef.current?.click()} style={{ padding: '18px', background: '#001F5C', border: '1px solid #1E3070', borderRadius: 12, color: '#fff', fontFamily: 'inherit', cursor: 'pointer', textAlign: 'center' }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>📋</div>
          <div style={{ fontSize: 14, fontWeight: 800 }}>Import JSON</div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,.55)', marginTop: 3 }}>snapshot / agent export</div>
        </button>
        <button onClick={() => xlsRef.current?.click()} style={{ padding: '18px', background: '#14532D', border: '1px solid #16A34A', borderRadius: 12, color: '#fff', fontFamily: 'inherit', cursor: 'pointer', textAlign: 'center' }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>📊</div>
          <div style={{ fontSize: 14, fontWeight: 800 }}>Import Excel</div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,.55)', marginTop: 3 }}>"All Complaint" sheet</div>
        </button>
        <button onClick={doSync} disabled={syncing || !syncUrl} style={{ padding: '18px', background: syncing || !syncUrl ? 'rgba(220,38,38,.3)' : '#991B1B', border: '1px solid #E30613', borderRadius: 12, color: '#fff', fontFamily: 'inherit', cursor: syncing || !syncUrl ? 'default' : 'pointer', textAlign: 'center' }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>{syncing ? '⏳' : '🔄'}</div>
          <div style={{ fontSize: 14, fontWeight: 800 }}>{syncing ? 'Syncing…' : 'Sync OneDrive'}</div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,.55)', marginTop: 3 }}>fetch from saved URL</div>
        </button>
        <input ref={xlsRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={(e) => {if (e.target.files[0]) handleExcel(e.target.files[0]);e.target.value = '';}} />
      </div>

      {/* OneDrive URL */}
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px', marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: '#FFC72C', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 10 }}>☁️ OneDrive / SharePoint Sync URL</div>
        <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 10, padding: '8px 12px', background: 'rgba(255,199,44,.06)', borderRadius: 8, border: '1px solid rgba(255,199,44,.15)' }}>
          💡 Upload your JSON to OneDrive → Share with "Anyone with link" → paste URL below → click Sync. Format: <span style={{ color: '#FFC72C', fontFamily: "'JetBrains Mono',monospace" }}>https://1drv.ms/u/s!Axx...?download=1</span>
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
          <input value={syncUrl} onChange={(e) => setSyncUrl(e.target.value)} placeholder="https://ekedp-my.sharepoint.com/personal/love_offei_ekedp_com/_layouts/15/download.aspx…"
          style={{ flex: 1, padding: '10px 12px', background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 8, fontFamily: "'JetBrains Mono',monospace", fontSize: 13, outline: 'none' }} />
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          <button onClick={() => {localStorage.setItem('po_syncUrl', syncUrl);showToast('💾 URL saved');}} style={{ padding: '9px 16px', background: '#001F5C', border: '1px solid #1E3070', borderRadius: 8, color: '#fff', fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>💾 Save URL</button>
          <button onClick={doSync} disabled={syncing || !syncUrl} style={{ padding: '9px 16px', background: syncing || !syncUrl ? 'var(--sub)' : '#E30613', border: 'none', borderRadius: 8, color: '#fff', fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: syncing || !syncUrl ? 'default' : 'pointer' }}>🔄 {syncing ? 'Syncing…' : 'Sync now → push to all hubs'}</button>
          <button onClick={() => {localStorage.setItem('po_autoSync', autoSync ? '0' : '1');setAutoSync(!autoSync);showToast(autoSync ? 'Auto-sync OFF' : '✅ Auto-sync ON');}} style={{ padding: '9px 16px', background: autoSync ? 'rgba(22,163,74,.2)' : 'var(--surface)', border: `1px solid ${autoSync ? '#16A34A' : 'var(--border)'}`, borderRadius: 8, color: autoSync ? '#4ADE80' : 'var(--muted)', fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
            {autoSync ? '✅ Auto-sync ON' : '⭕ Auto-sync OFF'}
          </button>
        </div>
      </div>

      {/* Format guide */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 16 }}>
        {[
        { t: 'SNAPSHOT.JSON', c: '#93C5FD', icon: '📋', items: ['Master file from OneDrive', 'Contains all days & tickets', 'Overwrites all current data', 'What Love shares with agents'] },
        { t: 'AGENT EXPORT .JSON', c: '#4ADE80', icon: '📤', items: ["Any agent's daily export", 'Loads as today\'s day', 'Maps to master format', 'Good for manual handovers'] },
        { t: 'EXCEL (.XLSX)', c: '#FCD34D', icon: '📊', items: ['"All Complaint" sheet required', 'Parses by date into days', 'Also reads Dashboard sheet', 'Same as existing Settings import'] }].
        map((f) =>
        <div key={f.t} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 16px' }}>
            <div style={{ fontSize: 20, marginBottom: 8 }}>{f.icon}</div>
            <div style={{ fontSize: 13, fontWeight: 800, color: f.c, letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 8 }}>{f.t}</div>
            {f.items.map((i) => <div key={i} style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 4, display: 'flex', gap: 6, alignItems: 'flex-start' }}><span style={{ color: f.c, flexShrink: 0 }}>·</span>{i}</div>)}
          </div>
        )}
      </div>

      {/* PA guide */}
      <div style={{ background: 'rgba(245,158,11,.08)', border: '1px solid rgba(245,158,11,.25)', borderRadius: 12, padding: '16px 18px' }}>
        <div style={{ fontSize: 13, fontWeight: 800, color: '#FCD34D', marginBottom: 8 }}>⚡ Power Automate wiring (one time)</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
          {['Open your Daily Report flow in Power Automate', 'Add "Create file" → OneDrive for Business at the end', 'Folder: /EKEDP CX Live/ · File: ekedp-cx-live.json', 'File content: JSON snapshot expression (ask Claude)', 'Share file → "Anyone with the link" → copy link', 'Paste link above → Save → Done ✅'].map((s, i) =>
          <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
              <div style={{ width: 18, height: 18, borderRadius: '50%', background: 'rgba(245,158,11,.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 800, color: '#FCD34D', flexShrink: 0, marginTop: 1 }}>{i + 1}</div>
              <div style={{ fontSize: 13, color: 'rgba(255,255,255,.75)', lineHeight: 1.5 }}>{s}</div>
            </div>
          )}
        </div>
      </div>
    </div>);

}

  { href: 'reports/gm_report.html', icon: '📧', title: 'Email Report', sub: '9 AM · 12 PM · 4 PM',

    tags: ['WHATSAPP', 'PRINT', 'PDF'], accent: '#16A34A', tagColor: '#4ADE80' }];

  { label: '📧 EMAIL REPORTS', sub: '9 AM · 12 PM · 4 PM', reports: REPORTS.slice(0, 2) }, { label: '💬 FOR THE WHATSAPP GROUP', sub: '9 AM · 12 PM · 1–2 PM · 4–5 PM', reports: REPORTS.slice(2) }];

  return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg,#0C0118 0%,#1B0444 50%,#2A0860 100%)', padding: '28px' }}>

        <div style={{ fontSize: 13, fontWeight: 700, color: '#A78BFA', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 6 }}>EKEDP POWER APP · REPORTS</div>
        <h2 style={{ fontSize: 22, fontWeight: 900, color: '#fff', marginBottom: 4 }}>Reports</h2>
        <p style={{ fontSize: 13, color: '#A78BFA' }}>Printable & exportable reports for the team and the WhatsApp group.</p>
      </div>

      {SECTIONS.map((sec) =>
      <div key={sec.label} style={{ marginBottom: 28 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14, paddingBottom: 10, borderBottom: '1px solid rgba(167,139,250,.2)' }}>
            <span style={{ fontSize: 13, fontWeight: 800, color: '#FFC72C', letterSpacing: '.08em', textTransform: 'uppercase' }}>{sec.label}</span>
            <span style={{ fontSize: 13, color: '#7C3AED' }}>{sec.sub}</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(300px,1fr))', gap: 14 }}>
            {sec.reports.map((r) =>
          <a key={r.href} href={r.href} target="_blank" rel="noopener" style={{
            display: 'flex', flexDirection: 'column', gap: 10,
            background: 'rgba(255,255,255,.05)', border: '1px solid rgba(167,139,250,.2)',
            borderRadius: 14, padding: '18px 20px', textDecoration: 'none', color: '#fff',
            position: 'relative', overflow: 'hidden', transition: 'all .18s'
          }}
          onMouseEnter={(e) => {e.currentTarget.style.borderColor = r.accent;e.currentTarget.style.background = 'rgba(255,255,255,.09)';e.currentTarget.style.transform = 'translateY(-2px)';}}
          onMouseLeave={(e) => {e.currentTarget.style.borderColor = 'rgba(167,139,250,.2)';e.currentTarget.style.background = 'rgba(255,255,255,.05)';e.currentTarget.style.transform = 'translateY(0)';}}>
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: r.accent }} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 10, background: 'rgba(255,255,255,.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, flexShrink: 0 }}>{r.icon}</div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 800, color: '#fff' }}>{r.title}</div>
                    <div style={{ fontSize: 13, color: '#A78BFA', marginTop: 2 }}>{r.sub}</div>
                  </div>
                </div>
                <p style={{ fontSize: 13, color: 'rgba(255,255,255,.7)', margin: 0, lineHeight: 1.55 }}>{r.desc}</p>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {r.tags.map((t) => <span key={t} style={{ fontSize: 13, fontWeight: 700, padding: '3px 8px', borderRadius: 6, textTransform: 'uppercase', letterSpacing: '.06em', background: 'rgba(255,255,255,.08)', color: r.tagColor, border: `1px solid ${r.accent}44` }}>{t}</span>)}
                </div>
                <div style={{ fontSize: 13, fontWeight: 800, color: r.accent, display: 'flex', alignItems: 'center', gap: 5 }}>Open → <span style={{ fontSize: 13, opacity: .7 }}>(new tab)</span></div>
              </a>
          )}
          </div>
        </div>
      )}

      <div style={{ padding: '14px 18px', background: 'rgba(124,58,237,.12)', border: '1px dashed rgba(124,58,237,.35)', borderRadius: 10, display: 'flex', alignItems: 'flex-start', gap: 12 }}>
        <span style={{ fontSize: 20, flexShrink: 0 }}>💡</span>
        <div style={{ fontSize: 13, color: 'rgba(255,255,255,.75)', lineHeight: 1.6 }}>
          Each report opens in a new tab so you can size it for printing. Use <strong style={{ color: '#fff' }}>Print → Save as PDF</strong> for WhatsApp slot reports, <strong style={{ color: '#fff' }}>Copy as Email</strong> for the GM report (paste straight into Outlook), or <strong style={{ color: '#fff' }}>Export to Excel</strong> when you need to attach the workbook.
        </div>
      </div>
    </div>);

}

          // Convert UTC date to WAT date
          const d = new Date(cols[iDate]);
          const wat = new Date(d.getTime() + 60*60*1000);
          const date = wat.getUTCFullYear()+'-'+String(wat.getUTCMonth()+1).padStart(2,'0')+'-'+String(wat.getUTCDate()).padStart(2,'0');
          const s = cols[iShift] || 'Off';
          const shift = s === 'Day' ? 'Day' : s === 'Night' ? 'Night' : 'Off';
          next[date+'|'+aid] = {shift, shadow: !!(cols[iShadow]), manual: false};
          count++;
        }
        if (!count) { alert('No valid rows found in CSV'); setImporting(false); return; }
        saveRoster(next);
        setImporting(false);
        alert('✅ Roster imported — ' + count + ' entries refreshed');
      } catch(err) {
        alert('CSV parse error: ' + err.message);
        setImporting(false);
      }
    };
    r.readAsText(file);
  }

  // ─── COUNTS ──────────────────────────────────────────────
  const todayAgents = AGENTS.map(a => ({...a, entry: getEntry(todayStr, a.id)}));
  const onShiftToday = todayAgents.filter(a => a.entry.shift === 'Day' || a.entry.shift === 'Night').length;
  const offToday = AGENTS.length - onShiftToday;
  const manualOverrides = Object.values(roster).filter(v => v.manual).length;

  // Agent ticket stats
  const agentStats = useMemo(() => {
    const all = (days || []).flatMap(d => d.tickets || []);
    const stats = {};
    AGENTS.forEach(a => { stats[a.id] = {total:0, res:0}; });
    all.forEach(t => {
      const resp = (t.assignee || t.responsible || t.resp || '').toLowerCase();
      AGENTS.forEach(a => {
        if (resp.includes(a.name.split(' ')[0].toLowerCase())) {
          stats[a.id].total++;
          if (t.status === 'resolved') stats[a.id].res++;
        }
      });
    });
    return stats;
  }, [days]);

  const watDate = new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'})).toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'});

  return (
    <div style={{padding:'22px 28px'}}>
      {/* HEADER */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:12, marginBottom:18}}>

          <p style={{font:'500 12px/1.4 Sora,sans-serif', color:'var(--muted)', margin:'4px 0 0'}}>
            {watDate} · <span style={{color:'#4ADE80', fontWeight:700}}>{onShiftToday} on shift</span> · <span style={{color:'#9CA3AF'}}>{offToday} off</span>
            {manualOverrides > 0 && <span style={{color:'#FCD34D', marginLeft:8}}>· ⚡ {manualOverrides} manual edit{manualOverrides>1?'s':''}</span>}
          </p>
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {manualOverrides > 0 && (
            <button onClick={() => { if (confirm('Reset all manual edits and re-seed from default roster?')) { saveRoster(flatten(ROSTER_SEED)); } }}

      <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:12, marginBottom:22}}>

          const st = agentStats[agent.id] || {total:0, res:0};
          const pct = st.total ? Math.round(st.res/st.total*100) : 0;
          const photo = PHOTOS[agent.id];

          return (
            <div key={agent.id} style={{

              <div style={{padding:'14px 14px'}}>
                <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
                  {photo ? (
                    <img src={photo} alt={agent.name} style={{width:42,height:42,borderRadius:'50%',objectFit:'cover',border:`2px solid ${agent.color}`,boxShadow:`0 3px 10px ${agent.color}44`,flexShrink:0}}/>
                  ) : (
                    <div style={{width:42,height:42,borderRadius:'50%',background:agent.tint,border:`2px solid ${agent.color}`,display:'flex',alignItems:'center',justifyContent:'center',font:'800 14px/1 Sora,sans-serif',color:'#fff',flexShrink:0}}>{agent.initials}</div>

                  <div style={{minWidth:0, flex:1}}>
                    <div style={{font:'800 12.5px/1.1 Sora,sans-serif', color:'var(--text)'}}>{agent.name}</div>
                    {agent.entry.manual && <span style={{fontSize:8, fontWeight:700, padding:'2px 5px', borderRadius:4, background:'rgba(245,158,11,.20)', color:'#FCD34D', border:'1px solid rgba(245,158,11,.35)', marginTop:3, display:'inline-block'}}>EDITED</span>}

                <div style={{
                  display:'flex', alignItems:'center', gap:6, padding:'5px 10px',

                  <div style={{minWidth:0, flex:1}}>
                    <div style={{font:'700 10.5px/1 Sora,sans-serif', color:sm.color}}>{sm.label}</div>

                  {[{l:'Tix',v:st.total,c:'#93C5FD'},{l:'Res',v:st.res,c:'#4ADE80'},{l:'%',v:pct+'%',c:pct>=80?'#4ADE80':pct>=50?'#FCD34D':'#F87171'}].map(k=>(

                </div>

                <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:3}}>
                  {SHIFT_CYCLE.map(s => {
                    const m = SHIFT_META[s];
                    const on = agent.entry.shift === s;
                    return (
                      <button key={s} onClick={() => setShift(todayStr, agent.id, s)} title={m.label} style={{
                        padding:'6px 2px', borderRadius:6, cursor:'pointer',
                        border: on ? `2px solid ${agent.color}` : '1px solid rgba(255,255,255,.10)',

              </div>
            </div>
          );
        })}
      </div>

      {/* ─── WEEK CALENDAR ─── */}
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:10, marginBottom:10}}>
        <div style={{display:'flex', alignItems:'center', gap:8, color:'var(--muted)', font:'700 11px Sora,sans-serif', textTransform:'uppercase', letterSpacing:'.10em'}}>
          <span style={{fontSize:13}}>🗓️</span> Week of {weekDays[0]?.dayNum} {weekDays[0]?.month} — click any cell to edit
        </div>
        <div style={{display:'flex', gap:6}}>
          <button onClick={() => shiftWeek(-1)} style={{padding:'6px 12px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:7, color:'var(--text)', fontFamily:'inherit', fontSize:12, fontWeight:700, cursor:'pointer'}}>← Prev</button>

      <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, overflow:'hidden'}}>

                  borderRight: '1px solid var(--border)',

                  <div style={{font:'700 10px Sora,sans-serif'}}>{d.weekday}</div>
                  <div style={{font:`800 16px/1 'JetBrains Mono',monospace`, color: d.isToday ? '#FCD34D' : 'var(--text)', marginTop:2}}>{d.dayNum}</div>

              ))}
            </tr>

          <tbody>
            {AGENTS.map(agent => (

                <td style={{padding:'10px 14px', borderRight:'1px solid var(--border)'}}>
                  <div style={{display:'flex', alignItems:'center', gap:9}}>
