function parseTimeMins(s){if(!s)return 0;const m=String(s).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);if(!m)return 0;let h=+m[1],mm=+m[2];const ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+mm;}

function excelRowsToSnap(rows){
  const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const WEEK=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const days={};
  const valids=rows.map(r=>+r['Date/Time Received']).filter(s=>s>0);
  if(!valids.length)return null;
  const base=Math.floor(Math.min(...valids));
  function statusMap(s){const u=String(s||'').toUpperCase().trim();if(u.startsWith('RESOLVED'))return'resolved';if(u.startsWith('IN PROGRESS'))return'progress';return'unresolved';}
  rows.forEach(r=>{
    const issue=String(r['Issue']||'');const parts=issue.split('/').map(s=>s.trim());
    const cat=(parts[0]||r['Category']||'GENERAL').toUpperCase();const sub=(parts.slice(1).join('/')||'').toUpperCase();
    const tk={id:'tk_'+Math.random().toString(36).slice(2,10),num:String(r['Ticket']||''),time:String(r['Time']||''),name:String(r['Customer']||''),phone:String(r['Phone']||''),meter:String(r['METER_NUMBER']||'').replace(/^'\s*/,'').trim(),address:String(r['Address']||''),email:'',bu:String(r['Business District']||''),channel:String(r['CHANNEL OF COMPLAINT']||'Mobile App'),category:cat,subcategory:sub,note:issue,assignee:String(r['Assignee']||''),resolutionNote:String(r['Action Taken']||''),status:statusMap(r['Status']),locked:false};
    const serial=+r['Date/Time Received'];
    if(serial>0){const d=new Date((Math.floor(serial)-25569)*86400*1000);const dom=d.getUTCDate(),mon=d.getUTCMonth(),yr=d.getUTCFullYear(),dayNum=Math.floor(serial)-base+1;const key=yr+'-'+(mon+1)+'-'+dom;if(!days[key])days[key]={dayNum,dateBig:dom+' '+MONTHS[mon],year:yr+' · '+WEEK[d.getUTCDay()],tag:'📅 DAY '+dayNum,headerSub:'Customer Experience · Marina HQ · Mobile App Channel',tickets:[]};days[key].tickets.push(tk);}
  });
  return{days:Object.values(days).sort((a,b)=>a.dayNum-b.dayNum)};

<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

// ── HELPERS ────────────────────────────────────────────────────────
const e_=(s)=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const StatusBadge=({s})=>{const m={resolved:['b-res','✅ Resolved'],progress:['b-prg','⏳ Progress'],unresolved:['b-unr','🔴 Unresolved']};const[cl,lbl]=m[s]||['b-unr','—'];return <span className={`badge ${cl}`}>{lbl}</span>;};
const BuPill=({bu})=><span className="badge b-bu">{bu||'—'}</span>;

// ── SIGN IN ────────────────────────────────────────────────────────
function SignIn({onLogin}){
  const[email,setEmail]=useState('');const[pw,setPw]=useState('');const[err,setErr]=useState('');const[show,setShow]=useState(false);

  function submit(){
    const t=team;if(!t.length){if(!email.includes('@'))return setErr('Enter a valid email');if(pw.length<4)return setErr('Password must be 4+ characters');const m={id:'u_'+Math.random().toString(36).slice(2,8),name:'Admin',email:email.toLowerCase(),passHash:hashPw(pw),role:'admin',addedAt:Date.now()};const nt=[m];save('po_team',nt);setTeam(nt);onLogin({id:m.id,name:m.name,email:m.email,role:'admin'});return;}
    const m=t.find(x=>x.email.toLowerCase()===email.toLowerCase());if(!m)return setErr('No account for that email');if(m.passHash!==hashPw(pw))return setErr('Wrong password');onLogin({id:m.id,name:m.name,email:m.email,role:m.role});
  }
  const isFirst=team.length===0;
  return(
    <div className="si-wrap">
      <div className="si-card">
        <div style={{marginBottom:12}}>
          <a href="../../index.html" style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:12,color:'#64748B',textDecoration:'none',fontWeight:600,padding:'6px 10px',border:'1px solid #E2E8F0',borderRadius:8,background:'#F8FAFC'}}>← Home</a>
        </div>
        <div className="si-logo">

          <div><div className="si-name">EKEDP <span style={{color:'#1D4ED8'}}>Power App</span></div><div className="si-sub">Managers Hub · Marina HQ</div></div>
        </div>
        <div style={{fontSize:18,fontWeight:800,color:'#0F1E4F',marginBottom:4}}>{isFirst?'Set up admin account':'Welcome back 👋'}</div>
        <div style={{fontSize:12,color:'#475569',marginBottom:16}}>{isFirst?'First user — you become the admin.':'Sign in to your access.'}</div>
        <div className="si-field-row"><input type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        <div className="si-field-row"><input type={show?'text':'password'} placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/><button onClick={()=>setShow(s=>!s)} style={{background:'none',border:'none',color:'#1D4ED8',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{show?'HIDE':'SHOW'}</button></div>
        {err&&<div className="si-err">⚠ {err}</div>}
        <button className="si-btn" onClick={submit}>{isFirst?'Create account →':'Sign in →'}</button>
        <div className="si-foot">{isFirst?'':'No account? Ask your admin.'}</div>
        <div style={{textAlign:'center',marginTop:8}}><button onClick={()=>{if(confirm('Reset all accounts? Data and theme stay.')){{localStorage.removeItem('po_team');localStorage.removeItem('po_user');setTeam([]);setErr('');}}}} style={{background:'none',border:'none',color:'#94A3B8',fontSize:11,cursor:'pointer',fontFamily:'inherit',textDecoration:'underline'}}>Reset access</button></div>
      </div>
    </div>
  );
}

// ── CUMULATIVE ─────────────────────────────────────────────────────
function Cumulative({cum}){
  const gR=cum.reduce((a,r)=>a+r.res,0),gP=cum.reduce((a,r)=>a+r.prog,0),gU=cum.reduce((a,r)=>a+r.unres,0),gG=cum.reduce((a,r)=>a+r.grand,0),gPct=gG?Math.round(gR/gG*100):0;
  return(
    <div style={{padding:'22px 28px'}}>
      <div style={{marginBottom:20}}><h2 style={{fontSize:17,fontWeight:800}}>📊 Cumulative Complaint Tracker</h2><p style={{fontSize:11,color:'var(--muted)',marginTop:3}}>All days · Mobile App Channel</p></div>
      <div className="kpi-grid-4" style={{marginBottom:20}}>
        {[{l:'Grand Total',v:gG,c:'#3B82F6'},{l:'Cumul. Resolved',v:gR,c:'#16A34A'},{l:'In Progress',v:gP,c:'#D97706'},{l:'Unresolved',v:gU,c:'#DC2626'}].map(k=>(
          <div key={k.l} className="kc" style={{'--cc':k.c}}><div className="kl">{k.l}</div><div className="kv" style={{color:k.c}}>{k.v}</div></div>
        ))}

        <div className="twrap-h"><h3>Resolution by Responsible Party</h3></div>
        <div style={{overflowX:'auto'}}>
          <table className="ctbl">
            <thead><tr><th>S/N</th><th>Category</th><th>Responsible Party</th><th className="r">Today</th><th className="r">Resolved</th><th className="r">In Progress</th><th className="r">Unresolved</th><th className="r">Grand Total</th><th className="r">% Resolution</th></tr></thead>
            <tbody>
              {cum.map((r,i)=>{const g=r.grand||0;const pct=r.pct||0;const pc=pct>=80?'ph':pct>=50?'pm':'pl';return(
                <tr key={r.sn} style={{background:i%2===1?'rgba(0,0,0,.15)':'transparent'}}>

                  <td className="r" style={{color:'#93C5FD',fontWeight:800,fontSize:13}}>{g}</td>
                  <td className="r">{g>0?<span className={`pct-pill ${pc}`}>{pct}%</span>:<span style={{color:'var(--sub)'}}>—</span>}</td>
                </tr>

            </tbody>

              <tr style={{background:'rgba(0,31,92,.5)',borderTop:'2px solid var(--border)'}}>

                <td className="r" style={{fontWeight:800}}>{cum.reduce((a,r)=>a+r.today,0)}</td>

// ── ANALYTICS ─────────────────────────────────────────────────────
function Analytics({days}){
  const all=useMemo(()=>days.flatMap(d=>d.tickets),[days]);
  const cats=useMemo(()=>{const m={};all.forEach(t=>{const c=(t.category||'General').split('/')[0].trim();m[c]=(m[c]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8);},[all]);
  const bus=useMemo(()=>{const m={};all.forEach(t=>{if(t.bu)m[t.bu]=(m[t.bu]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8);},[all]);
  const mx=Math.max(...(cats.map(([,v])=>v)||[1]));const bx=Math.max(...(bus.map(([,v])=>v)||[1]));
  const res=all.filter(t=>t.status==='resolved').length,prg=all.filter(t=>t.status==='progress').length,unr=all.filter(t=>t.status==='unresolved').length,tot=all.length||1;
  const trendMax=Math.max(...days.map(d=>d.tickets.length),1);
  const Chart=({data,max,fill})=><div style={{display:'flex',flexDirection:'column',gap:6}}>{data.map(([k,v])=><div key={k} className="bar-row"><div className="bar-lbl" title={k}>{k}</div><div className="bar-track"><div className="bar-fill" style={{width:Math.round(v/max*100)+'%',background:fill}}/></div><div className="bar-val">{v}</div></div>)}</div>;
  return(
    <div style={{padding:'22px 28px'}}>
      <div style={{marginBottom:16}}><h2 style={{fontSize:17,fontWeight:800}}>📈 Analytics & Insights</h2><p style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{days.length} days · {all.length} complaints · Mobile App Channel</p></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>

        <div className="twrap"><div className="twrap-h"><h3>Business Unit Volume</h3></div><div style={{padding:16}}><Chart data={bus} max={bx} fill="linear-gradient(90deg,#1D4ED8,#60A5FA)"/></div></div>
      </div>
      <div className="twrap" style={{marginBottom:16}}>
        <div className="twrap-h"><h3>Daily Volume Trend</h3></div>
        <div style={{padding:'16px 20px'}}>
          <div style={{display:'flex',alignItems:'flex-end',gap:4,height:100}}>
            {days.map(d=><div key={d.dayNum} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,height:'100%',justifyContent:'flex-end'}}>
              <div style={{width:'100%',borderRadius:'3px 3px 0 0',background:'rgba(59,130,246,.5)',minHeight:3,height:Math.round(d.tickets.length/trendMax*100)+'%'}}/>
              <div style={{fontSize:8,color:'var(--muted)',fontFamily:"'JetBrains Mono',monospace"}}>{d.dayNum}</div>
            </div>)}
          </div>
        </div>
      </div>
      <div className="twrap">
        <div className="twrap-h"><h3>Status Distribution</h3></div>
        <div style={{padding:16}}>
          {[['Resolved',res,'#4ADE80'],['In Progress',prg,'#FCD34D'],['Unresolved',unr,'#F87171']].map(([l,v,c])=>(
            <div key={l} style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:12,color:c,fontWeight:600}}>{l}</span>
                <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{v} ({Math.round(v/tot*100)}%)</span>

}

            ))}

            <button onClick={doXlsx} style={{padding:'14px',background:'#16A34A',color:'#fff',border:'none',borderRadius:10,fontFamily:'inherit',fontSize:13,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>📊 Export Excel<br/><small style={{fontWeight:500,fontSize:11}}>4 sheets</small></button>

// ── TOAST ──────────────────────────────────────────────────────────
function Toast({msg,type}){
  const bg=type==='error'?'rgba(220,38,38,.95)':type==='warn'?'rgba(217,119,6,.95)':'rgba(22,163,74,.95)';
  return<div className="toast" style={{background:bg}}>{msg}</div>;
}

// ── IMPORT SCREEN ──────────────────────────────────────────────────
function ImportScreen({onImport,showToast}){
  const fileRef=useRef(null);
  const xlsRef=useRef(null);
  const[dragging,setDragging]=useState(false);
  const[syncUrl,setSyncUrl]=useState(()=>localStorage.getItem('po_syncUrl')||'');
  const[syncing,setSyncing]=useState(false);
  const[lastLoaded,setLastLoaded]=useState(null);

  // ── JSON import (snapshot.json OR agent export) ──────────────────
  function handleJSON(file){
    if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const j=JSON.parse(e.target.result);
        // FORMAT A: master snapshot {days:[...]}
        if(j.days&&Array.isArray(j.days)){
          const total=j.days.reduce((a,d)=>a+d.tickets.length,0);
          onImport(j.days,null);
          setLastLoaded({file:file.name,days:j.days.length,tickets:total,type:'Snapshot'});
          return;
        }
        // FORMAT B: agent export {tickets:[...], exportedBy:{...}}
        if(j.tickets&&Array.isArray(j.tickets)){
          const wat=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
          const dayN=wat.getDate();
          const dayBig=dayN+' '+wat.toLocaleDateString('en-GB',{month:'short'}).toUpperCase().replace(/\s/g,' ');
          const converted=j.tickets.map(t=>({
            id:t.id||'tk_'+Math.random().toString(36).slice(2,10),
            num:t.num||'',time:t.time||'',name:t.name||'',phone:t.phone||'',
            meter:t.meter||'',address:t.addr||t.address||'',email:'',
            bu:t.bu||'',channel:'Mobile App',
            category:(t.category||'').split('—')[0].split('/')[0].trim()||t.category||'',
            subcategory:(t.category||'').includes('—')?(t.category||'').split('—')[1].trim():(t.category||'').includes('/')?(t.category||'').split('/').slice(1).join('/').trim():'',
            note:t.issue||t.note||'',assignee:t.resp||t.assignee||'',
            resolutionNote:t.resolutionNote||'',status:t.status||'unresolved',locked:false,
          }));
          const agentDay={dayNum:dayN,dateBig:dayBig,year:wat.getFullYear()+' · '+wat.toLocaleDateString('en-GB',{weekday:'long'}),
            tag:'📅 DAY '+dayN,headerSub:'Customer Experience · Marina HQ · Mobile App Channel',
            execSummary:'',tickets:converted,
            updatedBy:j.exportedBy?.name||'Agent Import',
            updatedDate:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})};
          onImport([agentDay],null);
          setLastLoaded({file:file.name,days:1,tickets:converted.length,type:'Agent export — '+( j.exportedBy?.name||'unknown')});
          return;
        }
        showToast('Unrecognised JSON format — needs {days:[]} or {tickets:[]}','error');
      }catch(err){showToast('Invalid JSON: '+err.message,'error');}
    };
    r.readAsText(file);
  }

  // ── Excel import (same logic as existing xlsxImp) ────────────────
  function handleExcel(file){
    if(!file||typeof XLSX==='undefined')return showToast('SheetJS not ready','error');
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const sheet=wb.Sheets['All Complaint']||wb.Sheets[wb.SheetNames[0]];
        if(!sheet)return showToast('No "All Complaint" sheet found','error');
        const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
        const snap=excelRowsToSnap(rows);
        if(!snap||!snap.days.length)return showToast('No tickets parsed from Excel','error');
        let nc=null;
        const cs=wb.Sheets['Dashboard'];
        if(cs){const dr=XLSX.utils.sheet_to_json(cs,{defval:''});let inC=false;const res=[];for(const row of dr){const v=Object.values(row);const cat=v[1],nm=v[2];if(cat==='Complaint Category'){inC=true;continue;}if(!inC)continue;if(!cat||cat==='Total')break;res.push({sn:res.length+1,name:String(nm||''),cat:String(cat),today:0,res:+v[3]||0,prog:+v[4]||0,unres:+v[5]||0,grand:+v[6]||0,pct:Math.round((+v[7]||0)*100)});}if(res.length)nc=res;}
        const total=snap.days.reduce((a,d)=>a+d.tickets.length,0);
        onImport(snap.days,nc);
        setLastLoaded({file:file.name,days:snap.days.length,tickets:total,type:'Excel'});
      }catch(err){showToast('Excel import error: '+err.message,'error');}
    };
    r.readAsArrayBuffer(file);
  }

  // ── OneDrive / SharePoint sync ───────────────────────────────────
  async function doSync(){
    const url=syncUrl.trim()||localStorage.getItem('po_syncUrl')||'';
    if(!url)return showToast('Paste a sync URL first','error');
    setSyncing(true);
    try{
      const res=await fetch(url+(url.includes('?')?'&':'?')+'t='+Date.now());
      if(!res.ok)throw new Error('HTTP '+res.status);
      const j=await res.json();
      if(!j.days)throw new Error('No "days" array in response');
      onImport(j.days,null);
      setLastLoaded({file:url.split('/').pop().split('?')[0],days:j.days.length,tickets:j.days.reduce((a,d)=>a+d.tickets.length,0),type:'OneDrive sync'});
    }catch(err){showToast('Sync failed: '+err.message,'error');}
    setSyncing(false);
  }

  function onDrop(e){
    e.preventDefault();setDragging(false);
    const f=e.dataTransfer.files[0];
    if(!f)return;
    if(f.name.endsWith('.json'))handleJSON(f);
    else if(f.name.match(/\.xlsx?$/i))handleExcel(f);
    else showToast('Drop a .json or .xlsx file','error');
  }

  return(
    <div style={{padding:'28px',maxWidth:860}}>
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:18,fontWeight:800,color:'var(--text)'}}>📂 Import Data</h2>
        <p style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Load tickets from a JSON snapshot, agent export, or Excel file — or sync from OneDrive.</p>
      </div>

      {/* Last loaded banner */}
      {lastLoaded&&(
        <div style={{marginBottom:18,padding:'12px 16px',background:'rgba(22,163,74,.12)',border:'1px solid rgba(22,163,74,.35)',borderRadius:10,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:20}}>✅</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:'#4ADE80'}}>{lastLoaded.file}</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{lastLoaded.type} · {lastLoaded.days} day{lastLoaded.days!==1?'s':''} · {lastLoaded.tickets} tickets loaded → go to Dashboard</div>
          </div>
        </div>
      )}

      {/* Drop zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={onDrop}
        onClick={()=>fileRef.current&&fileRef.current.click()}
        style={{
          border:`2px dashed ${dragging?'var(--red)':'var(--border)'}`,
          borderRadius:16,background:dragging?'rgba(227,6,19,.08)':'var(--card)',
          padding:'44px 32px',textAlign:'center',cursor:'pointer',
          transition:'all .2s',marginBottom:18,
        }}>
        <div style={{fontSize:42,marginBottom:12}}>📂</div>
        <div style={{fontSize:15,fontWeight:800,color:'var(--text)',marginBottom:6}}>
          {dragging?'Drop it!':'Click or drag & drop your file here'}
        </div>
        <div style={{fontSize:12,color:'var(--muted)'}}>
          <code style={{color:'#93C5FD',background:'rgba(147,197,253,.1)',padding:'2px 6px',borderRadius:4}}>snapshot.json</code>
          {'  ·  '}
          <code style={{color:'#93C5FD',background:'rgba(147,197,253,.1)',padding:'2px 6px',borderRadius:4}}>ekedp_agent_*.json</code>
          {'  ·  '}
          <code style={{color:'#4ADE80',background:'rgba(74,222,128,.1)',padding:'2px 6px',borderRadius:4}}>.xlsx</code>
        </div>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleJSON(e.target.files[0]);e.target.value='';}}/>
      </div>

      {/* Explicit buttons */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:'14px',background:'var(--navy)',color:'#fff',border:'1px solid var(--border)',borderRadius:10,fontFamily:'inherit',fontSize:12,fontWeight:800,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
          <span style={{fontSize:24}}>📋</span>
          <span>Import JSON</span>
          <small style={{fontWeight:500,opacity:.75}}>snapshot / agent export</small>
        </button>
        <button onClick={()=>xlsRef.current&&xlsRef.current.click()} style={{padding:'14px',background:'#16A34A',color:'#fff',border:'none',borderRadius:10,fontFamily:'inherit',fontSize:12,fontWeight:800,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
          <span style={{fontSize:24}}>📊</span>
          <span>Import Excel</span>
          <small style={{fontWeight:500,opacity:.75}}>"All Complaint" sheet</small>
        </button>
        <button onClick={doSync} disabled={syncing} style={{padding:'14px',background:syncing?'var(--sub)':'var(--red)',color:'#fff',border:'none',borderRadius:10,fontFamily:'inherit',fontSize:12,fontWeight:800,cursor:syncing?'default':'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
          <span style={{fontSize:24}}>{syncing?'⏳':'⟳'}</span>
          <span>{syncing?'Syncing…':'Sync OneDrive'}</span>
          <small style={{fontWeight:500,opacity:.75}}>fetch from saved URL</small>
        </button>
        <input ref={xlsRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleExcel(e.target.files[0]);e.target.value='';}}/>
      </div>

      {/* Sync URL */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 18px',marginBottom:18}}>
        <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>☁️ OneDrive / SharePoint Sync URL</div>
        <div style={{display:'flex',gap:8}}>
          <input value={syncUrl} onChange={e=>setSyncUrl(e.target.value)}
            placeholder="https://ekedp-my.sharepoint.com/…?download=1"
            style={{flex:1,padding:'9px 12px',background:'var(--bg)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,fontFamily:"'JetBrains Mono',monospace",fontSize:11,outline:'none'}}/>
          <button onClick={()=>{localStorage.setItem('po_syncUrl',syncUrl);showToast('💾 Sync URL saved');}}
            style={{padding:'9px 16px',background:'var(--navy)',color:'#fff',border:'none',borderRadius:8,fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
            💾 Save
          </button>
          <button onClick={doSync} disabled={syncing}
            style={{padding:'9px 16px',background:'var(--red)',color:'#fff',border:'none',borderRadius:8,fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
            {syncing?'⏳…':'⟳ Sync now'}
          </button>
        </div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>
          Paste the direct-download link from your Master folder. Change <code>?e=xxx</code> → <code>?download=1</code>.
        </div>
      </div>

      {/* Format guide */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {[
          {icon:'📋',title:'snapshot.json',color:'#93C5FD',items:['Master file from OneDrive','Contains all days & tickets','Overwrites all current data','What Love shares with agents']},
          {icon:'📤',title:'Agent export .json',color:'#4ADE80',items:["Any agent's daily export","Loads as today's day","Maps to master format","Good for manual handovers"]},
          {icon:'📊',title:'Excel (.xlsx)',color:'#FCD34D',items:['"All Complaint" sheet required','Parses by date into days','Also reads Dashboard sheet','Same as existing Settings import']},
        ].map(c=>(
          <div key={c.title} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:20,marginBottom:6}}>{c.icon}</div>
            <div style={{fontSize:11,fontWeight:800,color:c.color,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:8}}>{c.title}</div>
            <ul style={{fontSize:11.5,color:'var(--muted)',lineHeight:1.7,paddingLeft:16}}>
              {c.items.map(i=><li key={i}>{i}</li>)}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );
}

                {SHIFT_OPTS.map(s=>(
                  <button key={s.id} onClick={()=>setShift(a.id,s.id)}
                    style={{padding:'7px 3px',border:'1.5px solid '+(shift===s.id?a.color:'var(--border)'),background:shift===s.id?a.color+'22':'var(--surface)',color:shift===s.id?a.color:'var(--muted)',borderRadius:7,fontFamily:'inherit',fontSize:10,fontWeight:700,cursor:'pointer',textAlign:'center'}}>
                    <div style={{fontSize:13}}>{s.icon}</div><div>{s.label}</div>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── REPORTS SCREEN ────────────────────────────────────────────
function ReportsScreen({days,user,onSlotReport}){
  const wat=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
  const todayDay=wat.getDate();
  const todayData=days.find(d=>d.dayNum===todayDay);
  const all=days.flatMap(d=>d.tickets);
  const SLOTS=[
    {id:'9am',label:'9 AM',icon:'☀️',desc:'Overnight handover'},
    {id:'12pm',label:'12 PM',icon:'🕛',desc:'Morning update'},
    {id:'midday',label:'2 PM',icon:'🌤️',desc:'Midday update'},
    {id:'cob',label:'4 PM',icon:'🌆',desc:'Close of business'}
  ];
  const res=all.filter(t=>t.status==='resolved').length;
  const prg=all.filter(t=>t.status==='progress').length;
  const unr=all.filter(t=>t.status==='unresolved').length;
  const grand=all.length;
  const pct=grand?Math.round(res/grand*100):0;
  const cumData=window.EK_CUM_DATA||[];
  return(
    <div style={{padding:'22px 28px'}}>
      <div style={{marginBottom:18}}><h2 style={{fontSize:17,fontWeight:800}}>📊 Reports</h2><p style={{fontSize:11,color:'var(--muted)',marginTop:3}}>Generate slot reports · Email-ready format</p></div>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 20px',marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>Email Slot Reports</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          {SLOTS.map(s=>(
            <button key={s.id} onClick={()=>todayData?onSlotReport(s.id,todayData,todayData.tickets||[]):window.EK_TOAST&&window.EK_TOAST('No data for today yet. Import JSON first.','warn')}
              style={{padding:'12px 20px',background:'#1D4ED8',color:'#fff',border:'none',borderRadius:10,fontFamily:'inherit',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 12px rgba(29,78,216,.3)'}}>
              <span style={{fontSize:18}}>{s.icon}</span>
              <div style={{textAlign:'left'}}><div>{s.label}</div><div style={{fontSize:9,opacity:.8}}>{s.desc}</div></div>
            </button>
          ))}
        </div>
        {!todayData&&<div style={{marginTop:10,fontSize:11,color:'#FCD34D'}}>⚠ No data for today. Import your JSON via Settings to enable slot reports.</div>}
      </div>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
          <h3 style={{fontSize:13,fontWeight:800}}>📋 Cumulative by Responsible Party</h3>
          <div style={{display:'flex',gap:16}}>
            {[['Total',grand,'#3B82F6'],['Resolved',res,'#4ADE80'],['In Progress',prg,'#FCD34D'],['Unresolved',unr,'#F87171'],['Rate',pct+'%',pct>=70?'#4ADE80':pct>=40?'#FCD34D':'#F87171']].map(([l,v,c])=>(
              <div key={l} style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:c,fontFamily:"'JetBrains Mono',monospace"}}>{v}</div><div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>{l}</div></div>
            ))}
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>S/N</th><th>Responsible Party</th><th>Category</th><th>Received Today</th><th>Cum. Resolved</th><th>Cum. In Progress</th><th>Cum. Unresolved</th><th>Grand Total</th><th>% Resolution</th></tr></thead>
            <tbody>
              {cumData.length?cumData.map((r,i)=>(
                <tr key={i}>
                  <td style={{color:'var(--muted)',fontSize:10}}>{r.sn||i+1}</td>
                  <td style={{fontWeight:700}}>{r.name}</td>
                  <td style={{fontSize:11,color:'var(--muted)'}}>{r.cat}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'#3B82F6',textAlign:'center'}}>{r.today||0}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'#4ADE80',textAlign:'center'}}>{r.res||0}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'#FCD34D',textAlign:'center'}}>{r.prog||0}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'#F87171',textAlign:'center'}}>{r.unres||0}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,textAlign:'center'}}>{r.grand||0}</td>
                  <td><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,color:(r.pct||0)>=70?'#4ADE80':(r.pct||0)>=40?'#FCD34D':'#F87171'}}>{r.pct||0}%</span></td>
                </tr>
              )):<tr><td colSpan={9} style={{padding:'28px',textAlign:'center',color:'var(--muted)',fontSize:12}}>Import your Excel or JSON via Settings to populate this report.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── LOG TICKET ───────────────────────────────────────────────────────────
const MGR_BUS=['ISLAND','IJORA','MUSHIN','AJAH','OJO','FESTAC','ORILE','APAPA','LEKKI','AGBARA','IBEJU','AJELE'];
function LogTicket({days,onAdd,user}){
  const EMPTY={num:'',name:'',phone:'',meter:'',addr:'',bu:'ISLAND',category:'',issue:'',resp:'',status:'progress',note:''};
  const[pasted,setPasted]=useState('');
  const[form,setForm]=useState(EMPTY);
  const RESP=(window.EK_RESPONSIBLE_PARTIES||[]).map(r=>r.name);
  const CATS=['METERING / UNABLE TO LOAD','METERING / REQUEST FOR METER','METERING / WRONG DETAILS','BAND RECLASSIFICATION / WRONG BAND','BAND RECLASSIFICATION / BAND UPGRADE REQUEST','BILLING / OVER BILLING','BILLING / WRONG TARIFF','INTERRUPTION / PLANNED OUTAGE','INTERRUPTION / UNPLANNED OUTAGE','INTERRUPTION / LOW VOLTAGE','GENERAL / GENERAL ENQUIRY','GENERAL / CUSTOMER ONBOARDING'];

  const handlePaste=txt=>{
    setPasted(txt);
    if(!txt.trim())return;
    const segs=txt.split('|').map(s=>s.trim());
    const ex={};
    for(const seg of segs){
      const cl=seg.replace(/[^␀-]/g,'').trim();
      const ci=cl.indexOf(':');if(ci<1||ci>50)continue;
      const lbl=cl.slice(0,ci).trim().toLowerCase().replace(/\s+/g,' ');
      const val=cl.slice(ci+1).trim();if(!val||/^n\/a$/i.test(val))continue;
      if(/ticket/.test(lbl)){const m=val.match(/(7\d{5})/);if(m)ex.num=m[1];}
      else if(/^customer/.test(lbl))ex.name=val;
      else if(/^phone|^tel/.test(lbl))ex.phone=val.replace(/\s/g,'');
      else if(/^meter/.test(lbl)){const n=val.match(/\d{10,13}/);if(n)ex.meter=n[0];}
      else if(/^(business\s*unit|bu)$/.test(lbl)){const match=MGR_BUS.find(b=>val.toUpperCase().includes(b));if(match)ex.bu=match;}
      else if(/^address/.test(lbl))ex.addr=val;
      else if(/^(description|complaint)/.test(lbl))ex.issue=val;
      else if(/^category/.test(lbl))ex.category=val;
    }
    if(Object.keys(ex).length>1)setForm(f=>({...EMPTY,...f,...ex,resp:ex.resp||getResp(ex.category||'')||f.resp}));
  };

  const submit=()=>{
    if(!form.num.trim()){window.EK_TOAST&&window.EK_TOAST('Ticket number required','warn');return;}
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
    const tk={...form,id:'tk_'+Date.now(),created:now.toISOString(),time:now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),dayNum:now.getDate(),dateBig:now.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),loggedBy:user?.name||'Manager',channel:'Mobile App',resp:form.resp||getResp(form.category)};
    onAdd&&onAdd(tk);
    setForm(EMPTY);setPasted('');
  };
  const inp={width:'100%',padding:'9px 12px',background:'var(--bg)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,fontFamily:'inherit',fontSize:12,outline:'none',boxSizing:'border-box'};
  const F=({label,full,children})=>(<div style={{gridColumn:full?'1/-1':'auto'}}><label style={{display:'block',fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:'.6px',textTransform:'uppercase',marginBottom:4}}>{label}</label>{children}</div>);
  return(
    <div style={{padding:'22px 28px',maxWidth:900}}>
      <div style={{marginBottom:16}}><h2 style={{fontSize:17,fontWeight:800}}>➕ Log Ticket</h2><p style={{fontSize:11,color:'var(--muted)',marginTop:3}}>Paste the complaint from SharePoint — fields auto-fill. Stamped as logged by {user?.name||'Manager'}.</p></div>
      <div style={{marginBottom:14}}>
        <label style={{display:'block',fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:'.6px',textTransform:'uppercase',marginBottom:5}}>Paste Complaint Text From SharePoint</label>
        <textarea value={pasted} onChange={e=>handlePaste(e.target.value)}
          placeholder="Paste the full SharePoint complaint here — phone, meter and ticket # will auto-fill..."
          style={{width:'100%',minHeight:90,padding:12,background:'var(--card)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:10,fontFamily:"'JetBrains Mono',monospace",fontSize:11.5,outline:'none',resize:'vertical',boxSizing:'border-box',lineHeight:1.6}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:14}}>
        <F label="Ticket #"><input value={form.num} onChange={e=>setForm(f=>({...f,num:e.target.value}))} placeholder="710xxx" style={inp}/></F>
        <F label="Customer Name"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={inp}/></F>
        <F label="Phone"><input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="+234..." style={inp}/></F>
        <F label="Meter / Account #"><input value={form.meter} onChange={e=>setForm(f=>({...f,meter:e.target.value}))} style={inp}/></F>
        <F label="Business Unit">
          <select value={form.bu} onChange={e=>setForm(f=>({...f,bu:e.target.value}))} style={inp}>
            {MGR_BUS.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
        </F>
        <F label="Responsible Party">
          <select value={form.resp} onChange={e=>setForm(f=>({...f,resp:e.target.value}))} style={inp}>
            <option value="">Auto-assign by category</option>
            {RESP.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </F>
        <F label="Address" full><input value={form.addr} onChange={e=>setForm(f=>({...f,addr:e.target.value}))} style={inp}/></F>
        <F label="Category" full>
          <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value,resp:getResp(e.target.value)}))} style={inp}>
            <option value="">Select category...</option>
            {CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </F>
        <F label="Issue / Description" full><textarea value={form.issue} onChange={e=>setForm(f=>({...f,issue:e.target.value}))} style={{...inp,minHeight:70,resize:'vertical'}}/></F>
        <F label="Action Taken / Note" full><textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={{...inp,minHeight:56,resize:'vertical'}}/></F>
        <div style={{gridColumn:'1/-1',display:'flex',gap:8}}>
          {[['unresolved','🔴 Unresolved','#DC2626','rgba(220,38,38,.15)'],['progress','⏳ In Progress','#D97706','rgba(217,119,6,.15)'],['resolved','✅ Resolved','#16A34A','rgba(22,163,74,.15)']].map(([s,l,c,bg])=>(
            <button key={s} onClick={()=>setForm(f=>({...f,status:s}))} style={{padding:'10px 18px',border:'2px solid '+(form.status===s?c:'var(--border)'),background:form.status===s?bg:'var(--card)',color:form.status===s?c:'var(--muted)',borderRadius:8,fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={submit} style={{padding:'12px 24px',background:'#1D4ED8',color:'#fff',border:'none',borderRadius:10,fontFamily:'inherit',fontSize:13,fontWeight:800,cursor:'pointer',boxShadow:'0 6px 18px rgba(29,78,216,.35)'}}>💾 Save ticket</button>
        <button onClick={()=>{setForm(EMPTY);setPasted('');}} style={{padding:'12px 20px',background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:10,fontFamily:'inherit',fontSize:13,fontWeight:700,cursor:'pointer'}}>Clear</button>
      </div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null); // always show sign-in on fresh load
  const[days,setDays]=useState(()=>load('po_snap',null)?.days||genDays());
  const[cum,setCum]=useState(()=>load('po_cum',null)||INIT_CUM);
  const[screen,setScreen]=useState('dashboard');
  const[theme,setTheme]=useState(()=>localStorage.getItem('po_theme')||'');
  const[collapsed,setCollapsed]=useState(()=>localStorage.getItem('po_nc')==='1');
  const[toast,setToast]=useState(null);
  const[modal,setModal]=useState(null); // {type:'slot'|'settings'|'ticket', ...}

  useEffect(()=>{document.body.setAttribute('data-theme',theme);document.body.setAttribute('data-nc',collapsed?'1':'0');},[theme,collapsed]);

  const activeDay=useMemo(()=>{
    const w=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
    const todayN=w.getDate();const match=days.find(d=>d.dayNum===todayN);
    return match?match.dayNum:(days[days.length-1]?.dayNum||15);
  },[days]);

  function showToast(msg,type='success'){setToast({msg,type});setTimeout(()=>setToast(null),3500);}

  function addTicket(tk){
    if(!tk)return;
    const wat=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
    const dn=tk.dayNum||wat.getDate();
    const nd=days.map(d=>d.dayNum===dn?{...d,tickets:[tk,...(d.tickets||[])]}:d);
    if(!nd.find(d=>d.dayNum===dn)){const db=tk.dateBig||wat.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});nd.push({dayNum:dn,dateBig:db,tickets:[tk]});}
    setDays(nd);save('po_snap',{days:nd});setScreen('all');
  }
  function deleteTicket(id){
    const nd=days.map(d=>({...d,tickets:(d.tickets||[]).filter(t=>t.id!==id)}));
    setDays(nd);save('po_snap',{days:nd});showToast('Ticket deleted','warn');
  }
  function updateTicket(id,patch){
    const nd=days.map(d=>({...d,tickets:d.tickets.map(t=>t.id===id?{...t,...patch}:t)}));
    setDays(nd);save('po_snap',{days:nd});
    showToast('✅ Ticket updated');
  }

  function onImport(newDays,newCum){
    setDays(newDays);save('po_snap',{days:newDays});
    if(newCum&&newCum.length){setCum(newCum);save('po_cum',newCum);}
    showToast(`✅ ${newDays.length} days · ${newDays.reduce((a,d)=>a+d.tickets.length,0)} tickets loaded`);
    setScreen('dashboard');
  }

  function doExportExcel(){
    if(typeof XLSX==='undefined')return showToast('SheetJS loading…','error');
    const wb=XLSX.utils.book_new();
    const H=['Ticket#','Date','Time','Customer','Phone','Meter','Address','BU','Category','Sub-Category','Responsible Party','Status','Resolution Note'];
    const all=days.flatMap(d=>d.tickets.map(t=>[t.num,d.dateBig,t.time,t.name,t.phone,t.meter,t.address,t.bu,t.category,t.subcategory,getResp(t.category),t.status,t.resolutionNote||t.note]));
    ['All Pending','All Resolved','In Progress','Unresolved'].forEach((name,idx)=>{
      const filter=['unresolved','resolved','progress','unresolved'];const key=['',filter[idx]];
      const list=idx===0?all.filter((_,i)=>days.flatMap(d=>d.tickets)[i]?.status!=='resolved'):all.filter((_,i)=>{const t=days.flatMap(d=>d.tickets)[i];return t&&t.status===['','resolved','progress','unresolved'][idx];});
      const ws=XLSX.utils.aoa_to_sheet([['EKEDP POWER APP — '+name.toUpperCase()],[''],H,...(idx===0?all:list)]);
      ws['!cols']=[9,10,8,20,14,14,22,10,20,20,22,12,30].map(w=>({wch:w}));
      XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31));
    });
    XLSX.writeFile(wb,'EKEDP_CX_Hub_'+new Date().toISOString().slice(0,10)+'.xlsx');
    showToast('✅ Excel exported — 4 sheets');
  }

  if(!user) return <SignIn onLogin={u=>{setUser(u);showToast('👋 Welcome, '+u.name.split(' ')[0]+'!');}}/>;

  const activeDayObj=days.find(d=>d.dayNum===activeDay)||days[days.length-1];
  const [selDay,setSelDay]=useState(activeDay);
  const selDayObj=days.find(d=>d.dayNum===selDay)||activeDayObj;

  const screens={
    dashboard:<Dashboard days={days} cum={cum}/>,
    daily:<DailyReport days={days} activeDay={selDay} onSelectDay={setSelDay} onUpdate={updateTicket} onSlotReport={(slotId,day,tix)=>setModal({type:'slot',slotId,day,tix})} collapsed={collapsed}/>,
    all:<AllComplaints days={days} onUpdate={updateTicket} onDelete={deleteTicket}/>,
    cumulative:<Cumulative cum={cum}/>,
    analytics:<Analytics days={days}/>,
    agents:<AgentsScreen days={days}/>,
    reports:<ReportsScreen days={days} user={user} onSlotReport={(slotId,day,tix)=>setModal({type:'slot',slotId,day,tix})}/>,
    logticket:<LogTicket days={days} onAdd={addTicket} user={user}/>,
    import:<ImportScreen onImport={onImport} showToast={showToast}/>,
  };

  return(
    <>
      <Nav active={screen} onChange={setScreen} user={user} collapsed={collapsed} onToggle={()=>{const nc=!collapsed;setCollapsed(nc);localStorage.setItem('po_nc',nc?'1':'0');}} onSignOut={()=>{setUser(null);localStorage.removeItem('po_user');}} onSettings={()=>setModal({type:'settings'})} onExport={doExportExcel}/>
      <div className="main">
        {screens[screen]}
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      {modal?.type==='slot'&&<SlotModal slotId={modal.slotId} day={modal.day} tickets={modal.tix} user={user} onClose={()=>setModal(null)}/>}
      {modal?.type==='settings'&&<SettingsModal onClose={()=>setModal(null)} onImport={onImport} theme={theme} setTheme={setTheme} user={user}/>}
      <input type="file" id="xlsxImp" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>{if(e.target.files[0]){const f=e.target.files[0];const r=new FileReader();r.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:'array'});const sheet=wb.Sheets['All Complaint']||wb.Sheets[wb.SheetNames[0]];if(!sheet)return showToast('No "All Complaint" sheet found','error');const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});const snap=excelRowsToSnap(rows);if(!snap||!snap.days.length)return showToast('No tickets parsed','error');let nc=null;const cs=wb.Sheets['Dashboard'];if(cs){const dr=XLSX.utils.sheet_to_json(cs,{defval:''});let inC=false;const res=[];for(const row of dr){const v=Object.values(row);const cat=v[1],nm=v[2];if(cat==='Complaint Category'){inC=true;continue;}if(!inC)continue;if(!cat||cat==='Total')break;res.push({sn:res.length+1,name:String(nm||''),cat:String(cat),today:0,res:+v[3]||0,prog:+v[4]||0,unres:+v[5]||0,grand:+v[6]||0,pct:Math.round((+v[7]||0)*100)});}if(res.length)nc=res;}onImport(snap.days,nc);}catch(err){showToast('Import error: '+err.message,'error');}};r.readAsArrayBuffer(f);}e.target.value='';}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
