                      <img src={PHOTOS[agent.id]} alt={agent.name} style={{width:30,height:30,borderRadius:'50%',objectFit:'cover',border:`2px solid ${agent.color}`,flexShrink:0}}/>
                    ) : (
                      <div style={{width:30,height:30,borderRadius:'50%',background:agent.tint,border:`2px solid ${agent.color}`,display:'flex',alignItems:'center',justifyContent:'center',font:'800 11px/1 Sora,sans-serif',color:'#fff',flexShrink:0}}>{agent.initials}</div>
                    )}
                    <div style={{minWidth:0}}>
                      <div style={{font:'700 12px/1.1 Sora,sans-serif', color:'var(--text)'}}>{agent.name.split(' ')[0]}</div>
                      <div style={{font:'500 9.5px/1 Sora,sans-serif', color:'var(--muted)', marginTop:2}}>{agent.name.split(' ').slice(1).join(' ')}</div>
                    </div>
                  </div>
                </td>
                {weekDays.map(d => {
                  const e = getEntry(d.date, agent.id);
                  const sm = SHIFT_META[e.shift] || SHIFT_META.Off;
                  return (
                    <td key={d.date} onClick={() => cycleShift(d.date, agent.id)} title={`Click to cycle: ${sm.label}`}
                      style={{
                        padding:'8px 6px', textAlign:'center', cursor:'pointer',
                        background: sm.cell,
                        borderRight:'1px solid var(--border)',
                        position:'relative',
                        transition:'background .15s',
                      }}
                      onMouseEnter={(ev) => { ev.currentTarget.style.background = sm.border; }}
                      onMouseLeave={(ev) => { ev.currentTarget.style.background = sm.cell; }}>
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
                        <span style={{fontSize:16}}>{sm.icon}</span>
                        <span style={{font:'700 9px Sora,sans-serif', color: sm.color, letterSpacing:'.04em'}}>{e.shift}</span>
                        {e.shadow && <span style={{font:'700 7.5px Sora,sans-serif', color:'#93C5FD'}}>+SHADOW</span>}
                        {e.manual && <span style={{position:'absolute', top:3, right:4, width:5, height:5, borderRadius:'50%', background:'#FCD34D', boxShadow:'0 0 4px #FCD34D'}}/>}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* LEGEND + INFO */}
      <div style={{display:'grid', gridTemplateColumns:'1.2fr 1fr', gap:12, marginTop:14}}>
        <div style={{background:'rgba(99,102,241,.06)', border:'1px dashed rgba(99,102,241,.25)', borderRadius:10, padding:'12px 16px'}}>
          <div style={{font:'800 11px Sora,sans-serif', color:'#A5B4FC', textTransform:'uppercase', letterSpacing:'.08em', marginBottom:8}}>How it works</div>
          <div style={{font:'500 11.5px/1.55 Sora,sans-serif', color:'rgba(240,244,255,.78)'}}>
            Click any cell in the week view to cycle <strong style={{color:'#FCD34D'}}>Day → Night → Off → Leave</strong>. Manual edits show a yellow dot. Re-import a fresh SharePoint <code style={{fontFamily:'JetBrains Mono,monospace', color:'#93C5FD'}}>RosterList.csv</code> any time to refresh the schedule.
          </div>
        </div>
        <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 16px', display:'flex', flexWrap:'wrap', gap:10}}>
          {Object.entries(SHIFT_META).map(([k,m]) => (
            <div key={k} style={{display:'flex', alignItems:'center', gap:6}}>
              <span style={{fontSize:14}}>{m.icon}</span>
              <span style={{font:'700 11px Sora,sans-serif', color:m.color}}>{k}</span>
              {m.hours && <span style={{font:'500 10px JetBrains Mono,monospace', color:'var(--muted)'}}>{m.hours}</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── LOG TICKET ─────────────────────────────────────────────────────
const BUS_LIST = ['ISLAND', 'MUSHIN', 'AJAH', 'LEKKI', 'APAPA', 'FESTAC', 'OJO', 'AGBARA', 'AJELE', 'IJORA', 'ORILE', 'YABA', 'MAINLAND', 'VICTORIA ISLAND'];
const RESP_LIST = ['Holyland Umude', 'David Obisesan', 'Owokade Olusegun', 'Mojibola Adefuwa', 'Ogheneyoreme Agbroko', 'Clara Olutola', 'Glory', 'Festus Moko', 'Nonye Angelina Nnadozie', 'Customer Experience'];
const CAT_LIST = ['Metering', 'Interruption/Voltage/Safety', 'Billing', 'PPM Support', 'PPM Maintance', 'Band Reclassification', 'Onboarding', 'AMISA', 'MYCRON', 'General First Contact Resolution'];

function LogTicket({ days, onAdd, showToast, user }) {
  const blankForm = { num: '', name: '', phone: '', meter: '', bu: 'ISLAND', resp: 'Holyland Umude', address: '', category: 'Metering', issue: '', note: '', status: 'unresolved' };
  const [raw, setRaw] = useState('');
  const [form, setForm] = useState(blankForm);
  const [saved, setSaved] = useState(false);
  const [multiBlocks, setMultiBlocks] = useState([]);

  function parseOneBlock(txt) {
    const f = { ...blankForm };
    const numM = txt.match(/Ticket\s*No[:\s]+(\d+)/i);if (numM) f.num = numM[1];
    const custM = txt.match(/Customer[:\s]+([^\|\n]+)/i);if (custM) f.name = custM[1].trim();
    const phoneM = txt.match(/Phone[:\s]+([\+\d\s]+)/i);if (phoneM) f.phone = phoneM[1].trim();
    const addrM = txt.match(/Address[:\s]+([^\|\n]+)/i);if (addrM) f.address = addrM[1].trim();
    const buM = txt.match(/Business\s*(?:Unit|District)[:\s]+([^\|\n]+)/i);if (buM) f.bu = buM[1].trim().toUpperCase();
    const descM = txt.match(/Description[:\s]+([^\|\n]+)/i);if (descM) f.issue = descM[1].trim();
    const meterM = txt.match(/Meter[:\s]+([\d]+)/i);if (meterM) f.meter = meterM[1].trim();
    // Extract date from SharePoint format "18 May 2026 · 1:44 PM"
    const MO = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const dtM = txt.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{4})/i);
    if (dtM) f._day = new Date(+dtM[3], MO[dtM[2].toLowerCase().slice(0,3)], +dtM[1]).getDate();
    return f;
  }

  useEffect(() => {
    if (!raw.trim()) { setMultiBlocks([]); setForm(blankForm); return; }
    const normalized = raw.replace(/\r\n?/g, '\n').trim();
    // Split on newlines that precede a new complaint block (robust, emoji-agnostic)
    let parts = normalized.split(/\n(?=[^\n]*NEW MOBILE APP COMPLAINT)/i)
      .map(s => s.trim()).filter(Boolean);
    // Fallback: if multiple complaints but no newlines between them, split on emoji marker
    if (parts.length === 1 && (normalized.match(/NEW MOBILE APP COMPLAINT/gi)||[]).length > 1) {
      const fb = normalized.split(/(?=[^\x00-\x7F]\s*NEW MOBILE APP COMPLAINT)/gi)
        .map(s => s.trim()).filter(s => s.toUpperCase().includes('COMPLAINT'));
      if (fb.length > 1) parts = fb;
    }
    if (parts.length > 1) {
      setMultiBlocks(parts.map((p) => parseOneBlock(p)));
      setForm(blankForm);
    } else {
      setMultiBlocks([]);
      setForm(parseOneBlock(normalized));
    }
  }, [raw]);

  function buildTicket(f) {
    const wat = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
    const dayN = f._day || wat.getDate();
    const mm = String(wat.getMinutes()).padStart(2, '0');
    const ampm = wat.getHours() < 12 ? 'AM' : 'PM';
    const h12 = wat.getHours() % 12 || 12;
    return { dayN, ticket: { id: 'tk_' + Math.random().toString(36).slice(2, 10), num: f.num, time: `${h12}:${mm} ${ampm}`, name: f.name, phone: f.phone, meter: f.meter, address: f.address, bu: f.bu, channel: 'Mobile App', category: f.category, subcategory: '', note: f.issue, resolutionNote: f.note, assignee: f.resp, status: f.status, loggedBy: user?.name || 'Manager', locked: false } };
  }

  function handleSaveAll() {
    const valid = multiBlocks.filter((b) => b.num && b.name);
    if (!valid.length) return showToast('No valid blocks detected', 'error');
    valid.forEach((b) => { const {dayN, ticket} = buildTicket(b); onAdd(dayN, ticket); });
    setSaved(true); setRaw(''); setMultiBlocks([]);
    showToast('✅ ' + valid.length + ' ticket' + (valid.length > 1 ? 's' : '') + ' logged!');
    setTimeout(() => setSaved(false), 3000);
  }

  function handleSave() {
    if (!form.num) return showToast('Ticket # is required', 'error');
    if (!form.name) return showToast('Customer name is required', 'error');
    const {dayN, ticket} = buildTicket(form);
    onAdd(dayN, ticket);
    setSaved(true); setRaw(''); setForm(blankForm);
    showToast('✅ Ticket #' + form.num + ' logged!');
    setTimeout(() => setSaved(false), 3000);
  }

  const field = (label, val, key, type = 'text', ph = '') =>
  <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      <label style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>{label}</label>
      <input type={type} value={val} onChange={(e) => setForm((f) => ({ ...f, [key]: e.target.value }))} placeholder={ph}
    style={{ padding: '10px 12px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--text)', fontFamily: 'inherit', fontSize: 13, outline: 'none' }} />
    </div>;

  const drop = (label, val, key, opts) =>
  <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      <label style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>{label}</label>
      <select value={val} onChange={(e) => setForm((f) => ({ ...f, [key]: e.target.value }))}
    style={{ padding: '10px 12px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--text)', fontFamily: 'inherit', fontSize: 13, outline: 'none' }}>
        {opts.map((o) => <option key={o}>{o}</option>)}
      </select>
    </div>;


  return (
    <div style={{ padding: '28px', maxWidth: 900 }}>
      <div style={{ marginBottom: 6 }}><div style={{ fontSize: 13, fontWeight: 700, color: 'var(--red)', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 4 }}>ADD TICKET</div>
        <h2 style={{ fontSize: 20, fontWeight: 800, fontStyle: 'italic' }}>Good {new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 17 ? 'afternoon' : 'evening'}, {(() => { const n = user?.name || ''; return n.includes('@') ? n.split('@')[0].replace(/[._-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : n.split(' ')[0] || 'Manager'; })()} {new Date().getHours() < 12 ? '☀️' : new Date().getHours() < 17 ? '🌤️' : '🌙'}</h2>
      </div>

      {/* Paste banner */}
      <div style={{ margin: '16px 0', padding: '14px 18px', background: 'rgba(22,163,74,.12)', border: '1px solid rgba(22,163,74,.35)', borderRadius: 10, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
        <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#16A34A', flexShrink: 0, marginTop: 3 }} />
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#4ADE80', marginBottom: 3 }}>Paste complaints from SharePoint — single or multiple at once</div>
          <div style={{ fontSize: 13, color: 'var(--muted)' }}>Paste one complaint block or many. Each "NEW MOBILE APP COMPLAINT" block is auto-detected. Fields: Ticket No → Ticket #, Address → Address, Description → Issue.</div>
        </div>
      </div>

      {/* Paste area */}
      <div style={{ marginBottom: 20, padding: '16px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10 }}>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>Paste Complaint Text from SharePoint</div>
        <textarea value={raw} onChange={(e) => setRaw(e.target.value)} placeholder={'Paste one or more complaint blocks here…\n\n📱 NEW MOBILE APP COMPLAINT| 📅 18 May 2026 · 1:44 PM| 🎫 Ticket No: 720390| 👤 Customer: Clifford Benjamin| 📞 Phone: +2347079674724| 📍 Address: 12, isiba street, Itire | 🏢 Business Unit: MUSHIN| 📝 Description: Meter in tamper mode'}
        style={{ width: '100%', minHeight: 90, background: 'rgba(0,0,0,.2)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--text)', fontFamily: "'JetBrains Mono',monospace", fontSize: 13, padding: '10px 12px', outline: 'none', resize: 'vertical' }} />
      </div>

      {/* Multi-block preview */}
      {multiBlocks.length > 0 && <div style={{ marginBottom: 20, padding: '16px', background: 'rgba(14,165,233,.08)', border: '1px solid rgba(14,165,233,.35)', borderRadius: 10 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: '#38BDF8' }}>📋 {multiBlocks.length} ticket{multiBlocks.length > 1 ? 's' : ''} detected — ready to save</div>
          <button onClick={handleSaveAll} style={{ padding: '8px 18px', background: '#0EA5E9', border: 'none', borderRadius: 8, color: '#fff', fontFamily: 'inherit', fontSize: 14, fontWeight: 800, cursor: 'pointer' }}>💾 Save All {multiBlocks.length} Tickets</button>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {multiBlocks.map((b, i) => <div key={i} style={{ padding: '8px 12px', background: b.num && b.name ? 'rgba(22,163,74,.1)' : 'rgba(220,38,38,.1)', border: '1px solid ' + (b.num && b.name ? 'rgba(22,163,74,.3)' : 'rgba(220,38,38,.3)'), borderRadius: 6, fontSize: 13, display: 'flex', gap: 12, alignItems: 'center' }}>
            <span style={{ fontWeight: 800, color: b.num && b.name ? '#4ADE80' : '#F87171' }}>{i + 1}.</span>
            <span style={{ fontWeight: 700 }}>#{b.num || '—'}</span>
            <span>{b.name || 'No name'}</span>
            {b.bu && <span style={{ color: 'var(--muted)' }}>{b.bu}</span>}
            {b.issue && <span style={{ color: 'var(--muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 200 }}>{b.issue}</span>}
            {(!b.num || !b.name) && <span style={{ color: '#F87171', marginLeft: 'auto' }}>⚠ Will be skipped</span>}
          </div>)}
        </div>
      </div>}

      {/* Form fields */}
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '20px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14, marginBottom: 14 }}>
          {field('Ticket #', form.num, 'num', 'text', '710xxx')}
          {field('Customer Name', form.name, 'name', 'text', '')}
          {field('Phone', form.phone, 'phone', 'text', '+234...')}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14, marginBottom: 14 }}>
          {field('Meter / Account #', form.meter, 'meter', 'text', '')}
          {drop('Business Unit', form.bu, 'bu', BUS_LIST)}
          {drop('Responsible Party', form.resp, 'resp', RESP_LIST)}
        </div>
        <div style={{ marginBottom: 14 }}>{field('Address', form.address, 'address', 'text', '')}</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
          {drop('Complaint Category', form.category, 'category', CAT_LIST)}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
            <label style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>Initial Status</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {[{ s: 'unresolved', l: '🔴 Unresolved', c: '#DC2626' }, { s: 'progress', l: '⏳ In Progress', c: '#D97706' }, { s: 'resolved', l: '✅ Resolved', c: '#16A34A' }].map((b) =>
              <button key={b.s} onClick={() => setForm((f) => ({ ...f, status: b.s }))} style={{ flex: 1, padding: '10px 6px', border: `2px solid ${form.status === b.s ? b.c : 'var(--border)'}`, background: form.status === b.s ? `rgba(0,0,0,.2)` : 'var(--card)', color: form.status === b.s ? b.c : 'var(--muted)', borderRadius: 8, fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>{b.l}</button>
              )}
            </div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
            <label style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>Complaint / Issue</label>
            <textarea value={form.issue} onChange={(e) => setForm((f) => ({ ...f, issue: e.target.value }))} rows={3}
            style={{ padding: '10px 12px', background: 'rgba(0,0,0,.2)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--text)', fontFamily: 'inherit', fontSize: 13, outline: 'none', resize: 'vertical' }} />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
            <label style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>Action Taken / Note</label>
            <textarea value={form.note} onChange={(e) => setForm((f) => ({ ...f, note: e.target.value }))} rows={3}
            style={{ padding: '10px 12px', background: 'rgba(0,0,0,.2)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--text)', fontFamily: 'inherit', fontSize: 13, outline: 'none', resize: 'vertical' }} />
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
          <button onClick={() => {setRaw('');setForm(blankForm);}} style={{ padding: '10px 18px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--muted)', fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>Clear</button>
          <button onClick={handleSave} style={{ padding: '10px 22px', background: '#1D4ED8', border: 'none', borderRadius: 8, color: '#fff', fontFamily: 'inherit', fontSize: 13, fontWeight: 800, cursor: 'pointer' }}>💾 Log Ticket</button>
        </div>
        {saved && <div style={{ marginTop: 12, padding: '10px 14px', background: 'rgba(22,163,74,.15)', border: '1px solid rgba(22,163,74,.4)', borderRadius: 8, color: '#4ADE80', fontSize: 13, fontWeight: 600 }}>✅ Ticket logged successfully!</div>}
      </div>
    </div>);

}

// One-time migration: rename legacy 'Admin' account to real name from email
// Also pre-seed default admin/admin account if no team exists yet
(function () {
  try {
    // Pre-seed default account if first launch
    const team = load('po_team', []);
    if (!team.length) {
      const pw = hashPw('admin');
      const m = { id: 'u_default', name: 'Love Offei', email: 'admin', passHash: pw, role: 'admin', addedAt: Date.now() };
      save('po_team', [m]);
    }
    // Fix any truncated/wrong name — always ensure default account is Love Offei
    const teamNow = load('po_team', []);
    const defIdx = teamNow.findIndex(m => m.email === 'admin' || m.id === 'u_default' || (m.name && m.name.startsWith('Lov') && m.name !== 'Love Offei'));
    if (defIdx !== -1 && teamNow[defIdx].name !== 'Love Offei') {
      teamNow[defIdx].name = 'Love Offei';
      save('po_team', teamNow);
    }
    // Fix logged-in user name if truncated or wrong
    const u = load('po_user', null);
    if (u && u.name !== 'Love Offei' && (u.email === 'admin' || u.id === 'u_default' || (u.name && u.name.startsWith('Lov')))) {
      save('po_user', { ...u, name: 'Love Offei' });
    }
  } catch (e) {}
})();
function App() {
  const [user, setUser] = useState(() => {
    const u = load('po_user', null);
    if (u) return u;
    // Auto-sign-in the default admin so the app always opens ready
    const team = load('po_team', []);
    if (team.length) {const a = team[0];const au = { id: a.id, name: a.name, email: a.email, role: a.role };save('po_user', au);return au;}
    return null;
  });
  const [days, setDays] = useState(() => {const s = load('po_snap', null);return s ? s.days : genDays();});
  const [cum, setCum] = useState(() => load('po_cum', null) || INIT_CUM);
  const [screen, setScreen] = useState('dashboard');
  const [theme, setTheme] = useState(() => {const t = localStorage.getItem('po_theme') || '';if (t === 'analytics') {localStorage.setItem('po_theme', '');return '';}return t;});
  const [collapsed, setCollapsed] = useState(() => localStorage.getItem('po_nc') === '1');
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null); // {type:'slot'|'settings'|'ticket', ...}
  const [alertCount, setAlertCount] = useState(0);
  const prevTotalRef = useRef(null);

  // Track new tickets and alert
  useEffect(() => {
    const total = days.reduce((a, d) => a + d.tickets.length, 0);
    if (prevTotalRef.current === null) {prevTotalRef.current = total;return;}
    const diff = total - prevTotalRef.current;
    if (diff > 0) {
      setAlertCount((a) => a + diff);
      showToast(`🔔 ${diff} new ticket${diff > 1 ? 's' : ''} added! Total: ${total}`, 'success');
    }
    prevTotalRef.current = total;
  }, [days]);

  useEffect(() => {document.body.setAttribute('data-theme', theme);document.body.setAttribute('data-nc', collapsed ? '1' : '0');}, [theme, collapsed]);

  // Auto-sync on load
  useEffect(() => {
    if (localStorage.getItem('po_autoSync') !== '1') return;
    const url = localStorage.getItem('po_syncUrl') || '';
    if (!url) return;
    fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now()).
    then((r) => r.ok ? r.json() : Promise.reject('HTTP ' + r.status)).
    then((j) => {
      if (j.days) {
        setDays(j.days);save('po_snap', { days: j.days });
        if (j.cum && j.cum.length) {setCum(j.cum);save('po_cum', j.cum);}
        const now = new Date().toLocaleString('en-GB', { timeZone: 'Africa/Lagos', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        localStorage.setItem('po_lastSync', now);
      }
    }).catch(() => {});
  }, []);

  const activeDay = useMemo(() => {
    const w = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
    const todayN = w.getDate();const match = days.find((d) => d.dayNum === todayN);
    return match ? match.dayNum : days[days.length - 1]?.dayNum || 15;
  }, [days]);

  function showToast(msg, type = 'success') {setToast({ msg, type });setTimeout(() => setToast(null), 3500);}

  function updateTicket(id, patch) {
    const nd = days.map((d) => ({ ...d, tickets: patch._delete ? d.tickets.filter((t) => t.id !== id) : d.tickets.map((t) => t.id === id ? { ...t, ...patch } : t) }));
    setDays(nd);save('po_snap', { days: nd });
    showToast('✅ Ticket updated');
  }

  function onAddTicket(dayNum, ticket) {
    const nd = days.map((d) => {
      if (d.dayNum === dayNum) return { ...d, tickets: [...d.tickets, ticket] };
      return d;
    });
    if (!nd.find((d) => d.dayNum === dayNum)) {
      const wat = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
      nd.push({ dayNum, dateBig: dayNum + ' ' + wat.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase(),
        year: wat.getFullYear() + ' · ' + wat.toLocaleDateString('en-GB', { weekday: 'long' }),
        tag: '📅 DAY ' + dayNum, headerSub: 'Customer Experience · Marina HQ · Mobile App Channel',
        execSummary: '', tickets: [ticket], updatedBy: ticket.loggedBy, updatedDate: new Date().toLocaleDateString('en-GB') });
    }
    nd.sort((a, b) => a.dayNum - b.dayNum);
    setDays(nd);save('po_snap', { days: nd });
  }

  function onImport(newDays, newCum) {
    setDays(newDays);save('po_snap', { days: newDays });
    if (newCum && newCum.length) {setCum(newCum);save('po_cum', newCum);}
    showToast(`✅ ${newDays.length} days · ${newDays.reduce((a, d) => a + d.tickets.length, 0)} tickets loaded`);
    setScreen('dashboard');
  }

  function doExportExcel() {
    if (typeof XLSX === 'undefined') return showToast('SheetJS loading…', 'error');
    const wb = XLSX.utils.book_new();
    const H = ['Ticket#', 'Date', 'Time', 'Customer', 'Phone', 'Meter', 'Address', 'BU', 'Category', 'Sub-Category', 'Responsible Party', 'Status', 'Resolution Note'];
    const all = days.flatMap((d) => d.tickets.map((t) => [t.num, d.dateBig, t.time, t.name, t.phone, t.meter, t.address, t.bu, t.category, t.subcategory, getResp(t.category), t.status, t.resolutionNote || t.note]));
    ['All Pending', 'All Resolved', 'In Progress', 'Unresolved'].forEach((name, idx) => {
      const filter = ['unresolved', 'resolved', 'progress', 'unresolved'];const key = ['', filter[idx]];
      const list = idx === 0 ? all.filter((_, i) => days.flatMap((d) => d.tickets)[i]?.status !== 'resolved') : all.filter((_, i) => {const t = days.flatMap((d) => d.tickets)[i];return t && t.status === ['', 'resolved', 'progress', 'unresolved'][idx];});
      const ws = XLSX.utils.aoa_to_sheet([['EKEDP POWER APP — ' + name.toUpperCase()], [''], H, ...(idx === 0 ? all : list)]);
      ws['!cols'] = [9, 10, 8, 20, 14, 14, 22, 10, 20, 20, 22, 12, 30].map((w) => ({ wch: w }));
      XLSX.utils.book_append_sheet(wb, ws, name.slice(0, 31));
    });
    XLSX.writeFile(wb, 'EKEDP_CX_Hub_' + new Date().toISOString().slice(0, 10) + '.xlsx');
    showToast('✅ Excel exported — 4 sheets');
  }

  if (!user) return <SignIn onLogin={(u) => {setUser(u);showToast('👋 Welcome, ' + u.name.split(' ')[0] + '!');}} />;

  const activeDayObj = days.find((d) => d.dayNum === activeDay) || days[days.length - 1];
  const [selDay, setSelDay] = useState(activeDay);
  const selDayObj = days.find((d) => d.dayNum === selDay) || activeDayObj;

  const GB = <GreetingBar user={user} dayNum={selDay} onSettings={() => setModal({ type: 'settings' })} />;
  const wg = (el) => <div>{GB}{el}</div>;
  const screens = {
    dashboard: <Dashboard days={days} cum={cum} onSettings={() => setModal({ type: 'settings' })} onUpdate={updateTicket} />,
    daily: wg(<DailyReport days={days} activeDay={selDay} onSelectDay={setSelDay} onUpdate={updateTicket} onSlotReport={(slotId, day, tix) => setModal({ type: 'slot', slotId, day, tix })} collapsed={collapsed} />),
    all: wg(<AllComplaints days={days} onUpdate={updateTicket} />),
    cumulative: wg(<Cumulative cum={cum} onCumUpdate={(nc) => {setCum(nc);save('po_cum', nc);showToast('✅ Cumulative table saved');}} />),
    analytics: wg(<Analytics days={days} />),
    sync: wg(<SyncScreen onImport={onImport} showToast={showToast} days={days} />),
    reports: wg(<ReportsScreen />),
    agents: wg(<AgentsScreen days={days} />),
    log: wg(<LogTicket days={days} onAdd={onAddTicket} showToast={showToast} user={user} />)
  };

  return (
    <>
      <Nav active={screen} onChange={setScreen} user={user} collapsed={collapsed} onToggle={() => {const nc = !collapsed;setCollapsed(nc);localStorage.setItem('po_nc', nc ? '1' : '0');}} onSignOut={() => {save('po_user', null);setUser(null);}} onReset={() => {if (confirm('🔄 Reset all ticket data to zero?\n\nThis clears all days and tickets. Theme and account stay.')) {['po_snap', 'po_cum'].forEach((k) => localStorage.removeItem(k));localStorage.setItem('po_snap', JSON.stringify({ days: [] }));localStorage.setItem('po_cum', JSON.stringify([]));window.location.reload();}}} onExport={doExportExcel} days={days} activeDay={selDay} onSelectDay={setSelDay} onSlotReport={(slotId, day, tix) => setModal({ type: 'slot', slotId, day, tix })} alertCount={alertCount} onClearAlert={() => setAlertCount(0)} />
      <div className="main">
        {screens[screen]}
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      {modal?.type === 'slot' && <SlotModal slotId={modal.slotId} day={modal.day} tickets={modal.tix} user={user} onClose={() => setModal(null)} />}
      {modal?.type === 'settings' && <SettingsModal onClose={() => setModal(null)} onImport={onImport} theme={theme} setTheme={setTheme} user={user} />}
      <input type="file" id="xlsxImp" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={(e) => {if (e.target.files[0]) {const f = e.target.files[0];const r = new FileReader();r.onload = (ev) => {try {const wb = XLSX.read(ev.target.result, { type: 'array' });const sheet = wb.Sheets['All Complaint'] || wb.Sheets[wb.SheetNames[0]];if (!sheet) return showToast('No "All Complaint" sheet found', 'error');const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });const snap = excelRowsToSnap(rows);if (!snap || !snap.days.length) return showToast('No tickets parsed', 'error');let nc = null;const cs = wb.Sheets['Dashboard'];if (cs) {const dr = XLSX.utils.sheet_to_json(cs, { defval: '' });let inC = false;const res = [];for (const row of dr) {const v = Object.values(row);const cat = v[1],nm = v[2];if (cat === 'Complaint Category') {inC = true;continue;}if (!inC) continue;if (!cat || cat === 'Total') break;res.push({ sn: res.length + 1, name: String(nm || ''), cat: String(cat), today: 0, res: +v[3] || 0, prog: +v[4] || 0, unres: +v[5] || 0, grand: +v[6] || 0, pct: Math.round((+v[7] || 0) * 100) });}if (res.length) nc = res;}onImport(snap.days, nc);} catch (err) {showToast('Import error: ' + err.message, 'error');}};r.readAsArrayBuffer(f);}e.target.value = '';}} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
