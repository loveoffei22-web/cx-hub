<style>
:root{--navy:#001F5C;--red:#E30613;--gold:#FFC72C;--border:#CBD5E1;--muted:#475569;--text:#0F172A;--bg:#EEF2F8;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font:600 15px/1.45 'Sora',sans-serif;color:var(--text);}

/* TOOLBAR */
.toolbar{
  position:sticky;top:0;z-index:10;
  background:#fff;border-bottom:2px solid var(--border);
  padding:8px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.toolbar label{font:800 11px/1 'Sora';text-transform:uppercase;letter-spacing:.10em;color:var(--muted);}
.toolbar button{
  padding:9px 14px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;color:var(--text);cursor:pointer;font:700 13px/1 'Sora';
}
.toolbar button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.toolbar .spacer{flex:1;}
.toolbar .btn-email{background:#0078D4;color:#fff;border:none;font-weight:800;}
.toolbar .btn-print{background:var(--red);color:#fff;border:none;font-weight:800;box-shadow:0 3px 10px rgba(227,6,19,.30);}
.toolbar .btn-excel{background:#107C41;color:#fff;border:none;font-weight:800;}
.toolbar .btn-back{background:var(--navy);color:#fff;border:none;font-weight:700;font-size:12px;}

/* DOCUMENT — tighter, bigger */
.doc{
  width:960px;max-width:100%;margin:12px auto;background:#fff;
  border:1.5px solid var(--border);border-radius:10px;overflow:hidden;
  box-shadow:0 2px 10px rgba(0,12,40,.06);
}

/* HEADER */
.hd{background:linear-gradient(135deg,#0A1A4F,#001F5C 55%,#1a3a8f);color:#fff;padding:9px 16px;}
.hd-top{display:flex;align-items:center;gap:12px;}
.hd-icon{width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hd-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.hd-title h1{font:900 14px/1.1 'Sora';letter-spacing:-.005em;}
.hd-eyebrow{font:800 9px/1 'Sora';letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.hd-sub{font:500 11px/1.3 'Sora';color:rgba(255,255,255,.7);margin-top:3px;}
.hd-meta{margin-left:auto;text-align:right;}
.hd-meta .big{font:900 15px/1 'JetBrains Mono';color:var(--gold);margin-bottom:2px;}
.hd-meta .sm{font:600 11px/1.3 'Sora';color:rgba(255,255,255,.75);}

/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 16px;background:#F1F5F9;border-bottom:1.5px solid var(--border);}
.kpi{padding:10px 14px;border-radius:8px;background:#fff;border:1.5px solid var(--border);position:relative;overflow:hidden;}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.tot::before{background:#1D4ED8;}.kpi.res::before{background:#16A34A;}
.kpi.prg::before{background:#D97706;}.kpi.unr::before{background:#DC2626;}.kpi.pct::before{background:var(--gold);}
.kpi .kl{font:800 10px/1 'Sora';text-transform:uppercase;letter-spacing:.10em;color:var(--muted);}
.kpi .kv{font:900 26px/1 'JetBrains Mono';margin-top:5px;}
.kpi.tot .kv{color:#1E3A8A;}.kpi.res .kv{color:#065F46;}
.kpi.prg .kv{color:#92400E;}.kpi.unr .kv{color:#991B1B;}.kpi.pct .kv{color:#92591E;}

/* TABLE */
.tbl-wrap{padding:10px 16px 6px;}
table.t{width:100%;border-collapse:collapse;font-size:16px;margin-top:0;}
table.t thead tr{background:var(--navy);}
table.t th{
  color:rgba(255,255,255,.92);
  font:800 11px/1.3 'Sora';text-transform:uppercase;letter-spacing:.05em;
  padding:10px 10px;text-align:left;
}
table.t th.r{text-align:right;}
table.t td{padding:10px 10px;border-bottom:1.5px solid #EEF2F8;color:var(--text);}
table.t td.r{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;}
table.t tbody tr:nth-child(even) td{background:#F8FAFC;}
table.t tbody tr:hover td{background:#EEF2F8;}
table.t tbody tr:last-child td{border-bottom:none;}
table.t tfoot td{
  background:var(--navy)!important;color:#fff;
  font:900 14px/1.3 'Sora';padding:11px 10px;
}
table.t tfoot td.r{font-family:'JetBrains Mono',monospace;font-size:15px;}

.party{font:800 16px/1.2 'Sora';color:var(--navy);}
.cat{font:500 12px/1.2 'Sora';color:var(--muted);margin-top:2px;}
.num{font-family:'JetBrains Mono',monospace;font-weight:700;color:#1D4ED8;}

.pct-pill{
  display:inline-flex;padding:4px 11px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-weight:900;font-size:13px;
}
.pct-hi{background:#ECFDF5;color:#065F46;}
.pct-mid{background:#FFFBEB;color:#92400E;}
.pct-lo{background:#FEF2F2;color:#991B1B;}

/* NOTE STRIP */
.note-strip{
  margin:0 16px 8px;padding:10px 14px;
  background:#FEF9E7;border:1px solid #FDE68A;border-radius:8px;
  font:600 13px/1.5 'Sora';color:#92400E;
}

/* FOOTER */
.ft{
  padding:12px 16px;border-top:1.5px solid var(--border);background:#F8FAFC;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.ft img.lockup{height:30px;}
.ft .meta{font:500 12px/1.4 'Sora';color:var(--muted);flex:1;}
.ft .meta b{color:var(--navy);font-weight:800;}
.ft .stamp{font:700 11px/1.3 'JetBrains Mono';color:var(--muted);text-align:right;}

@media print{
  @page{size:A4 landscape;margin:8mm;}
  html,body{background:#fff;}
  .toolbar{display:none!important;}
  .doc{width:auto;margin:0;border:none;border-radius:0;box-shadow:none;}
  .hd,.kpi,.pct-pill,.ft,.kpi-row,table.t thead tr,table.t tfoot td{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
}
</style>
</head>

  '9am': {label:'9 AM',  emoji:'☀️', stamp:'9:00 AM WAT',  window:'Cumulative as of 9:00 AM'},
  '12pm':{label:'12 PM', emoji:'🕛', stamp:'12:00 PM WAT', window:'Cumulative as of 12:00 PM'},
  '4pm': {label:'4 PM',  emoji:'🌆', stamp:'4:00 PM WAT',  window:'Cumulative as of 4:00 PM'},
  '5pm': {label:'5 PM',  emoji:'🌇', stamp:'5:00 PM WAT',  window:'End of Day — Full Cumulative'},
};

let CURRENT_SLOT = '4pm';

function todayLong(){
  const w=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
  return w.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function pctClass(p){return p>=80?'pct-hi':p>=60?'pct-mid':'pct-lo';}
function compute(r){
  const[sn,party,cat,today,res,prg,unr]=r;
  const grand=res+prg+unr;
  const pct=grand?Math.round(res/grand*100):0;
  return{sn,party,cat,today,res,prg,unr,grand,pct};
}

function render(slotId){
  CURRENT_SLOT=slotId;
  const slot=GM_SLOTS[slotId];
  // 9AM report: no new complaints have arrived yet — force all today = 0
  const rows=GM_ROWS.map(r => {
    const row = compute(r);
    if(slotId==='9am') row.today=0;
    return row;
  });
  const tot={
    today:rows.reduce((a,x)=>a+x.today,0),
    res:  rows.reduce((a,x)=>a+x.res,0),
    prg:  rows.reduce((a,x)=>a+x.prg,0),
    unr:  rows.reduce((a,x)=>a+x.unr,0),

            <th style="background:#1D4ED8;color:#fff;padding:10px 14px;font:700 13px 'Sora';border:1px solid #1E40AF;text-align:center;">% Resolved</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="background:#3B82F6;color:#fff;text-align:center;font:800 22px 'Sora';padding:14px;border:1px solid #2563EB;">${tot.grand}</td>
            <td style="background:#D1FAE5;color:#065F46;text-align:center;font:800 22px 'Sora';padding:14px;border:1px solid #A7F3D0;">${tot.res}</td>
            <td style="background:#FDE68A;color:#92400E;text-align:center;font:800 22px 'Sora';padding:14px;border:1px solid #FCD34D;">${tot.prg}</td>

    </div>` : `<div class="kpi-row" style="display:none;"></div>`;

  // ── Table: 5 PM uses Image-1 columns; other slots keep original ─────
  const tableHtml = is5pm ? `

        <tbody>

            <td class="r" style="font-weight:800;">${tot.res}</td>

        </div>
        <div class="hd-meta">
          <div class="big">${slot.emoji} ${slot.label}</div>
          <div class="sm">${slot.window}</div>
        </div>

    <div class="ft">
      <img class="lockup" src="${LOCKUP_B64}" alt="EKEDP Power App">

}

document.querySelectorAll('.toolbar [data-slot]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.toolbar [data-slot]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    render(b.dataset.slot);
  });
});

async function copyEmail(){
  const doc=document.getElementById('doc');
  // Best approach for Outlook: select the doc node and copy
  const range=document.createRange();
  range.selectNode(doc);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{
    document.execCommand('copy');
    sel.removeAllRanges();
    showToast('Selected & copied! Now open Outlook, click in the email body, and press Ctrl+V (or Cmd+V).');
  }catch(e){
    sel.removeAllRanges();
    showToast('Press Ctrl+A to select all, then Ctrl+C, then paste in Outlook.','warn');
  }
}

async function downloadExcel(){
  const slot=GM_SLOTS[CURRENT_SLOT];
  const rows=GM_ROWS.map(compute);
  const tot={
    today:rows.reduce((a,x)=>a+x.today,0),
    res:  rows.reduce((a,x)=>a+x.res,0),
    prg:  rows.reduce((a,x)=>a+x.prg,0),
    unr:  rows.reduce((a,x)=>a+x.unr,0),
  };
  tot.grand=tot.res+tot.prg+tot.unr;
  tot.pct=tot.grand?Math.round(tot.res/tot.grand*100):0;
  const aoa=[
    ['EKEDP Mobile APP Report (9AM 12PM 4PM)'],
    [todayLong()+'  ·  Generated at '+slot.stamp+'  ·  Customer Experience Department  ·  Mobile App'],
    [],
    ['SN','Responsible Party','Complaint Category','Received Today','Cumulative Resolved','Cumulative In Progress','Cumulative Unresolved','Grand Total','% Resolution'],
    ...rows.map(r=>[r.sn,r.party,r.cat,r.today,r.res,r.prg,r.unr,r.grand,r.pct/100]),
    // TOTAL row removed
  ];
  const fname='EKEDP_GM_Report_'+slot.label.replace(' ','')+'_'+new Date().toISOString().slice(0,10)+'.xlsx';
  if(typeof XLSX==='undefined'){showToast('Excel library not loaded yet — try again in a moment.');return;}
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:4},{wch:28},{wch:32},{wch:14},{wch:14},{wch:14},{wch:14},{wch:11},{wch:12}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}},{s:{r:1,c:0},e:{r:1,c:8}}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'GM Report');
  XLSX.writeFile(wb,fname);
  showToast('Excel downloaded.');
}

function showToast(msg,type='ok'){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:10px;font:700 13px Sora,sans-serif;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,.25);max-width:380px;line-height:1.45;';
  t.style.background=type==='warn'?'#D97706':'#16A34A';
  t.textContent=msg;
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.remove(),5000);
}

// Auto-pick slot based on current WAT hour:
//   < 12:00  → 9 AM report (yesterday's COB cumulative, today=0)
//   12:00–15:59 → 12 PM report
//   ≥ 16:00 → 4 PM COB report
(function autoSlot(){
  const watHour=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'})).getHours();
  const id=watHour<12?'9am':watHour<16?'12pm':watHour<17?'4pm':'5pm';
  render(id);
})();


// ── Power Automate Live Data Sync ─────────────────────────────────
const PA_PULL_KEY='ek_pa_pull_url';
function getPullUrl(){return localStorage.getItem(PA_PULL_KEY)||'';}

const RESP_MAP = {
  'Band Reclassification':              [1,'Nonye Angelina Nnadozie','Band Reclassification'],
  'Billing':                            [2,'Mojibola Adefuwa','Billing'],
  'Interruption / Voltage / Safety':    [3,'Ogheneyoreme Agbroko','Interruption / Voltage / Safety'],
  'Interruption':                       [3,'Ogheneyoreme Agbroko','Interruption / Voltage / Safety'],
  'Voltage':                            [3,'Ogheneyoreme Agbroko','Interruption / Voltage / Safety'],
  'Safety':                             [3,'Ogheneyoreme Agbroko','Interruption / Voltage / Safety'],
  'Metering':                           [4,'Holyland Umude','Metering'],
  'PPM Support':                        [5,'David Obisesan','PPM Support'],
  'PPM Maintenance':                    [6,'Owokade Olusegun','PPM Maintenance'],
  'Onboarding':                         [7,'Clara Olutola','Onboarding'],
  'MYCRON':                             [8,'Glory Chinyere','Mycron'],
  'Mycron':                             [8,'Glory Chinyere','Mycron'],
  'AMISA':                              [10,'Festus Moko','AMISA'],
  'First Contact Resolution':           [9,'Customer Experience','General First Contact Resolution'],
  'CX':                                 [9,'Customer Experience','General First Contact Resolution'],
  'Customer Experience':                [9,'Customer Experience','General First Contact Resolution'],
  'General':                            [9,'Customer Experience','General First Contact Resolution'],
};

async function pullAndRefresh(){
  const pullUrl=getPullUrl();
  if(!pullUrl){
    const k=window.prompt('Paste your Power Automate Pull URL (saved once):','');
    if(!k||!k.trim())return;
    localStorage.setItem(PA_PULL_KEY,k.trim());
    return pullAndRefresh();
  }
  try{
    const res=await fetch(pullUrl,{method:'POST'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const cloud=data||{};
    // Flatten all tickets from all agents
    let all=[];
    Object.values(cloud).forEach(function(arr){if(Array.isArray(arr))all=all.concat(arr);});
    if(!all.length){
      // Cloud empty — keep baseline as-is, just notify
      const b=document.createElement('div');
      b.style.cssText='position:fixed;bottom:16px;right:16px;background:#F59E0B;color:#0A1A4F;padding:10px 16px;border-radius:10px;font:800 12px Sora,sans-serif;z-index:9999;';
      b.textContent='ℹ SharePoint returned no tickets — showing baseline';
      document.body.appendChild(b);setTimeout(function(){b.remove();},4000);
      return;
    }
    // Tally cloud increments per party
    const inc={};
    GM_ROWS.forEach(function(r){inc[r[0]]={today:0,res:0,prg:0,unr:0};});
    const today=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'})).toISOString().slice(0,10);
    all.forEach(function(t){
      // Match party by responsible field first, then category keyword
      let row=null;
      const r=(t.resp||t.responsible||t.assignee||'').toString().trim();
      if(r){GM_ROWS.forEach(function(g){if(g[1].toLowerCase()===r.toLowerCase())row=inc[g[0]];});}
      if(!row){
        const cat=(t.category||t.issue||'');
        Object.keys(RESP_MAP).forEach(function(k){if(cat.toLowerCase().includes(k.toLowerCase()))row=inc[RESP_MAP[k][0]];});
      }
      if(!row)return;
      const d=String(t.created||t.received||'').slice(0,10);
      if(d===today)row.today++;
      if(t.status==='resolved')row.res++;
      else if(t.status==='progress')row.prg++;
      else row.unr++;
    });
    // ADD cloud increments to baseline (don't replace) — baseline is yesterday's 4PM, cloud is today's new
    GM_ROWS.forEach(function(r,i){
      const b=BASELINE_ROWS[i];
      const x=inc[r[0]]||{today:0,res:0,prg:0,unr:0};
      r[3]=b[3]+x.today;
      r[4]=b[4]+x.res;
      r[5]=b[5]+x.prg;
      r[6]=b[6]+x.unr;
    });
    // Re-render current slot
    render(CURRENT_SLOT);
    // Show sync status
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;bottom:16px;right:16px;background:#16A34A;color:#fff;padding:10px 16px;border-radius:10px;font:700 12px Sora,sans-serif;z-index:9999;';
    banner.textContent='✅ Live data loaded from SharePoint ('+all.length+' tickets)';
    document.body.appendChild(banner);
    setTimeout(function(){banner.remove();},3000);
  }catch(e){
    console.warn('PA pull failed:',e.message);showToast('Pull failed: '+e.message,'warn');
  }
}
// Auto-pull on load — only if a key is saved
window.addEventListener('load',function(){if(getPullUrl())setTimeout(pullAndRefresh,800);});
