<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body class="ek-dark">
<div class="pc dark" style="background:#060E2B;">
  <div class="grid" style="grid-template-columns:repeat(5,1fr);gap:10px;">
    <!-- blue / total -->
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#3B82F6;"></div>
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:6px;">Total Complaints</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#fff;">201</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:rgba(255,255,255,.3);margin-top:4px;">Day 1–15</div>
    </div>
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#16A34A;"></div>
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:6px;">Resolved</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#fff;">112</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:rgba(255,255,255,.3);margin-top:4px;">56% rate</div>
    </div>
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#D97706;"></div>
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:6px;">In Progress</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#fff;">32</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:rgba(255,255,255,.3);margin-top:4px;">Being handled</div>
    </div>
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#DC2626;"></div>
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:6px;">Unresolved</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#fff;">57</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:rgba(255,255,255,.3);margin-top:4px;">Action needed</div>
    </div>
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#8B5CF6;"></div>
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:6px;">Today</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#fff;">19</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:rgba(255,255,255,.3);margin-top:4px;">Day 15</div>
    </div>
  </div>
  <div style="font:500 11px/1.4 var(--ek-font);color:#6B85C0;">5-col KPI grid — translucent background + 3px coloured top stripe. Mono digits. Sub-label optional.</div>
</div>
</body></html>
