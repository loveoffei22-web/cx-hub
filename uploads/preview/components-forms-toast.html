<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body class="ek-dark">
<div class="pc dark" style="background:#060E2B;">
  <!-- toast row -->
  <div class="row" style="gap:10px;">
    <div style="background:rgba(22,163,74,.2);border:1px solid #16A34A;border-radius:10px;padding:10px 14px;color:#fff;font:600 12px var(--ek-font);box-shadow:0 8px 32px rgba(0,0,0,.4);">✔ Snapshot loaded — 201 tickets across 15 days</div>
    <div style="background:rgba(220,38,38,.2);border:1px solid #DC2626;border-radius:10px;padding:10px 14px;color:#fff;font:600 12px var(--ek-font);box-shadow:0 8px 32px rgba(0,0,0,.4);">✕ Sync failed — check your URL</div>
  </div>
  <!-- form fields -->
  <div class="row" style="gap:10px;">
    <div style="flex:1;">
      <label style="display:block;font:700 10px/1 var(--ek-font);color:#6B85C0;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;">Email</label>
      <input value="manager@ekedp.com" style="width:100%;padding:9px 11px;background:#060E2B;color:#F0F4FF;border:1px solid #1E3070;border-radius:8px;font:600 12px var(--ek-font);outline:none;box-sizing:border-box;">
    </div>
    <div style="flex:1;">
      <label style="display:block;font:700 10px/1 var(--ek-font);color:#6B85C0;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;">Filter by BU</label>
      <select style="width:100%;padding:9px 11px;background:#111D4A;color:#F0F4FF;border:1px solid #1E3070;border-radius:8px;font:600 12px var(--ek-font);outline:none;box-sizing:border-box;">
        <option>All BUs</option><option>Mushin</option><option>Ajah</option>
      </select>
    </div>
    <div style="flex:1;">
      <label style="display:block;font:700 10px/1 var(--ek-font);color:#6B85C0;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;">Search</label>
      <input placeholder="🔎 Ticket # · customer · phone …" style="width:100%;padding:9px 11px;background:#111D4A;color:#F0F4FF;border:1px solid #1E3070;border-radius:8px;font:500 12px var(--ek-font);outline:none;box-sizing:border-box;">
    </div>
  </div>
  <!-- status status update buttons -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
    <button style="padding:10px;border:2px solid #16A34A;background:rgba(22,163,74,.15);color:#F0F4FF;border-radius:8px;font:700 12px var(--ek-font);cursor:pointer;">Resolved</button>
    <button style="padding:10px;border:2px solid #1E3070;background:#111D4A;color:#F0F4FF;border-radius:8px;font:700 12px var(--ek-font);cursor:pointer;">In Progress</button>
    <button style="padding:10px;border:2px solid #1E3070;background:#111D4A;color:#F0F4FF;border-radius:8px;font:700 12px var(--ek-font);cursor:pointer;">Unresolved</button>
  </div>
</div>
</body></html>
