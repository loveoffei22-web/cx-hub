<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="row" style="gap:10px;align-items:center;">
    <span style="display:inline-block;padding:4px 12px;border-radius:20px;font:700 12px/1.3 var(--ek-font);background:#EAF3DE;color:#3B6D11;">2 days</span>
    <span style="display:inline-block;padding:4px 12px;border-radius:20px;font:700 12px/1.3 var(--ek-font);background:#EAF3DE;color:#3B6D11;">&lt; 1 day</span>
    <span style="display:inline-block;padding:4px 12px;border-radius:20px;font:700 12px/1.3 var(--ek-font);background:#FAEEDA;color:#854F0B;">3 days</span>
    <span style="display:inline-block;padding:4px 12px;border-radius:20px;font:700 12px/1.3 var(--ek-font);background:#FAEEDA;color:#854F0B;">5 days</span>
    <span style="display:inline-block;padding:4px 12px;border-radius:20px;font:700 12px/1.3 var(--ek-font);background:#FCEBEB;color:#A32D2D;">7 days</span>
    <span style="display:inline-block;padding:4px 12px;border-radius:20px;font:700 12px/1.3 var(--ek-font);background:#FCEBEB;color:#A32D2D;">12 days</span>
  </div>
  <div class="row" style="gap:24px;border-top:1px solid var(--ek-border);padding-top:14px;">
    <div>
      <div style="font:700 9px/1 var(--ek-font);color:#3B6D11;text-transform:uppercase;letter-spacing:.10em;margin-bottom:4px;">Green</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ek-muted);">days &lt; 3</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:2px;">#EAF3DE · #3B6D11</div>
    </div>
    <div>
      <div style="font:700 9px/1 var(--ek-font);color:#854F0B;text-transform:uppercase;letter-spacing:.10em;margin-bottom:4px;">Amber</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ek-muted);">3 ≤ days &lt; 7</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:2px;">#FAEEDA · #854F0B</div>
    </div>
    <div>
      <div style="font:700 9px/1 var(--ek-font);color:#A32D2D;text-transform:uppercase;letter-spacing:.10em;margin-bottom:4px;">Red</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ek-muted);">days ≥ 7</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:2px;">#FCEBEB · #A32D2D</div>
    </div>
  </div>
  <div style="font:500 11px/1.45 var(--ek-font);color:var(--ek-muted);">
    Universal age signal on every ticket table — slot reports, GM report, agents hub, managers hub.
  </div>
</div>
</body></html>
