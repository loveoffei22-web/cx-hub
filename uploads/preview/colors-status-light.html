<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:10px;">
    <div style="border-radius:11px;padding:14px 14px 12px;background:#ECFDF5;border:1.5px solid #A7F3D0;color:#065F46;">
      <div style="font:700 9.5px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;margin-bottom:8px;">Resolved</div>
      <div style="font-family:var(--ek-font-mono);font-weight:800;font-size:22px;">112</div>
      <div style="font-family:var(--ek-font-mono);font-size:9.5px;opacity:.65;margin-top:4px;">#16A34A</div>
    </div>
    <div style="border-radius:11px;padding:14px 14px 12px;background:#FFFBEB;border:1.5px solid #FDE68A;color:#92400E;">
      <div style="font:700 9.5px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;margin-bottom:8px;">Progress</div>
      <div style="font-family:var(--ek-font-mono);font-weight:800;font-size:22px;">32</div>
      <div style="font-family:var(--ek-font-mono);font-size:9.5px;opacity:.65;margin-top:4px;">#D97706</div>
    </div>
    <div style="border-radius:11px;padding:14px 14px 12px;background:#FEF2F2;border:1.5px solid #FECACA;color:#991B1B;">
      <div style="font:700 9.5px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;margin-bottom:8px;">Unresolved</div>
      <div style="font-family:var(--ek-font-mono);font-weight:800;font-size:22px;">57</div>
      <div style="font-family:var(--ek-font-mono);font-size:9.5px;opacity:.65;margin-top:4px;">#DC2626</div>
    </div>
    <div style="border-radius:11px;padding:14px 14px 12px;background:#EFF6FF;border:1.5px solid #BFDBFE;color:#1E3A8A;">
      <div style="font:700 9.5px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;margin-bottom:8px;">Info / Total</div>
      <div style="font-family:var(--ek-font-mono);font-weight:800;font-size:22px;">201</div>
      <div style="font-family:var(--ek-font-mono);font-size:9.5px;opacity:.65;margin-top:4px;">#3B82F6</div>
    </div>
  </div>
  <div class="row" style="gap:8px;">
    <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;border-radius:18px;font:800 10px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.06em;">Resolved</div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;border-radius:18px;font:800 10px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.06em;">In Progress</div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;border-radius:18px;font:800 10px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.06em;">Unresolved</div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:#F5F3FF;color:#4C1D95;border:1px solid #DDD6FE;border-radius:18px;font:800 10px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.06em;">Today</div>
  </div>
</div>
</body></html>
