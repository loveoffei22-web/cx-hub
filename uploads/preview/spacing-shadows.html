<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start;padding:6px 0;">
    <div>
      <div style="background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);">
        <div style="font:700 11px/1 var(--ek-font);color:var(--ek-text);">Card · light</div>
        <div style="font:500 10px/1.4 var(--ek-font);color:var(--ek-muted);margin-top:4px;">2px 8px rgba(0,0,0,.06)</div>
      </div>
    </div>
    <div>
      <div style="background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.18);">
        <div style="font:700 11px/1 var(--ek-font);color:var(--ek-text);">Modal · drawer</div>
        <div style="font:500 10px/1.4 var(--ek-font);color:var(--ek-muted);margin-top:4px;">8px 32px rgba(0,0,0,.18)</div>
      </div>
    </div>
    <div>
      <button style="background:linear-gradient(135deg,#E30613,#B0050F);color:#fff;border:none;border-radius:10px;padding:14px 18px;font:800 12px var(--ek-font);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;box-shadow:0 4px 14px rgba(227,6,19,.35);width:100%;">Sign in</button>
      <div style="font:500 10px/1.4 var(--ek-font);color:var(--ek-muted);margin-top:8px;text-align:center;">Red glow CTA · 4px 14px rgba(227,6,19,.35)</div>
    </div>
  </div>
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px;background:#060E2B;padding:14px;border-radius:10px;">
    <div style="background:#111D4A;border:1px solid #1E3070;border-radius:10px;padding:14px;">
      <div style="font:700 11px/1 var(--ek-font);color:#F0F4FF;">Card · midnight</div>
      <div style="font:500 10px/1.4 var(--ek-font);color:#6B85C0;margin-top:4px;">No shadow · border + lighter bg</div>
    </div>
    <button style="background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:12px;padding:12px 16px;font:800 13px var(--ek-font);cursor:pointer;box-shadow:0 8px 20px rgba(29,78,216,.28);">Sign in →
      <div style="font:500 9px/1 var(--ek-font);opacity:.7;margin-top:3px;font-weight:500;">8px 20px rgba(29,78,216,.28)</div>
    </button>
  </div>
</div>
</body></html>
