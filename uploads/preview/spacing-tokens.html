<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="row" style="gap:0;align-items:flex-end;">
    <div style="display:flex;align-items:flex-end;gap:12px;">
      <div style="text-align:center;"><div style="height:4px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">4</div></div>
      <div style="text-align:center;"><div style="height:8px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">8</div></div>
      <div style="text-align:center;"><div style="height:12px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">12</div></div>
      <div style="text-align:center;"><div style="height:16px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">16</div></div>
      <div style="text-align:center;"><div style="height:20px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">20</div></div>
      <div style="text-align:center;"><div style="height:24px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">24</div></div>
      <div style="text-align:center;"><div style="height:28px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">28</div></div>
      <div style="text-align:center;"><div style="height:32px;width:24px;background:#001F5C;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">32</div></div>
    </div>
  </div>
  <div class="row" style="gap:10px;background:#060E2B;border-radius:10px;padding:14px;">
    <div style="background:#111D4A;border:1px solid #1E3070;border-radius:10px;padding:14px 16px;flex:1;">
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;color:#6B85C0;">Total</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#F0F4FF;margin-top:6px;">201</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:#6B85C0;margin-top:5px;">Day 1–15</div>
    </div>
    <div style="background:#111D4A;border:1px solid #1E3070;border-radius:10px;padding:14px 16px;flex:1;">
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;color:#6B85C0;">Resolved</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#4ADE80;margin-top:6px;">112</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:#6B85C0;margin-top:5px;">56% rate</div>
    </div>
    <div style="background:#111D4A;border:1px solid #1E3070;border-radius:10px;padding:14px 16px;flex:1;">
      <div style="font:700 9px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;color:#6B85C0;">Unresolved</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#F87171;margin-top:6px;">57</div>
      <div style="font:500 10px/1.3 var(--ek-font);color:#6B85C0;margin-top:5px;">Action needed</div>
    </div>
  </div>
  <div style="font:500 11px/1.4 var(--ek-font);color:var(--ek-muted);">Card padding is consistently 14–18px. KPI tiles use 14px vertical, 16px horizontal, with 6px gap between label / number / sub-label.</div>
</div>
</body></html>
