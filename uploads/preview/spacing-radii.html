<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="row" style="gap:10px;align-items:flex-end;">
    <div style="text-align:center;"><div style="width:42px;height:42px;background:#001F5C;border-radius:4px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">4px</div></div>
    <div style="text-align:center;"><div style="width:48px;height:48px;background:#001F5C;border-radius:6px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">6 · chips</div></div>
    <div style="text-align:center;"><div style="width:52px;height:52px;background:#001F5C;border-radius:8px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">8 · btns</div></div>
    <div style="text-align:center;"><div style="width:56px;height:56px;background:#001F5C;border-radius:10px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">10 · KPI</div></div>
    <div style="text-align:center;"><div style="width:60px;height:60px;background:#001F5C;border-radius:12px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">12 · cards</div></div>
    <div style="text-align:center;"><div style="width:64px;height:64px;background:#001F5C;border-radius:14px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">14 · sections</div></div>
    <div style="text-align:center;"><div style="width:68px;height:68px;background:#001F5C;border-radius:16px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">16 · modal</div></div>
    <div style="text-align:center;"><div style="width:72px;height:72px;background:#001F5C;border-radius:20px;"></div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:6px;">20 · signin</div></div>
  </div>
  <div class="row" style="gap:8px;align-items:center;">
    <div style="background:#001F5C;color:#fff;font:800 10px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.08em;padding:6px 12px;border-radius:999px;">Pill · 999px</div>
    <div style="display:inline-flex;align-items:center;padding:3px 10px;background:rgba(22,163,74,.15);color:#4ADE80;border-radius:20px;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:11px;">98%</div>
    <div style="font:500 11px/1.3 var(--ek-font);color:var(--ek-muted);">Capsules / percentage pills use either 20px or full 999px radius depending on width.</div>
  </div>
</div>
</body></html>
