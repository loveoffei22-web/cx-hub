<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <button style="background:linear-gradient(135deg,#E30613,#B0050F);color:#fff;border:none;border-radius:10px;padding:12px 18px;font:800 12px var(--ek-font);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;box-shadow:0 4px 14px rgba(227,6,19,.35);">⬇ Export Excel</button>
    <button style="background:#001F5C;color:#fff;border:none;border-radius:8px;padding:10px 16px;font:700 12px var(--ek-font);cursor:pointer;">⟳ Sync</button>
    <button style="background:#F1F5F9;color:#0F172A;border:1px solid #E2E8F0;border-radius:8px;padding:10px 16px;font:700 12px var(--ek-font);cursor:pointer;">📂 Import</button>
    <button style="background:rgba(220,38,38,.12);color:#B91C1C;border:1px solid rgba(220,38,38,.30);border-radius:8px;padding:10px 16px;font:700 12px var(--ek-font);cursor:pointer;">Sign out</button>
  </div>
  <div class="row" style="gap:10px;background:#060E2B;padding:14px;border-radius:10px;">
    <button style="background:#E30613;color:#fff;border:1px solid #E30613;border-radius:7px;padding:9px 14px;font:700 11px var(--ek-font);cursor:pointer;display:inline-flex;align-items:center;gap:8px;"><span style="font-size:13px;">⬇</span>Export</button>
    <button style="background:rgba(255,255,255,.06);color:#F0F4FF;border:1px solid #1E3070;border-radius:7px;padding:9px 14px;font:600 11px var(--ek-font);cursor:pointer;display:inline-flex;align-items:center;gap:8px;"><span style="font-size:13px;">⚙</span>Settings</button>
    <button style="background:rgba(255,255,255,.06);color:#F0F4FF;border:1px solid #1E3070;border-radius:7px;padding:9px 14px;font:600 11px var(--ek-font);cursor:pointer;display:inline-flex;align-items:center;gap:8px;"><span style="font-size:13px;">⟳</span>Sync</button>
    <button style="background:rgba(220,38,38,.15);color:#F87171;border:1px solid rgba(220,38,38,.3);border-radius:7px;padding:9px 14px;font:700 11px var(--ek-font);cursor:pointer;">Sign out</button>
  </div>
  <div class="row" style="gap:10px;">
    <button style="background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:12px;padding:14px 24px;font:800 14px var(--ek-font);cursor:pointer;box-shadow:0 8px 20px rgba(29,78,216,.28);letter-spacing:.3px;">Sign in →</button>
    <button style="background:#fff;color:#1D4ED8;border:1.5px solid #DBEAFE;border-radius:11px;padding:13px 22px;font:800 13px var(--ek-font);cursor:pointer;">Forgot password</button>
  </div>
</div>
</body></html>
