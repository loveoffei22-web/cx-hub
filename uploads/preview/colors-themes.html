<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:10px;">
    <div style="border-radius:10px;padding:12px;background:#F7F8FA;border:1px solid var(--ek-border);">
      <div style="width:100%;height:50px;border-radius:6px;background:linear-gradient(135deg,#001040,#001F5C,#0a0020);border:1px solid var(--ek-border);"></div>
      <div style="font:800 12px/1 var(--ek-font);color:var(--ek-text);margin-top:8px;">Midnight</div>
      <div style="font:500 9.5px/1.3 var(--ek-font);color:var(--ek-muted);margin-top:3px;">Default · always-on console</div>
    </div>
    <div style="border-radius:10px;padding:12px;background:#F7F8FA;border:1px solid var(--ek-border);">
      <div style="width:100%;height:50px;border-radius:6px;background:linear-gradient(135deg,#DBEAFE,#BFDBFE,#E0E7FF);border:1px solid var(--ek-border);"></div>
      <div style="font:800 12px/1 var(--ek-font);color:var(--ek-text);margin-top:8px;">Daylight</div>
      <div style="font:500 9.5px/1.3 var(--ek-font);color:var(--ek-muted);margin-top:3px;">Bright daytime mode</div>
    </div>
    <div style="border-radius:10px;padding:12px;background:#F7F8FA;border:1px solid var(--ek-border);">
      <div style="width:100%;height:50px;border-radius:6px;background:linear-gradient(135deg,#52391B,#92400E,#F59E0B);border:1px solid var(--ek-border);"></div>
      <div style="font:800 12px/1 var(--ek-font);color:var(--ek-text);margin-top:8px;">Solar</div>
      <div style="font:500 9.5px/1.3 var(--ek-font);color:var(--ek-muted);margin-top:3px;">Warm afternoon mode</div>
    </div>
    <div style="border-radius:10px;padding:12px;background:#F7F8FA;border:1px solid var(--ek-border);">
      <div style="width:100%;height:50px;border-radius:6px;background:linear-gradient(135deg,#0A0F1A,#10B981,#02050E);border:1px solid var(--ek-border);"></div>
      <div style="font:800 12px/1 var(--ek-font);color:var(--ek-text);margin-top:8px;">Custom</div>
      <div style="font:500 9.5px/1.3 var(--ek-font);color:var(--ek-muted);margin-top:3px;">User-picked accent</div>
    </div>
  </div>
  <div style="font:500 11px/1.45 var(--ek-font);color:var(--ek-muted);">Themes share the same status, type and component rules — only the surface, accent and hero gradient change.</div>
</div>
</body></html>
