<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body class="ek-dark">
<div class="pc dark" style="background:#060E2B;">
  <!-- Hero with day badge -->
  <div style="background:linear-gradient(135deg,#001040 0%,#001F5C 50%,#0a0020 100%);border-radius:10px;padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-start;position:relative;overflow:hidden;">
    <div style="position:absolute;top:-50%;right:-5%;width:300px;height:300px;background:radial-gradient(circle, rgba(227,6,19,.12) 0%, transparent 70%);pointer-events:none;"></div>
    <div style="position:relative;">
      <div style="font:italic 800 17px/1 var(--ek-font);color:#fff;">Good morning, CX Team ☀️</div>
      <div style="font:500 10px/1.4 var(--ek-font);color:rgba(255,255,255,.45);margin-top:4px;">EKEDP Customer Experience · Marina HQ</div>
    </div>
    <div style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;text-align:center;position:relative;">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:22px;color:#F59E0B;line-height:1;">15</div>
      <div style="font:700 8px/1 var(--ek-font);text-transform:uppercase;letter-spacing:.10em;color:rgba(255,255,255,.4);margin-top:4px;">Day of Ops · 1–15 May</div>
    </div>
  </div>
  <div class="row" style="gap:8px;">
    <!-- Live status pill -->
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:14px;background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;font:700 11px var(--ek-font);">
      <span style="width:6px;height:6px;border-radius:50%;background:currentColor;"></span>Live · WAT
    </div>
    <!-- Stale -->
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:14px;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;font:700 11px var(--ek-font);">⏱ Stale · synced 9 May</div>
    <!-- Stamp chip on dark -->
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font:600 11px var(--ek-font);">Mobile App · <b style="color:#FFC72C;">Channel</b></div>
  </div>
</div>
</body></html>
