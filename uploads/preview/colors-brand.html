<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="row" style="gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--ek-border);">
    <div style="flex:1;background:#001F5C;color:#fff;padding:18px 16px;height:110px;display:flex;flex-direction:column;justify-content:space-between;">
      <div style="font:700 10px/1 var(--ek-font);letter-spacing:.10em;text-transform:uppercase;opacity:.7;">Navy</div>
      <div><div style="font-family:var(--ek-font-mono);font-size:13px;font-weight:600;">#001F5C</div><div style="font:500 11px/1.3 var(--ek-font);opacity:.6;margin-top:2px;">Brand · wordmark</div></div>
    </div>
    <div style="flex:1;background:#E30613;color:#fff;padding:18px 16px;height:110px;display:flex;flex-direction:column;justify-content:space-between;">
      <div style="font:700 10px/1 var(--ek-font);letter-spacing:.10em;text-transform:uppercase;opacity:.85;">Red</div>
      <div><div style="font-family:var(--ek-font-mono);font-size:13px;font-weight:600;">#E30613</div><div style="font:500 11px/1.3 var(--ek-font);opacity:.85;">Brand · primary action</div></div>
    </div>
    <div style="flex:1;background:#FFFFFF;color:#0F172A;padding:18px 16px;height:110px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--ek-border);">
      <div style="font:700 10px/1 var(--ek-font);letter-spacing:.10em;text-transform:uppercase;opacity:.55;">White</div>
      <div><div style="font-family:var(--ek-font-mono);font-size:13px;font-weight:600;">#FFFFFF</div><div style="font:500 11px/1.3 var(--ek-font);color:var(--ek-muted);">Card / surface</div></div>
    </div>
  </div>
  <div class="row" style="gap:8px;">
    <div style="flex:1;display:flex;gap:6px;align-items:center;padding:8px 10px;background:#F7F8FA;border-radius:7px;">
      <div style="width:18px;height:18px;border-radius:4px;background:#FFC72C;border:1px solid rgba(0,0,0,.08);"></div>
      <div style="font:600 11px/1.2 var(--ek-font);color:var(--ek-text);">Gold <span style="font-family:var(--ek-font-mono);color:var(--ek-muted);font-weight:500;">#FFC72C</span></div>
    </div>
    <div style="flex:1;display:flex;gap:6px;align-items:center;padding:8px 10px;background:#F7F8FA;border-radius:7px;">
      <div style="width:18px;height:18px;border-radius:4px;background:#F59E0B;"></div>
      <div style="font:600 11px/1.2 var(--ek-font);color:var(--ek-text);">Amber <span style="font-family:var(--ek-font-mono);color:var(--ek-muted);font-weight:500;">#F59E0B</span></div>
    </div>
    <div style="flex:1;display:flex;gap:6px;align-items:center;padding:8px 10px;background:#F7F8FA;border-radius:7px;">
      <div style="width:18px;height:18px;border-radius:4px;background:#1D4ED8;"></div>
      <div style="font:600 11px/1.2 var(--ek-font);color:var(--ek-text);">Bright Blue <span style="font-family:var(--ek-font-mono);color:var(--ek-muted);font-weight:500;">#1D4ED8</span></div>
    </div>
  </div>
</div>
</body></html>
