<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <div class="row" style="gap:14px;align-items:center;">
    <img src="../assets/ekedp-app-icon.png" alt="EKEDP Power App icon" style="width:96px;height:96px;border-radius:20px;flex-shrink:0;box-shadow:0 6px 20px rgba(0,12,40,.18);">
    <div>
      <div style="font:800 14px/1.2 var(--ek-font);color:var(--ek-text);">EKEDP Power App icon</div>
      <div style="font:500 11px/1.45 var(--ek-font);color:var(--ek-muted);margin-top:5px;max-width:340px;">Canonical app/favicon for the Managers Hub. White rounded square, navy "E" with a yellow lightning bolt slashing through. Use as-is; do not place on coloured backgrounds.</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ek-muted);margin-top:8px;">assets/ekedp-app-icon.png</div>
    </div>
  </div>
  <div style="border-top:1px solid var(--ek-border);padding-top:14px;display:flex;gap:14px;align-items:center;justify-content:flex-start;flex-wrap:wrap;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <img src="../assets/ekedp-app-icon.png" style="width:32px;height:32px;border-radius:7px;">
      <div style="font:600 9px/1 var(--ek-font);color:var(--ek-muted);text-transform:uppercase;letter-spacing:.08em;">Favicon · 32</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <img src="../assets/ekedp-app-icon.png" style="width:48px;height:48px;border-radius:10px;">
      <div style="font:600 9px/1 var(--ek-font);color:var(--ek-muted);text-transform:uppercase;letter-spacing:.08em;">Nav · 48</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <img src="../assets/ekedp-app-icon.png" style="width:78px;height:78px;border-radius:18px;box-shadow:0 6px 20px rgba(0,12,40,.15);">
      <div style="font:600 9px/1 var(--ek-font);color:var(--ek-muted);text-transform:uppercase;letter-spacing:.08em;">Sign-in · 78</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <img src="../assets/ekedp-app-icon.png" style="width:120px;height:120px;border-radius:26px;box-shadow:0 8px 28px rgba(0,12,40,.18);">
      <div style="font:600 9px/1 var(--ek-font);color:var(--ek-muted);text-transform:uppercase;letter-spacing:.08em;">Slide / hero · 120+</div>
    </div>
  </div>
</div>
</body></html>
