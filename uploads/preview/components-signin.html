<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="pc">
  <!-- Sign-in card preview -->
  <div style="background:linear-gradient(165deg,#FFFFFF 0%,#F0F6FF 55%,#DDEBFF 100%);padding:18px;border-radius:14px;display:flex;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:20px;width:330px;box-shadow:0 20px 60px rgba(15,30,79,.15),0 0 0 1px rgba(15,30,79,.06);">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#60A5FA,#1D4ED8);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 32px rgba(29,78,216,.32);">
          <svg viewBox="0 0 46 62" width="26" height="34"><path d="M26 2 L4 34 L20 34 L16 60 L42 26 L26 26 L30 2 Z" fill="#fff"/></svg>
        </div>
        <div style="text-align:center;">
          <div style="font:900 18px/1 var(--ek-font);color:#0F1E4F;letter-spacing:-.4px;">EKEDP <span style="color:#1D4ED8;">Power App</span></div>
          <div style="font:700 9px/1 var(--ek-font);color:#64748B;letter-spacing:.8px;margin-top:4px;text-transform:uppercase;">Managers Hub · Marina HQ</div>
        </div>
      </div>
      <div style="margin-bottom:8px;">
        <div style="font:700 9px/1 var(--ek-font);color:#64748B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Email</div>
        <div style="border:1.5px solid #DBEAFE;border-radius:9px;padding:0 12px;display:flex;align-items:center;">
          <input type="text" value="love@ekedp.com" style="flex:1;border:none;outline:none;background:transparent;color:#0F1E4F;font:600 13px var(--ek-font);padding:11px 0;">
        </div>
      </div>
      <div style="margin-bottom:14px;">
        <div style="font:700 9px/1 var(--ek-font);color:#64748B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Password</div>
        <div style="border:1.5px solid #DBEAFE;border-radius:9px;padding:0 12px;display:flex;align-items:center;">
          <input type="password" value="••••••••" style="flex:1;border:none;outline:none;background:transparent;color:#0F1E4F;font:600 13px var(--ek-font);padding:11px 0;">
          <button style="background:none;border:none;color:#1D4ED8;font:700 10px var(--ek-font);cursor:pointer;">SHOW</button>
        </div>
      </div>
      <button style="width:100%;padding:12px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);border:none;border-radius:11px;color:#fff;font:800 14px var(--ek-font);cursor:pointer;box-shadow:0 8px 20px rgba(29,78,216,.28);letter-spacing:.3px;">Sign in →</button>
    </div>
  </div>
</div>
</body></html>
