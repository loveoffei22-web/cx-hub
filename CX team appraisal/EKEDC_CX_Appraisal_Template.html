<style>
:root{
  --navy:#0a1628;
  --gold:#e8b84b;
  --gold-light:#fdf3d8;
  --bg:#f6f5f1;
  --white:#ffffff;
  --card:#ffffff;
  --border:#e2e0d8;
  --text:#1a1a2e;
  --text-muted:#6b6b80;
  --green:#1a7a4a;
  --green-bg:#e6f7ee;
  --amber:#b45309;
  --amber-bg:#fef3c7;
  --red:#b91c1c;
  --red-bg:#fee2e2;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 4px 24px rgba(0,0,0,.10);
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
}

/* ── TOP BAR ───────────────────────────────────────────── */
#topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--navy);
  color:#fff;
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 24px;
  height:60px;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  font-size:16px;
  letter-spacing:-.2px;
  white-space:nowrap;
}
.brand-icon{
  font-size:22px;
  filter:drop-shadow(0 0 6px #e8b84b88);
}
.brand-sub{
  font-size:10px;
  font-weight:400;
  color:#a0aec0;
  display:block;
  line-height:1.2;
}

.topbar-divider{width:1px;height:32px;background:#ffffff22;flex-shrink:0;}

.quarter-pills{display:flex;gap:4px;}
.q-pill{
  background:transparent;
  border:1px solid #ffffff33;
  color:#c0cce0;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:600;
  padding:4px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:var(--transition);
  letter-spacing:.3px;
}
.q-pill:hover{border-color:#ffffff66;color:#fff;}
.q-pill.active{background:var(--gold);border-color:var(--gold);color:var(--navy);}

.year-input-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:#a0aec0;}
.year-input-wrap input{
  width:64px;
  background:#ffffff15;
  border:1px solid #ffffff33;
  border-radius:6px;
  color:#fff;
  font-family:'DM Mono',monospace;
  font-size:13px;
  padding:4px 8px;
  text-align:center;
}
.year-input-wrap input:focus{outline:none;border-color:var(--gold);}

.topbar-right{margin-left:auto;display:flex;gap:8px;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:8px;
  border:none;cursor:pointer;transition:var(--transition);
  white-space:nowrap;
}
.btn-ghost{background:#ffffff15;color:#e2e8f0;border:1px solid #ffffff22;}
.btn-ghost:hover{background:#ffffff25;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:#f0c75a;}
.btn-sm{padding:4px 10px;font-size:11px;}

/* ── NAV TABS ──────────────────────────────────────────── */
#navtabs{
  background:var(--navy);
  border-bottom:1px solid #ffffff12;
  display:flex;
  gap:2px;
  padding:0 20px;
  overflow-x:auto;
  scrollbar-width:none;
}
#navtabs::-webkit-scrollbar{display:none;}

.nav-tab{
  background:transparent;
  border:none;
  color:#8899b4;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:12px 16px 10px;
  cursor:pointer;
  border-bottom:3px solid transparent;
  transition:var(--transition);
  white-space:nowrap;
  position:relative;
}
.nav-tab:hover{color:#c8d8ec;}
.nav-tab.active{color:#fff;border-bottom-color:var(--gold);}
.nav-tab[data-agent].active{color:#fff;}

/* ── MAIN CONTENT ──────────────────────────────────────── */
#main{padding:24px;max-width:1200px;margin:0 auto;}

.view{display:none;}
.view.active{display:block;}

/* ── SECTION HEADING ───────────────────────────────────── */
.section-heading{
  font-size:11px;font-weight:700;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--text-muted);
  margin:28px 0 12px;
}

/* ── TEAM SUMMARY GRID ─────────────────────────────────── */
.summary-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.summary-title{font-size:22px;font-weight:700;color:var(--navy);}
.summary-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px;}

.agent-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}

.summary-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  display:flex;gap:16px;
  align-items:flex-start;
  cursor:pointer;
  transition:var(--transition);
  border:2px solid transparent;
}
.summary-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.summary-card.active-card{border-color:var(--gold);}

.summary-donut{flex-shrink:0;position:relative;width:80px;height:80px;}
.donut-label{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;
  font-size:15px;font-weight:700;
  line-height:1.1;
}
.donut-label .donut-pct{font-size:11px;color:var(--text-muted);font-weight:500;}

.summary-info{flex:1;min-width:0;}
.summary-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.summary-role{font-size:11px;color:var(--text-muted);margin-bottom:8px;}
.summary-score-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.score-badge{
  font-family:'DM Mono',monospace;
  font-size:22px;font-weight:700;
}
.status-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;
  padding:2px 10px;border-radius:20px;
}
.status-pill.green{background:var(--green-bg);color:var(--green);}
.status-pill.amber{background:var(--amber-bg);color:var(--amber);}
.status-pill.red{background:var(--red-bg);color:var(--red);}

.summary-meta{margin-top:10px;display:flex;flex-direction:column;gap:3px;}
.meta-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.meta-label{color:var(--text-muted);}
.meta-val{font-weight:600;}

.no-data-banner{
  background:var(--gold-light);
  border:1px solid var(--gold);
  border-radius:var(--radius-sm);
  padding:12px 16px;
  margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
  font-size:13px;
}
.no-data-banner .btn-start{
  margin-left:auto;
  background:var(--gold);
  color:var(--navy);
  border:none;
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:8px;
  cursor:pointer;transition:var(--transition);
  white-space:nowrap;
}
.no-data-banner .btn-start:hover{background:#f0c75a;}

/* ── AGENT VIEW ────────────────────────────────────────── */
.agent-hero{
  background:var(--navy);
  border-radius:var(--radius);
  padding:28px;
  color:#fff;
  display:flex;
  gap:24px;
  align-items:flex-start;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}
.agent-hero::after{
  content:'';position:absolute;
  right:-60px;top:-60px;
  width:240px;height:240px;
  border-radius:50%;
  background:radial-gradient(circle, #e8b84b22 0%, transparent 70%);
  pointer-events:none;
}
.hero-avatar{
  width:72px;height:72px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;
  flex-shrink:0;
  border:3px solid rgba(255,255,255,.15);
}
.hero-info{flex:1;}
.hero-name{font-size:22px;font-weight:700;margin-bottom:2px;}
.hero-role{font-size:13px;color:#8899b4;margin-bottom:12px;}
.hero-badges{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.quarter-badge{
  background:#ffffff15;
  border:1px solid #ffffff22;
  font-size:12px;font-weight:600;
  padding:4px 12px;border-radius:20px;
  font-family:'DM Mono',monospace;
}
.hero-score-wrap{text-align:right;margin-left:auto;}
.hero-score{
  font-family:'DM Mono',monospace;
  font-size:52px;font-weight:700;
  line-height:1;
  color:var(--gold);
}
.hero-score-label{font-size:11px;color:#8899b4;margin-top:4px;text-align:center;}
.trend-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:20px;
  margin-top:6px;
}
.trend-up{background:#1a7a4a22;color:#4ade80;}
.trend-down{background:#b91c1c22;color:#f87171;}
.trend-flat{background:#ffffff15;color:#94a3b8;}

/* ── CARDS ─────────────────────────────────────────────── */
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:16px;
}
.card-title{
  font-size:13px;font-weight:700;
  letter-spacing:.3px;
  color:var(--navy);
  margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.card-title .badge-count{
  background:var(--bg);
  color:var(--text-muted);
  font-size:11px;font-weight:600;
  padding:1px 8px;border-radius:10px;
  font-family:'DM Mono',monospace;
}

/* ── MONTHLY METRICS ───────────────────────────────────── */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.month-card{
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px;
  background:var(--bg);
}
.month-label{
  font-size:11px;font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:10px;
}
.metric-row{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:6px;
}
.metric-row:last-child{margin-bottom:0;}
.metric-name{font-size:12px;color:var(--text-muted);}
.metric-input{
  width:70px;
  border:1px solid var(--border);
  border-radius:5px;
  background:var(--white);
  font-family:'DM Mono',monospace;

function getScore(agent, q){
  const qData = agent.quarters[q];
  if(!qData) return null;
  return qData.kpis.reduce((s,k)=>s+Number(k.score),0);
}

function scoreColor(score){
  if(score === null) return 'var(--text-muted)';
  if(score >= 80) return 'var(--green)';
  if(score >= 60) return 'var(--amber)';
  return 'var(--red)';
}

function statusClass(score){
  if(score === null) return '';
  if(score >= 80) return 'green';
  if(score >= 60) return 'amber';
  return 'red';
}

function statusLabel(score){
  if(score === null) return '—';
  if(score >= 80) return '✓ On Track';
  if(score >= 60) return '⚠ Needs Focus';
  return '✗ Below Standard';
}

function buildDonut(score, color, size=80){
  if(score === null) score = 0;
  const r = (size/2)-8;
  const circ = 2*Math.PI*r;
  const pct = Math.min(score,100)/100;
  const dash = circ*pct;
  const gap = circ - dash;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e2e0d8" stroke-width="7"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/>
  </svg>`;
}

function esc(str){
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function agentById(id){ return AGENTS.find(a=>a.id===id); }

function buildAgentHTML(agent){
  const q = currentQ;
  const year = currentYear;
  const qData = agent.quarters[q];
  const score = getScore(agent, q);
  const prevQ = {Q1:null,Q2:'Q1',Q3:'Q2',Q4:'Q3'}[q];
  const prevScore = prevQ ? getScore(agent, prevQ) : null;
  const sc = scoreColor(score);
  const months = QUARTER_MONTHS[q];

  // Banner if no data
  let bannerHTML = '';
  if(!qData){
    bannerHTML = `<div class="no-data-banner">
      <span>📋 <strong>${q} ${year}</strong> not started for ${agent.name}.</span>
      <button class="btn-start" onclick="startQuarter('${agent.id}','${q}')">Start ${q} — copy KPI structure from Q1</button>
    </div>`;
  }

  // Trend
  let trendHTML = '';
  if(prevScore !== null && score !== null){
    const delta = score - prevScore;
    const cls = delta>0?'trend-up':delta<0?'trend-down':'trend-flat';
    const arrow = delta>0?'↑':delta<0?'↓':'→';
    trendHTML = `<span class="trend-badge ${cls}">${arrow} ${Math.abs(delta)} vs ${prevQ}</span>`;
  }

  // Hero donut
  const heroDonut = buildDonut(score||0, '#e8b84b', 90);

  // Monthly metrics
  let monthsHTML = '';
  if(qData){
    monthsHTML = qData.months.map((m,mi)=>{
      const qMonthLabel = `${q} ${year} · ${m.label}`;
      return `<div class="month-card">
        <div class="month-label">${esc(qMonthLabel)}</div>
        ${buildMetricRow('Assigned',    m.assigned,    agent.id, q, mi, 'assigned')}
        ${buildMetricRow('Responded',   m.responded,   agent.id, q, mi, 'responded')}
        ${buildMetricRow('Closed',      m.closed,      agent.id, q, mi, 'closed')}
        ${buildMetricRow('Escalated',   m.escalated,   agent.id, q, mi, 'escalated')}
        ${buildMetricRow('Returned',    m.returned,    agent.id, q, mi, 'returned')}
      </div>`;
    }).join('');
  } else {
    months.forEach((m,mi)=>{
      const qMonthLabel = `${q} ${year} · ${m}`;
      monthsHTML += `<div class="month-card" style="opacity:.4">
        <div class="month-label">${esc(qMonthLabel)}</div>
        <div style="font-size:12px;color:var(--text-muted);text-align:center;padding:16px 0">Start quarter to enable</div>
      </div>`;
    });
  }

  // KPI table
  let kpiRows = '';
  let totalScore = 0;
  if(qData){
    qData.kpis.forEach((k,i)=>{
      const sc2 = Number(k.score);
      totalScore += sc2;
      const pct = k.weight > 0 ? Math.round((sc2/k.weight)*100) : 0;
      const scCls = pct>=80?'score-green':pct>=60?'score-amber':'score-red';
      kpiRows += `<tr>
        <td class="kpi-num">${i+1}</td>
        <td>
          <div class="kpi-area">${esc(k.area)}</div>
          <div class="kpi-action">${esc(k.action)}</div>
          <div class="kpi-metric">${esc(k.metric)}</div>
        </td>
        <td style="text-align:center"><span class="weight-chip">${k.weight}%</span></td>
        <td class="score-cell">
          <input type="number" class="score-input ${scCls}" min="0" max="${k.weight}"
            value="${sc2}"
            data-agent="${agent.id}" data-q="${q}" data-kpi="${i}" data-field="score"
            onchange="updateKpi(this)" oninput="colorScore(this,${k.weight})"/>
        </td>
        <td>
          <textarea class="note-input" rows="2"
            data-agent="${agent.id}" data-q="${q}" data-kpi="${i}" data-field="note"
            onchange="updateKpiText(this)">${esc(k.note)}</textarea>
        </td>
        <td>
          <textarea class="comment-input" rows="2"
            data-agent="${agent.id}" data-q="${q}" data-kpi="${i}" data-field="comment"
            onchange="updateKpiText(this)">${esc(k.comment)}</textarea>
        </td>
      </tr>`;
    });
  } else {
    KPI_AREAS.forEach((k,i)=>{
      kpiRows += `<tr style="opacity:.4">
        <td class="kpi-num">${i+1}</td>
        <td><div class="kpi-area">${esc(k.area)}</div></td>
        <td style="text-align:center"><span class="weight-chip">${k.weight}%</span></td>
        <td class="score-cell">—</td><td>—</td><td>—</td>
      </tr>`;
    });
  }

  const scoreDisplay = score !== null ? score : '—';
  const statusCls = statusClass(score);
  const statusLbl = statusLabel(score);

  // Talking points & outlook
  const pointsVal = qData ? esc(qData.points.join('\n')) : '';
  const outlookLabel = `${q === 'Q4' ? 'Year-End Summary & Next Year Targets' : 'Q'+({Q1:'2',Q2:'3',Q3:'4',Q4:'1'}[q])+' '+year+' Outlook & Targets'}`;
  const outlookVal = qData ? esc(qData.outlook) : '';
  const overallVal = qData ? esc(qData.overallComment) : '';
  const sigEmp = qData ? esc(qData.sigEmployee) : '';
  const sigMgr = qData ? esc(qData.sigManager) : 'Love Offei — Manager CX';
  const sigDate = qData ? esc(qData.sigDate) : '';
  const fp = qData ? esc(qData.folderPending) : '';
  const fr = qData ? esc(qData.folderReturned) : '';

  return `
${bannerHTML}

<!-- HERO -->
<div class="agent-hero">
  <div class="hero-avatar" style="background:${agent.avatarBg};color:${agent.color}">${agent.initials}</div>
  <div class="hero-info">

    <div class="hero-badges">
      <span class="quarter-badge">${q} ${year} · ${scoreDisplay}/100</span>
      <span class="status-pill ${statusCls}">${statusLbl}</span>
      ${trendHTML}
    </div>
  </div>
  <div class="hero-score-wrap">
    <div style="position:relative;display:inline-block;">
      ${buildDonut(score||0,'#e8b84b',90)}
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span class="hero-score" style="font-size:26px;">${scoreDisplay}</span>
        <span style="font-size:10px;color:#8899b4;">/100</span>
      </div>
    </div>
    <div class="hero-score-label">Overall Score</div>
  </div>
</div>

<!-- MONTHLY METRICS -->
<div class="card">
  <div class="card-title">📅 Monthly Metrics</div>
  <div class="month-grid">${monthsHTML}</div>
</div>

<!-- KPI SCORECARD -->
<div class="card">
  <div class="card-title">📋 KPI Scorecard
    <span class="badge-count">Total: <span id="total-${agent.id}">${totalScore}</span>/100</span>
  </div>
  <div style="overflow-x:auto;">
  <table class="kpi-table">
    <thead>
      <tr>
        <th>#</th>
        <th>KPI Area</th>
        <th>Weight</th>
        <th>Score</th>
        <th>Performance Notes / Evidence</th>
        <th>Officer Comment</th>

    <tfoot>

        <td colspan="2" style="font-size:13px;padding:10px;">TOTAL SCORE</td>
        <td style="text-align:center;"><span class="weight-chip" style="background:#ffffff22;color:#fff;border-color:#ffffff33;">100%</span></td>
        <td style="text-align:center;font-family:'DM Mono',monospace;font-size:16px;"><span id="total2-${agent.id}">${totalScore}</span>/100</td>
        <td colspan="2"></td>
      </tr>
    </tfoot>
  </table>
  </div>
</div>

<!-- TALKING POINTS -->
<div class="card">
  <div class="card-title">💬 Key Talking Points</div>
  <label class="label-text">Enter each talking point on a new line</label>
  <textarea class="styled-textarea" rows="5"
    data-agent="${agent.id}" data-q="${q}" data-field="points"
    onchange="updateField(this)" placeholder="• Q1 highlights and key discussion points..."
    ${!qData?'disabled':''}>
${pointsVal}</textarea>
</div>

<!-- OUTLOOK -->
<div class="card">
  <div class="card-title">🔭 ${outlookLabel}</div>
  <textarea class="styled-textarea" rows="4"
    data-agent="${agent.id}" data-q="${q}" data-field="outlook"
    onchange="updateField(this)" placeholder="Targets, development areas, expectations for next quarter..."
    ${!qData?'disabled':''}>
${outlookVal}</textarea>
</div>

<!-- FOLDER STATUS -->
<div class="card">
  <div class="card-title">📁 Folder Status</div>
  <div class="folder-grid">
    <div class="folder-item">
      <label class="folder-label">Pending Folder Count</label>
      <input type="text" class="signoff-input" style="border:1px solid var(--border);border-radius:6px;padding:6px 10px;"
        data-agent="${agent.id}" data-q="${q}" data-field="folderPending"
        value="${fp}" onchange="updateField(this)"

    </div>

<!-- OVERALL COMMENT -->

${overallVal}</textarea>

function buildMetricRow(label, val, agentId, q, mi, field){
  return `<div class="metric-row">
    <span class="metric-name">${label}</span>
    <input type="number" class="metric-input" min="0"
      value="${val}"
      data-agent="${agentId}" data-q="${q}" data-month="${mi}" data-field="${field}"
      onchange="updateMonth(this)"/>
  </div>`;
}

function bindAgentEvents(agent, el){}

/* ══════════════════════════════════════════════════════════
   TEAM SUMMARY
══════════════════════════════════════════════════════════ */
function renderSummary(){
  const q = currentQ;
  const year = currentYear;
  document.getElementById('summarySubtitle').textContent = `CX Team · Email Helpdesk · ${q} ${year}`;

  const grid = document.getElementById('agentGrid');
  grid.innerHTML = AGENTS.map(agent=>{
    const score = getScore(agent, q);
    const sc = scoreColor(score);
    const statusCls = statusClass(score);
    const statusLbl = statusLabel(score);
    const donut = buildDonut(score, sc, 80);

    // Top KPI
    let topKpi = '—', topGap = '—';
    const qData = agent.quarters[q];
    if(qData){
      const best = qData.kpis.reduce((b,k)=> Number(k.score)>Number(b.score)?k:b, qData.kpis[0]);
      const worst = qData.kpis.reduce((b,k)=>{
        const kPct = k.weight>0 ? Number(k.score)/k.weight : 0;
        const bPct = b.weight>0 ? Number(b.score)/b.weight : 1;
        return kPct < bPct ? k : b;
      }, qData.kpis[0]);
      topKpi = best.area.split('&')[0].trim().substring(0,28)+'…';
      topGap = worst.area.split('&')[0].trim().substring(0,28)+'…';
    }

    return `<div class="summary-card" onclick="switchView('agent-${agent.id}')">
      <div class="summary-donut">
        ${donut}
        <div class="donut-label">
          <span style="font-size:16px;font-weight:800;color:${sc};">${score !== null ? score : '—'}</span>
          <span class="donut-pct">/100</span>
        </div>
      </div>
      <div class="summary-info">
        <div class="summary-name" style="color:${agent.color}">${agent.name}</div>
        <div class="summary-role">CX Agent · ${agent.prefix}*</div>
        <div class="summary-score-row">
          <span class="status-pill ${statusCls}">${statusLbl}</span>
        </div>
        <div class="summary-meta">
          ${qData ? `
          <div class="meta-row"><span class="meta-label">Top KPI</span><span class="meta-val" style="font-size:11px;max-width:160px;text-align:right;">${topKpi}</span></div>
          <div class="meta-row"><span class="meta-label">Focus Gap</span><span class="meta-val" style="font-size:11px;max-width:160px;text-align:right;">${topGap}</span></div>
          ` : `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;">No data for ${q} ${year}</div>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════════
   VIEW SWITCHING
══════════════════════════════════════════════════════════ */
function switchView(viewName){
  currentView = viewName;
  // render if agent view
  if(viewName.startsWith('agent-')){
    const agentId = viewName.replace('agent-','');
    renderAgentView(agentId);
  }
  // hide all views
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const target = document.getElementById('view-'+viewName);
  if(target) target.classList.add('active');

  // update tabs
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.remove('active');
    t.style.borderBottomColor = 'transparent';
  });
  const activeTab = document.querySelector(`.nav-tab[data-view="${viewName}"]`);
  if(activeTab){
    activeTab.classList.add('active');
    // color the border for agent tabs
    const agentId2 = activeTab.dataset.agent;
    if(agentId2){
      const a2 = agentById(agentId2);
      if(a2) activeTab.style.borderBottomColor = a2.color;
    } else {
      activeTab.style.borderBottomColor = 'var(--gold)';
    }
  }
}

/* ══════════════════════════════════════════════════════════
   QUARTER / YEAR CONTROLS
══════════════════════════════════════════════════════════ */
document.getElementById('quarterPills').addEventListener('click', e=>{
  const pill = e.target.closest('.q-pill');
  if(!pill) return;
  document.querySelectorAll('.q-pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  currentQ = pill.dataset.q;
  refreshAll();
});

document.getElementById('yearInput').addEventListener('change', e=>{
  currentYear = parseInt(e.target.value) || 2026;
  refreshAll();
});

function refreshAll(){
  renderSummary();
  // re-render current agent view if open
  if(currentView.startsWith('agent-')){
    const agentId = currentView.replace('agent-','');
    renderAgentView(agentId);
    const el = document.getElementById('view-'+currentView);
    if(el) el.classList.add('active');
  }
}

/* ══════════════════════════════════════════════════════════
   START QUARTER
══════════════════════════════════════════════════════════ */
function startQuarter(agentId, q){
  const agent = agentById(agentId);
  // copy KPI structure from Q1, zeroed
  const q1Data = agent.quarters['Q1'];
  agent.quarters[q] = {
    months: makeBlankMonths(q),
    kpis: (q1Data ? q1Data.kpis : KPI_AREAS).map(k=>({
      area:k.area, action:k.action, metric:k.metric, weight:k.weight,
      score:0, note:'', comment:''
    })),
    points:[],
    outlook:'',
    overallComment:'',
    sigEmployee:'', sigManager:'Love Offei — Manager CX', sigDate:'',
    folderPending:'', folderReturned:''
  };
  renderAgentView(agentId);
  const el = document.getElementById('view-agent-'+agentId);
  if(el) el.classList.add('active');
  renderSummary();
}

/* ══════════════════════════════════════════════════════════
   DATA UPDATE HANDLERS
══════════════════════════════════════════════════════════ */
function updateKpi(input){
  const {agent: agentId, q, kpi, field} = input.dataset;
  const a = agentById(agentId);
  if(!a || !a.quarters[q]) return;
  a.quarters[q].kpis[parseInt(kpi)][field] = Number(input.value);
  // update totals
  const total = a.quarters[q].kpis.reduce((s,k)=>s+Number(k.score),0);
  const t1 = document.getElementById('total-'+agentId);
  const t2 = document.getElementById('total2-'+agentId);
  if(t1) t1.textContent = total;
  if(t2) t2.textContent = total;
  renderSummary();
}

function colorScore(input, maxWeight){
  const v = Number(input.value);
  const pct = maxWeight > 0 ? (v/maxWeight)*100 : 0;
  input.className = 'score-input ' + (pct>=80?'score-green':pct>=60?'score-amber':'score-red');
}

function updateKpiText(textarea){
  const {agent: agentId, q, kpi, field} = textarea.dataset;
  const a = agentById(agentId);
  if(!a || !a.quarters[q]) return;
  a.quarters[q].kpis[parseInt(kpi)][field] = textarea.value;
}

function updateMonth(input){
  const {agent: agentId, q, month, field} = input.dataset;
  const a = agentById(agentId);
  if(!a || !a.quarters[q]) return;
  a.quarters[q].months[parseInt(month)][field] = Number(input.value);
}

function updateField(input){
  const {agent: agentId, q, field} = input.dataset;
  const a = agentById(agentId);
  if(!a || !a.quarters[q]) return;
  if(field === 'points'){
    a.quarters[q].points = input.value.split('\n').filter(l=>l.trim());
  } else {
    a.quarters[q][field] = input.value;
  }
}

/* ══════════════════════════════════════════════════════════
   PRINT
══════════════════════════════════════════════════════════ */
function printCurrent(){
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.remove('print-active');
    if(v.classList.contains('active')) v.classList.add('print-active');
  });
  window.print();
}

/* ══════════════════════════════════════════════════════════
   SAVE HTML SNAPSHOT
══════════════════════════════════════════════════════════ */
function saveHTML(){
  const agentsJSON = JSON.stringify(AGENTS.map(a=>({
    id:a.id, name:a.name, prefix:a.prefix, color:a.color,
    avatarBg:a.avatarBg, initials:a.initials, quarters:a.quarters
  })));
  const stateScript = `<script id="__snapshot_data__">
    (function(){
      const data = ${agentsJSON};
      data.forEach(function(saved){
        const live = AGENTS.find(function(a){return a.id===saved.id;});
        if(live) live.quarters = saved.quarters;
      });
      currentQ = ${JSON.stringify(currentQ)};
      currentYear = ${currentYear};
      document.getElementById('yearInput').value = ${currentYear};
      document.querySelectorAll('.q-pill').forEach(function(p){
        p.classList.remove('active');
        if(p.dataset.q === currentQ) p.classList.add('active');
      });
    })();
  <\/script>`;
  let html = document.documentElement.outerHTML;
  // inject before closing body
  html = html.replace('</body>', stateScript + '</body>');
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `EKEDC_CX_Appraisal_${currentQ}_${currentYear}_snapshot.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ══════════════════════════════════════════════════════════
   EXPORT ALL
══════════════════════════════════════════════════════════ */
function exportAllHTML(){
  saveHTML();
}

function init(){
