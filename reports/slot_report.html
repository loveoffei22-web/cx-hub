<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EKEDP Power App — Slot Report</title>
<link rel="icon" type="image/png" href="../assets/ekedp-app-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#001F5C; --navy-dark:#0A1A4F; --red:#E30613; --gold:#FFC72C;
    --ok:#16A34A; --okBg:#ECFDF5; --okBd:#A7F3D0;
    --warn:#D97706; --warnBg:#FFFBEB; --warnBd:#FDE68A;
    --bad:#DC2626; --badBg:#FEF2F2; --badBd:#FECACA;
    --info:#1D4ED8; --infoBg:#EFF6FF; --infoBd:#BFDBFE;
    --border:#E2E8F0; --muted:#64748B; --text:#0F172A; --bg:#F1F5F9;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body { background: var(--bg); color: var(--text); font: 400 12.5px/1.5 'Sora', sans-serif; }

  /* Top picker — UI only, hides on print */
  .picker {
    position: sticky; top:0; z-index:10;
    background:#fff; border-bottom:1px solid var(--border);
    padding:10px 24px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  }
  .picker label { font:800 10px/1 'Sora'; text-transform:uppercase; letter-spacing:.10em; color:var(--muted); margin-right:6px; }
  .picker button {
    padding:8px 13px; border-radius:8px; border:1px solid var(--border);
    background:#fff; color:var(--text); cursor:pointer;
    font:600 12px/1 'Sora', sans-serif;
  }
  .picker button.on { background: var(--navy); color:#fff; border-color: var(--navy); }
  .picker .print-btn {
    margin-left:auto; background: var(--red); color:#fff; border:none;
    padding:9px 14px; font:800 12px/1 'Sora'; letter-spacing:.04em; border-radius:8px; cursor:pointer;
    box-shadow: 0 4px 14px rgba(227,6,19,.30);
  }

  /* DOCUMENT */
  .doc {
    width: 1100px; max-width: 100%; margin: 16px auto; background:#fff;
    border:1px solid var(--border); border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,12,40,.05);
  }

  /* HEADER BAND */
  .hd {
    background: linear-gradient(135deg, var(--navy-dark), var(--navy) 55%, #1a3a8f);
    color:#fff; padding: 20px 28px 16px;
  }
  .hd .top { display:flex; align-items:center; gap:18px; }
  .hd-logo {
    height: 48px; background:#fff; border-radius:8px; padding:5px 10px;
    display:flex; align-items:center; flex-shrink:0;
  }
  .hd-logo img { height:100%; width:auto; display:block; }
  .hd-title h1 {
    font:900 22px/1.1 'Sora'; letter-spacing:-.005em;
  }
  .hd-eyebrow { font:800 10px/1 'Sora'; letter-spacing:.14em; color: var(--gold); text-transform:uppercase; margin-bottom:4px; }
  .hd-sub { font:500 12px/1.4 'Sora'; color:rgba(255,255,255,.65); margin-top:5px; }
  .hd-meta { margin-left:auto; text-align:right; font:600 11.5px/1.4 'Sora'; color:rgba(255,255,255,.75); }
  .hd-meta .big { font:800 16px/1 'JetBrains Mono', monospace; color: var(--gold); margin-bottom:4px; }

  /* KPI ROW */
  .kpi-row {
    display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;
    padding: 14px 28px; background:#F8FAFC; border-bottom: 1px solid var(--border);
  }
  .kpi {
    padding: 12px 16px; border-radius: 10px; background:#fff;
    border: 1.5px solid var(--border); position: relative; overflow:hidden;
  }
  .kpi::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; }
  .kpi.tot::before { background: var(--info); }
  .kpi.res::before { background: var(--ok); }
  .kpi.prg::before { background: var(--warn); }
  .kpi.unr::before { background: var(--bad); }
  .kpi .kl { font:800 10px/1 'Sora'; text-transform:uppercase; letter-spacing:.10em; color: var(--muted); }
  .kpi .kv { font:900 30px/1 'JetBrains Mono', monospace; margin-top:8px; color: var(--text); }
  .kpi.tot .kv { color: #1E3A8A; }
  .kpi.res .kv { color: #065F46; }
  .kpi.prg .kv { color: #92400E; }
  .kpi.unr .kv { color: #991B1B; }

  /* SECTION HEADERS */
  .sec-h {
    padding: 18px 28px 8px; display:flex; align-items:center; gap:10px;
    font:900 13px/1 'Sora'; color: var(--navy); text-transform:uppercase; letter-spacing:.06em;
    border-bottom: 2px solid var(--navy); margin: 0 28px 0 28px;
    padding: 12px 0 8px; padding-left:0;
  }
  .sec-h .pill {
    font:800 10px/1 'Sora'; padding:3px 9px; border-radius:14px; letter-spacing:.04em;
    text-transform:uppercase;
  }
  .sec-h.res .pill { background: var(--okBg); color: #065F46; border:1px solid var(--okBd); }
  .sec-h.prg .pill { background: var(--warnBg); color: #92400E; border:1px solid var(--warnBd); }
  .sec-h.unr .pill { background: var(--badBg); color: #991B1B; border:1px solid var(--badBd); }

  /* TABLE */
  .tbl-wrap { padding: 0 28px 6px; }
  table.t { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-top:10px; }
  table.t thead tr { background: var(--navy); }
  table.t th {
    color: rgba(255,255,255,.92);
    font:800 9.5px/1.2 'Sora'; text-transform:uppercase; letter-spacing:.06em;
    padding: 9px 9px; text-align: left; vertical-align:top;
  }
  table.t td {
    padding: 9px 9px; border-bottom: 1px solid #F1F5F9; vertical-align: top;
    font: 500 11px/1.45 'Sora';
  }
  table.t tbody tr:nth-child(even) td { background:#FAFBFE; }
  table.t tbody tr:last-child td { border-bottom: none; }
  .num { font-family: 'JetBrains Mono', monospace; font-weight:700; color: var(--info); white-space:nowrap; }
  .mono { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 10.5px; }
  .ticket-cell { white-space:nowrap; }
  .addr-cell { max-width: 220px; font: 500 10.5px/1.4 'Sora'; color: #334155; }
  .issue-cell { max-width: 260px; font: 500 11px/1.45 'Sora'; }
  .issue-cell b { color: var(--navy); }
  .note-cell { max-width: 320px; font: 500 10.5px/1.45 'Sora'; color: #334155; }
  .pill.bu {
    display:inline-flex; align-items:center; padding: 2px 8px;
    border-radius:14px; font:800 9.5px/1 'Sora'; letter-spacing:.04em; text-transform:uppercase;
    background:var(--infoBg); border:1px solid var(--infoBd); color:#1E3A8A;
  }
  .resp { font: 600 11px/1.3 'Sora'; color: var(--navy); }
  .resp-cat { font: 500 9.5px/1.2 'Sora'; color: var(--muted); margin-top:1px; }

  /* AGE BADGES — per Love's code */
  .age-badge {
    display:inline-block; padding:2px 8px; border-radius:20px;
    font: 700 10.5px/1.3 'Sora'; white-space:nowrap;
  }
  .age-green { background:#EAF3DE; color:#3B6D11; }
  .age-amber { background:#FAEEDA; color:#854F0B; }
  .age-red   { background:#FCEBEB; color:#A32D2D; }

  /* EMPTY */
  .empty {
    margin: 0 28px 12px; padding: 18px 14px; text-align:center; color: var(--muted);
    font: 500 12px/1.5 'Sora'; background: #FAFBFE; border-radius: 8px;
    border: 1px dashed var(--border);
  }
  .empty b { color: var(--text); }

  /* FOOTER */
  .ft {
    padding: 16px 28px; border-top: 1px solid var(--border); background:#F8FAFC;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .ft img.lockup { height:32px; }
  .ft .meta { font: 500 11px/1.4 'Sora'; color: var(--muted); flex:1; min-width:200px; }
  .ft .meta b { color: var(--navy); font-weight:800; }
  .ft .stamp { font: 600 10.5px/1.3 'JetBrains Mono'; color: var(--muted); text-align:right; }

  /* PRINT */
  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    html, body { background: #fff; }
    .picker { display: none !important; }
    .doc {
      width: auto; margin: 0; border: none; border-radius: 0; box-shadow: none;
    }
    .hd, .kpi, .pill, .age-badge, .sec-h, .ft, .kpi-row, table.t thead tr {
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .sec-h { page-break-after: avoid; }
    table.t { page-break-inside: auto; }
    table.t tr { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="picker">
  <label>Slot</label>
  <button data-slot="9am">☀️ 9AM Handover</button>
  <button data-slot="12pm">🕛 12PM Update</button>
  <button data-slot="midday" class="on">🌤️ Midday (1–2PM)</button>
  <button data-slot="cob">🌆 COB (4–5PM)</button>
  <button class="print-btn" onclick="window.print()">⬇ Print / Save as PDF</button>
</div>

<div class="doc" id="doc"></div>

<script src="../data/canonical.js"></script>
<script>
// ─── SAMPLE TICKETS ─────────────────────────────────────────
// Realistic shape matching the SharePoint columns. Fed from JSON
// when wired live; static here for demo.
const TICKETS = [
  {num:'710147', time:'12:42 PM', created:'2026-05-15 12:42', name:'Funmilayo Okeke',
   phone:'+2348144210987', meter:'43901607762', addr:'14 Ekololu Street, Surulere',
   bu:'MUSHIN', issue:'Faulty meter — display blank, no supply for 2 days',
   resp:'Holyland Umude', status:'unresolved', note:'Awaiting BU survey · escalated to PPM team.'},
  {num:'710162', time:'12:58 PM', created:'2026-05-13 12:58', name:'Bidemi Akande',
   phone:'+2347016574421', meter:'45046784349', addr:'12B Bishop Howells St, Ikoyi',
   bu:'IKOYI', issue:'Low voltage 3 of 3 phases since last night',
   resp:'Ogheneyoreme Agbroko', status:'progress', note:'TX loading check scheduled · feeder team enroute.'},
  {num:'710171', time:'1:08 PM', created:'2026-05-16 13:08', name:'Damilare Adeniran',
   phone:'+2348023445166', meter:'213242018389', addr:'45B Udi Avenue, Victory Estate, Ajah',
   bu:'AJAH', issue:'Estimated bill query — ₦42k disputed',
   resp:'Mojibola Adefuwa', status:'resolved', note:'Adjusted to actual reading · customer confirmed (Mojibola 1:34PM).'},
  {num:'710188', time:'1:24 PM', created:'2026-05-09 13:24', name:'Aisha Bello',
   phone:'+2348022912717', meter:'43901959114', addr:'House 3, Block A, Emerald Court, 17 Adeniyi Coker St, VI',
   bu:'AJAH', issue:'Change of name on prepaid meter',
   resp:'Adetoun Adetola', status:'progress', note:'Documents received · pending finance review.'},
  {num:'710195', time:'1:36 PM', created:'2026-05-17 13:36', name:'Eze Chukwu',
   phone:'+2348131526803', meter:'54300001390', addr:'34B Olayinka Street, Itire, Mushin',
   bu:'MUSHIN', issue:'Unable to load tokens — display rejects',
   resp:'Holyland Umude', status:'resolved', note:'Cleared on next vend · customer confirmed (Holyland 1:51PM).'},
  {num:'710207', time:'1:51 PM', created:'2026-05-10 13:51', name:'Kunle Adetayo',
   phone:'+2347012112345', meter:'125251179433', addr:'25 Airways Road, Ijeshatedo',
   bu:'LEKKI', issue:'Outage 30+ mins · whole street affected',
   resp:'Ogheneyoreme Agbroko', status:'unresolved', note:'Pending feeder restoration · 2nd escalation.'},
  {num:'710218', time:'1:58 PM', created:'2026-05-17 13:58', name:'Tope Oluwa',
   phone:'+2348144210987', meter:'4156158646', addr:'Block 3, Bar Beach Towers, Victoria Island',
   bu:'IKOYI', issue:'Wrong tariff — Band A applied, should be Band B',
   resp:'Nonye Angelina Nnadozie', status:'progress', note:'Mapping request sent · awaiting confirmation.'},
];

const SLOT_BLURB = {
  '9am':    'Overnight intake. Hand-over notes for the day shift.',
  '12pm':   'Morning batch — resolved + still in flight.',
  'midday': 'Mid-shift snapshot for the WhatsApp group.',
  'cob':    'Close-of-business roll-up. Includes only tickets not in Midday.',
};

function watNow() {
  const wat = new Date(new Date().toLocaleString('en-US', {timeZone:'Africa/Lagos'}));
  return {
    long:  wat.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'}),
    short: wat.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'}),
    dayNo: Math.floor((wat - new Date('2026-05-01T00:00:00')) / 86400000) + 1,
  };
}

function ticketRow(x, sectionStatus) {
  const ageLbl = window.getAgeLabel(x.created);
  const ageCls = window.getAgeClass(x.created);
  return `
    <tr>
      <td class="num ticket-cell">#${x.num}</td>
      <td>${x.time}</td>
      <td><div>${x.name}</div><div class="mono">${x.phone}</div></td>
      <td class="mono">${x.meter}</td>
      <td class="addr-cell">${x.addr}</td>
      <td><span class="pill bu">${x.bu}</span></td>
      <td class="issue-cell">${x.issue}</td>
      <td>
        <div class="resp">${x.resp}</div>
      </td>
      <td><span class="age-badge ${ageCls}">${ageLbl}</span></td>
      <td class="note-cell">${x.note || '—'}</td>
    </tr>`;
}

function section(title, status, tickets) {
  const emo = window.EK_STATUS_GLYPH[status];
  const lbl = window.EK_STATUS_LABEL[status];
  if (!tickets.length) {
    return `
      <div class="sec-h ${status==='resolved'?'res':status==='progress'?'prg':'unr'}">
        ${emo} ${lbl} <span class="pill">0</span>
      </div>
      <div class="empty"><b>None.</b> No ${lbl.toLowerCase()} tickets in this window.</div>`;
  }
  return `
    <div class="sec-h ${status==='resolved'?'res':status==='progress'?'prg':'unr'}">
      ${emo} ${lbl} <span class="pill">${tickets.length}</span>
    </div>
    <div class="tbl-wrap">
      <table class="t">
        <thead><tr>
          <th>Ticket</th><th>Time</th><th>Customer / Phone</th><th>Meter #</th>
          <th>Address</th><th>BU</th><th>Issue</th>
          <th>Responsible Party</th><th>Age</th><th>Note</th>
        </tr></thead>
        <tbody>${tickets.map(t => ticketRow(t, status)).join('')}</tbody>
      </table>
    </div>`;
}

function render(slotId) {
  const slot = window.EK_SLOTS[slotId];
  const t = watNow();
  const res = TICKETS.filter(x => x.status==='resolved');
  const prg = TICKETS.filter(x => x.status==='progress');
  const unr = TICKETS.filter(x => x.status==='unresolved');

  // Slot subtitle uses fixed stamp, not live click time.
  const titleEmoji = slot.id === 'cob' ? '🌆' : slot.id === '9am' ? '☀️' : slot.id === '12pm' ? '🕛' : '🌤️';
  const reportTitle = slot.id === 'cob'
    ? `EKEDP END-OF-DAY REPORT — Day ${t.dayNo}`
    : slot.id === 'midday'
    ? `EKEDP MIDDAY REPORT — Day ${t.dayNo}`
    : `EKEDP ${slot.label.toUpperCase()} — Day ${t.dayNo}`;

  document.getElementById('doc').innerHTML = `
    <div class="hd">
      <div class="top">
        <div class="hd-logo"><img src="../assets/ekedp-logo.jpg" alt=""></div>
        <div class="hd-title">
          <div class="hd-eyebrow">EKEDP Power App · CX Daily Report</div>
          <h1>${titleEmoji} ${reportTitle}</h1>
          <div class="hd-sub">Customer Experience · Marina HQ · Mobile App Channel · Window: ${slot.window}</div>
        </div>
        <div class="hd-meta">
          <div class="big">Generated at ${slot.stamp}</div>
          <div>${t.long}</div>
        </div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi tot"><div class="kl">Total</div><div class="kv">${TICKETS.length}</div></div>
      <div class="kpi res"><div class="kl">Resolved</div><div class="kv">${res.length}</div></div>
      <div class="kpi prg"><div class="kl">In Progress</div><div class="kv">${prg.length}</div></div>
      <div class="kpi unr"><div class="kl">Unresolved</div><div class="kv">${unr.length}</div></div>
    </div>

    ${section('Resolved',   'resolved',   res)}
    ${section('In Progress','progress',   prg)}
    ${section('Unresolved', 'unresolved', unr)}

    <div class="ft">
      <img class="lockup" src="../assets/ekedp-power-app-lockup.png" alt="EKEDP Power App">
      <div class="meta">Generated by the <b>EKEDP Power App — Managers Hub</b>. ${SLOT_BLURB[slot.id]}</div>
      <div class="stamp">${t.short} · ${slot.stamp}<br>Print or share in the team group.</div>
    </div>
  `;
}

document.querySelectorAll('.picker [data-slot]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.picker [data-slot]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    render(b.dataset.slot);
  });
});

render('midday');
</script>
</body>
</html>
